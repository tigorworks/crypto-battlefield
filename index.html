<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>BTC Battlefield — Live</title>
  <link rel="preload" href="three.min.js" as="script">
  <link rel="preload" href="land.jpg" as="image">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/boot.css">
  <link rel="stylesheet" href="styles/hud.css">
  <link rel="stylesheet" href="styles/chat.css">
</head>

<body>
  <div id="boot">
    <div class="bt" id="boot-title"></div>
    <div class="boot-convoy" aria-hidden="true">
      <div class="boot-tank"><i class="turret"></i><i class="barrel"></i><i class="hull"></i><i class="track"></i></div>
      <div class="boot-tank"><i class="turret"></i><i class="barrel"></i><i class="hull"></i><i class="track"></i></div>
      <div class="boot-tank"><i class="turret"></i><i class="barrel"></i><i class="hull"></i><i class="track"></i></div>
    </div>
    <div class="bs">LOADING…</div>
    <div class="bq" id="boot-quote"></div>
    <div class="bq-by" id="boot-quote-by"></div>
  </div>
  <script type="module">
    import { initBootScreen } from './src/boot/boot-screen.js';
    initBootScreen();
  </script>
  <div id="flash"></div>
  <div id="fx-layer"></div>
  <div id="streak"></div>
  <div id="event-ticker"><span class="et-dot"></span><span id="et-txt"></span></div>
  <div id="unit-tip"></div>
  <div id="lock-badge"><span id="lock-text"></span><span class="lx">✕</span></div>

  <div class="hud" id="feed-badge">
    <span id="feed-dot"></span><span id="feed-text">MENYAMBUNG…</span>
    <button class="btn warn" id="retry">SAMBUNG ULANG</button>
    <span id="online-pill" title="Sedang menonton"><span id="online-count">—</span></span>
  </div>

  <div class="hud" id="hud-topright">
    <button class="hud" id="audio-btn" title="Bisukan suara" aria-label="Bisukan suara">
      <svg viewBox="0 0 24 24" width="18" height="18">
        <path d="M11 5L6 9H3v6h3l5 4V5z" />
        <path d="M15.5 8.7a4.4 4.4 0 010 6.6M18.3 6a8.4 8.4 0 010 12" />
      </svg>
    </button>

    <button class="hud" id="chat-btn" title="Obrolan" aria-label="Obrolan">
      <svg viewBox="0 0 24 24" width="18" height="18">
        <path d="M4 5h16v11H9l-4 4V5z" />
        <path d="M8 9.5h8M8 12.5h5" />
      </svg>
      <span class="badge" id="chat-badge">0</span>
    </button>

    <button class="hud active" id="widgets-btn" title="Sembunyikan widget" aria-label="Sembunyikan widget">
      <svg viewBox="0 0 24 24" width="17" height="17">
        <rect x="3" y="3" width="7" height="7" rx="1.5" />
        <rect x="14" y="3" width="7" height="7" rx="1.5" />
        <rect x="14" y="14" width="7" height="7" rx="1.5" />
        <rect x="3" y="14" width="7" height="7" rx="1.5" />
      </svg>
    </button>

    <button class="hud" id="lang-btn" title="Switch language" aria-label="Switch language">EN</button>

    <button class="hud" id="fs-btn" title="Layar penuh" aria-label="Layar penuh">
      <svg viewBox="0 0 24 24" width="17" height="17">
        <path d="M4 9V4h5M15 4h5v5M20 15v5h-5M9 20H4v-5" />
      </svg>
    </button>
  </div>

  <div class="hud panel" id="chat-panel">
    <div id="chat-head">
      <div id="chat-head-l">
        <h4>OBROLAN</h4><span id="chat-online-label"></span>
      </div>
      <button id="chat-close" aria-label="Tutup">✕</button>
    </div>
    <div id="chat-msgs">
      <div id="chat-empty">Belum ada obrolan. Mulai duluan!</div>
    </div>
    <div id="emoji-picker"></div>
    <div id="chat-namerow">
      <svg viewBox="0 0 24 24" width="14" height="14">
        <path d="M12 12a4 4 0 100-8 4 4 0 000 8zM4 20c0-4 4-6 8-6s8 2 8 6" />
      </svg>
      <input id="chat-name" maxlength="16" placeholder="Nama" autocomplete="off">
    </div>
    <form id="chat-form">
      <button type="button" id="chat-emoji-btn" aria-label="Emoji">
        <svg viewBox="0 0 24 24" width="18" height="18">
          <circle cx="12" cy="12" r="9" />
          <path d="M8.5 14.5s1.2 2 3.5 2 3.5-2 3.5-2" />
          <path d="M9 9.5h.01M15 9.5h.01" />
        </svg>
      </button>
      <input id="chat-text" maxlength="200" placeholder="Ketik pesan…" autocomplete="off">
      <button type="submit" id="chat-send" aria-label="Kirim">
        <svg viewBox="0 0 24 24" width="16" height="16">
          <path d="M3 11l18-7-7 18-3-7-8-4z" />
        </svg>
      </button>
    </form>
  </div>

  <div class="hud" id="center-price">
    <div id="cp-value">—</div>
    <div id="cp-sub">BTC / USDT <span id="cp-pct">0.00%</span></div>
  </div>

  <div class="hud panel" id="pressure">
    <div id="pp-head"><span id="pp-head-label"></span> <span class="l" id="pp-long-word"></span> <span
        class="vs">vs</span> <span class="s" id="pp-short-word"></span></div>
    <div id="pp-bar">
      <div id="pp-long" style="width:50%"></div>
      <div id="pp-short"></div>
    </div>
    <div id="pp-stats">
      <div class="pp-col pp-l">
        <div class="pp-main"><span id="pp-long-usd">$0</span> · <span id="pp-long-pct">50%</span></div>
        <div class="pp-sub"><span id="pp-long-cnt">0</span> <span id="pp-long-orders"></span></div>
      </div>
      <div class="pp-col pp-s">
        <div class="pp-main"><span id="pp-short-pct">50%</span> · <span id="pp-short-usd">$0</span></div>
        <div class="pp-sub"><span id="pp-short-cnt">0</span> <span id="pp-short-orders"></span></div>
      </div>
    </div>
  </div>

  <div class="hud panel" id="killfeed">
    <h4>KILLFEED</h4>
    <div id="kill-records">
      <div class="krec buy" id="krec-buy"><span class="krec-label"></span><span class="krec-val">—</span></div>
      <div class="krec sell" id="krec-sell"><span class="krec-label"></span><span class="krec-val">—</span></div>
    </div>
    <div id="kills"></div>
  </div>

  <div class="hud panel" id="controls">
    <div id="cam-row">
      <button class="btn active" data-m="0">SINEMATIK</button>
      <button class="btn" data-m="1">IKUTI</button>
      <button class="btn" data-m="2">BEBAS</button>
    </div>
    <div class="keys" id="keys-hint"></div>
    <div id="audio-row">
      <div class="vol-row">
        <span class="vol-label" id="music-label" title="Klik untuk bisukan">MUSIK</span>
        <input type="range" class="vol-slider" id="music-vol" min="0" max="100" value="100" step="1">
      </div>
      <div class="vol-row">
        <span class="vol-label" id="sfx-label" title="Klik untuk bisukan">EFEK</span>
        <input type="range" class="vol-slider" id="sfx-vol" min="0" max="100" value="100" step="1">
      </div>
    </div>
    <button class="btn" id="share-btn">BAGIKAN MOMEN</button>
  </div>

  <div class="hud panel" id="moment-toast">
    <span class="mt-txt" id="mt-txt"></span>
    <button class="btn" id="mt-save"></button>
    <button class="btn" id="mt-close" aria-label="tutup">✕</button>
  </div>

  <div id="card-modal">
    <div id="card-box">
      <img id="card-img" alt="Moment card">
      <div id="card-actions">
        <button class="btn active" id="card-download"></button>
        <button class="btn" id="card-share"></button>
        <button class="btn warn" id="card-close"></button>
      </div>
    </div>
  </div>

  <script src="three.min.js"></script>
  <script type="module" src="./src/main.js"></script>


  <script type="module">
    /* ═══════════ ONLINE COUNT & OBROLAN — Firebase Realtime Database ═══════════
       Modul terpisah dari script utama; kalau Firebase gagal dimuat (mis. offline),
       fitur ini diam-diam nonaktif tanpa mengganggu battlefield-nya sendiri. */
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js';
    import {
      getDatabase, ref, set, remove, onValue, onChildAdded, onChildRemoved, onDisconnect,
      push, serverTimestamp, query, limitToLast, get, orderByChild, endAt, update,
    } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js';

    const firebaseConfig = {
      apiKey: 'AIzaSyBhe3TTSR_TS8i7cMflawq-ukZdkv4NLds',
      authDomain: 'btc-battle-44645.firebaseapp.com',
      projectId: 'btc-battle-44645',
      storageBucket: 'btc-battle-44645.firebasestorage.app',
      messagingSenderId: '159434799273',
      appId: '1:159434799273:web:29150b6142eed8280ed1b8',
    };
    const DATABASE_URL = 'https://btc-battle-44645-default-rtdb.asia-southeast1.firebasedatabase.app/';

    /* ── terjemahan: modul ini terpisah dari script utama, jadi bahasa dibaca lewat
       <html lang="..">  (yang sudah diatur applyLanguage() di script utama) dan disinkron ulang
       lewat MutationObserver setiap kali tombol EN/ID di script utama diklik ── */
    const CHAT_I18N = {
      en: {
        online: 'online', chatTitle: 'CHAT', chatBtnTitle: 'Chat', onlineTitle: 'Watching now',
        closeAria: 'Close', emptyText: 'No messages yet. Say something!', namePlaceholder: 'Name',
        textPlaceholder: 'Type a message…', sendAria: 'Send', emojiAria: 'Emoji', guestPrefix: 'Soldier',
      },
      id: {
        online: 'online', chatTitle: 'OBROLAN', chatBtnTitle: 'Obrolan', onlineTitle: 'Sedang menonton',
        closeAria: 'Tutup', emptyText: 'Belum ada obrolan. Mulai duluan!', namePlaceholder: 'Nama',
        textPlaceholder: 'Ketik pesan…', sendAria: 'Kirim', emojiAria: 'Emoji', guestPrefix: 'Prajurit',
      },
    };

    /* emoji standar untuk dipilih lewat picker, tanpa perlu library luar */
    const EMOJI_LIST = ['😀', '😂', '😍', '😎', '🔥', '👍', '👎', '❤️', '🎉', '😢', '😡', '🚀', '💰', '📈', '📉', '🐂', '🐻', '💎', '🙌', '😱', '🤔', '👀', '✅', '❌', '😴', '🥳', '💯', '⚡', '🤝', '😭'];

    try {
      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app, DATABASE_URL);
      const clientId = crypto.randomUUID ? crypto.randomUUID() : 'c' + Math.random().toString(36).slice(2) + Date.now();
      let chatLang = document.documentElement.lang === 'id' ? 'id' : 'en';
      let lastOnlineN = 1;

      /* ── jumlah online: hadir/hilang lewat onDisconnect, disiapkan ulang tiap koneksi tersambung
         (pola resmi Firebase — supaya tetap akurat walau sempat putus-nyambung) ── */
      const onlineCountEl = document.getElementById('online-count');
      const chatOnlineLabelEl = document.getElementById('chat-online-label');
      onValue(ref(db, '.info/connected'), (snap) => {
        if (snap.val() !== true) return;
        const myPresenceRef = ref(db, 'presence/' + clientId);
        onDisconnect(myPresenceRef).remove().then(() => { set(myPresenceRef, true); });
      });
      function renderOnlineCount() {
        const word = CHAT_I18N[chatLang].online;
        if (onlineCountEl) onlineCountEl.textContent = lastOnlineN + ' ' + word;
        if (chatOnlineLabelEl) chatOnlineLabelEl.textContent = '· ' + lastOnlineN + ' ' + word;
      }
      onValue(ref(db, 'presence'), (snap) => {
        lastOnlineN = Math.max(1, snap.exists() ? Object.keys(snap.val()).length : 0);
        renderOnlineCount();
      });

      /* ── obrolan: 50 pesan terakhir, nama tersimpan di localStorage ── */
      const chatBtn = document.getElementById('chat-btn'), chatPanel = document.getElementById('chat-panel'),
        chatClose = document.getElementById('chat-close'), chatMsgs = document.getElementById('chat-msgs'),
        chatForm = document.getElementById('chat-form'),
        chatName = document.getElementById('chat-name'), chatText = document.getElementById('chat-text'),
        chatBadge = document.getElementById('chat-badge'), chatTitleEl = document.querySelector('#chat-head h4'),
        onlinePillEl = document.getElementById('online-pill'),
        emojiBtn = document.getElementById('chat-emoji-btn'), emojiPicker = document.getElementById('emoji-picker');
      let chatEmpty = document.getElementById('chat-empty');

      chatName.value = localStorage.getItem('bf-chat-name') || (CHAT_I18N[chatLang].guestPrefix + Math.floor(Math.random() * 9000 + 1000));

      function applyChatLang(newLang) {
        chatLang = newLang;
        const L = CHAT_I18N[chatLang];
        onlinePillEl.title = L.onlineTitle;
        chatBtn.title = L.chatBtnTitle; chatBtn.setAttribute('aria-label', L.chatBtnTitle);
        chatTitleEl.textContent = L.chatTitle;
        chatClose.setAttribute('aria-label', L.closeAria);
        chatName.placeholder = L.namePlaceholder;
        chatText.placeholder = L.textPlaceholder;
        document.getElementById('chat-send').setAttribute('aria-label', L.sendAria);
        emojiBtn.setAttribute('aria-label', L.emojiAria);
        if (chatEmpty) chatEmpty.textContent = L.emptyText;
        renderOnlineCount();
      }
      applyChatLang(chatLang);
      new MutationObserver(() => {
        const newLang = document.documentElement.lang === 'id' ? 'id' : 'en';
        if (newLang !== chatLang) applyChatLang(newLang);
      }).observe(document.documentElement, { attributes: true, attributeFilter: ['lang'] });

      let unread = 0, chatOpen = false;

      function setBadge() {
        chatBadge.textContent = unread > 9 ? '9+' : String(unread);
        chatBadge.classList.toggle('show', unread > 0 && !chatOpen);
      }
      chatBtn.onclick = () => {
        chatOpen = !chatOpen;
        chatPanel.classList.toggle('open', chatOpen);
        chatBtn.classList.toggle('active', chatOpen);
        if (chatOpen) { unread = 0; setBadge(); chatMsgs.scrollTop = chatMsgs.scrollHeight; chatText.focus(); }
      };
      chatClose.onclick = () => { chatOpen = false; chatPanel.classList.remove('open'); chatBtn.classList.remove('active'); };

      /* ── emoji picker: grid statis, klik = sisip di posisi kursor lalu kembali fokus ── */
      for (const em of EMOJI_LIST) {
        const b = document.createElement('button');
        b.type = 'button'; b.textContent = em;
        b.onclick = () => {
          const start = chatText.selectionStart ?? chatText.value.length;
          const end = chatText.selectionEnd ?? chatText.value.length;
          chatText.value = chatText.value.slice(0, start) + em + chatText.value.slice(end);
          const pos = start + em.length;
          chatText.focus();
          chatText.setSelectionRange(pos, pos);
        };
        emojiPicker.appendChild(b);
      }
      let emojiOpen = false;
      emojiBtn.onclick = () => {
        emojiOpen = !emojiOpen;
        emojiPicker.classList.toggle('open', emojiOpen);
        emojiBtn.classList.toggle('active', emojiOpen);
      };

      let firstLoad = true;
      const chatQuery = query(ref(db, 'chat'), limitToLast(50));   // batas tampil 50 pesan terakhir — tetap berlaku terlepas dari cleanup di bawah
      onChildAdded(chatQuery, (snap) => {
        const m = snap.val();
        if (!m || typeof m.name !== 'string' || typeof m.text !== 'string') return;
        if (chatEmpty) { chatEmpty.remove(); chatEmpty = null; }
        const row = document.createElement('div');
        row.className = 'cm' + (m.name === chatName.value ? ' me' : '');
        row.dataset.key = snap.key;
        const nameSpan = document.createElement('span'); nameSpan.className = 'cn'; nameSpan.textContent = m.name + ': ';
        const textSpan = document.createElement('span'); textSpan.className = 'cx'; textSpan.textContent = m.text;   // textContent — jangan innerHTML (cegah XSS)
        row.append(nameSpan, textSpan);
        if (m.ts) {
          const timeSpan = document.createElement('span'); timeSpan.className = 'ct';
          timeSpan.textContent = new Date(m.ts).toLocaleTimeString(chatLang === 'id' ? 'id-ID' : 'en-US', { hour: '2-digit', minute: '2-digit' });
          row.appendChild(timeSpan);
        }
        chatMsgs.appendChild(row);
        chatMsgs.scrollTop = chatMsgs.scrollHeight;
        if (!firstLoad && !chatOpen) { unread++; setBadge(); }
      });
      onChildRemoved(chatQuery, (snap) => {   // ikut hilang dari tampilan semua orang saat cleanup 24 jam menghapusnya
        const row = chatMsgs.querySelector(`[data-key="${snap.key}"]`);
        if (row) row.remove();
        if (!chatMsgs.querySelector('.cm') && !chatEmpty) {
          chatEmpty = document.createElement('div'); chatEmpty.id = 'chat-empty';
          chatEmpty.textContent = CHAT_I18N[chatLang].emptyText;
          chatMsgs.appendChild(chatEmpty);
        }
      });
      setTimeout(() => { firstLoad = false; }, 1500);   // beri waktu batch pesan lama masuk dulu sebelum dihitung "unread"

      /* ── bersihkan pesan lebih tua dari 24 jam — RTDB tidak punya TTL bawaan, jadi disapu dari
         client tiap kali app dibuka (+ diulang tiap 30 menit selama tab tetap terbuka). Ini murni
         soal retensi data (privasi/kebersihan); tampilan tetap dibatasi limitToLast(50) di atas. */
      const DAY_MS = 24 * 60 * 60 * 1000;
      async function cleanupOldChat() {
        try {
          const cutoff = Date.now() - DAY_MS;
          const oldSnap = await get(query(ref(db, 'chat'), orderByChild('ts'), endAt(cutoff)));
          if (!oldSnap.exists()) return;
          const updates = {};
          oldSnap.forEach((child) => { updates[child.key] = null; });
          await update(ref(db, 'chat'), updates);
        } catch (e) { console.warn('gagal bersihkan pesan lama (cek Firebase Rules mengizinkan hapus):', e); }
      }
      cleanupOldChat();
      setInterval(cleanupOldChat, 30 * 60 * 1000);

      chatForm.onsubmit = (e) => {
        e.preventDefault();
        let name = chatName.value.trim().slice(0, 16);
        if (!name) {   // nama kosong → buatkan nama tamu dulu & tampilkan di kolomnya sebelum terkirim
          name = CHAT_I18N[chatLang].guestPrefix + Math.floor(Math.random() * 9000 + 1000);
          chatName.value = name;
        }
        const text = chatText.value.trim().slice(0, 200);
        if (!text) return;
        localStorage.setItem('bf-chat-name', name);
        const sentText = chatText.value;
        push(ref(db, 'chat'), { name, text, ts: serverTimestamp() })
          .then(() => { chatText.value = ''; })   // baru dikosongkan kalau memang berhasil terkirim
          .catch((err) => {
            console.error('gagal kirim pesan chat (cek Firebase Realtime Database Rules):', err);
            chatText.value = sentText;
            chatText.placeholder = chatLang === 'id' ? 'Gagal terkirim — cek Rules Firebase' : 'Failed to send — check Firebase Rules';
          });
      };
    } catch (e) {
      console.warn('online/chat (Firebase) gagal dimuat:', e);
    }
  </script>
</body>

</html>
