<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>BTC Battlefield — Live</title>
<style>
  :root{
    --bg-1:#0a0c18;
    --bg-2:#1b2050;
    --ink:#eef1fb;
    --muted:#8891b8;
    --panel:rgba(19,22,42,.82);
    --line:rgba(255,255,255,.08);
    --long:#2dd6a5;
    --short:#ff6584;
    --gold:#ffc857;
    --mono:ui-monospace,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace;
    --rounded:'SF Pro Rounded','SFRounded',ui-rounded,system-ui,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:linear-gradient(180deg,#bfe3f7 0%,#9dc077 55%,#7fa85f 100%);font-family:var(--mono);color:var(--muted)}
  canvas{display:block}
  .hud{position:fixed;z-index:10;user-select:none;-webkit-user-select:none}
  button{font-family:var(--rounded)}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;backdrop-filter:blur(10px);box-shadow:0 14px 34px rgba(0,0,0,.4)}

  .btn{background:rgba(255,255,255,.03);border:1px solid var(--line);color:var(--muted);font-size:10px;padding:5px 11px;border-radius:9px;cursor:pointer;letter-spacing:.09em;transition:border-color .15s,color .15s,background .15s}
  .btn:hover{color:var(--ink);background:rgba(255,255,255,.07)}
  .btn.active{color:var(--long);border-color:rgba(45,214,165,.5);background:rgba(45,214,165,.1)}
  .btn.warn{color:var(--short);border-color:rgba(255,101,132,.5)}

  /* ── top-left: status live sederhana, tiru referensi ── */
  #feed-badge{top:max(16px,env(safe-area-inset-top) + 12px);left:max(16px,env(safe-area-inset-left) + 12px);display:inline-flex;align-items:center;gap:7px;background:rgba(10,16,10,.5);padding:6px 12px;border-radius:7px;font-size:11px;letter-spacing:.12em;font-weight:700;color:var(--muted);font-family:var(--rounded)}
  #feed-dot{width:7px;height:7px;border-radius:50%;background:var(--muted)}
  #feed-badge.live{color:var(--long)}
  #feed-badge.live #feed-dot{background:var(--long);box-shadow:0 0 8px var(--long);animation:pulse 1.6s ease-in-out infinite}
  #feed-badge.dead{color:var(--short)}
  #feed-badge.dead #feed-dot{background:var(--short)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  #retry{display:none;margin-left:6px;padding:3px 9px;font-size:9px}

  /* ── tengah atas: harga besar mengambang di atas lapangan, kontras tinggi ── */
  #center-price{top:14%;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;z-index:9}
  #cp-value{font-size:clamp(36px,6vw,72px);font-weight:800;color:#fff;letter-spacing:-.01em;font-variant-numeric:tabular-nums;text-shadow:0 3px 0 rgba(0,0,0,.18),0 2px 4px rgba(0,0,0,.5),0 12px 30px rgba(0,0,0,.55),0 0 44px rgba(0,0,0,.35);transition:color .15s}
  #cp-value.up{color:var(--long);text-shadow:0 3px 0 rgba(0,0,0,.2),0 2px 4px rgba(0,0,0,.5),0 0 34px rgba(45,214,165,.5),0 12px 30px rgba(0,0,0,.5)}
  #cp-value.down{color:var(--short);text-shadow:0 3px 0 rgba(0,0,0,.2),0 2px 4px rgba(0,0,0,.5),0 0 34px rgba(255,101,132,.5),0 12px 30px rgba(0,0,0,.5)}
  #cp-sub{font-size:14px;font-weight:700;letter-spacing:.14em;margin-top:2px;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.55)}
  #cp-pct.up{color:var(--long)} #cp-pct.down{color:var(--short)}
  /* ── bawah tengah: tekanan pasar (panjang vs pendek), widget sendiri ── */
  #pressure{bottom:max(16px,env(safe-area-inset-bottom) + 12px);left:50%;transform:translateX(-50%);width:320px;max-width:calc(100vw - 32px);padding:11px 15px;text-align:center}
  #pp-head{font-size:9px;letter-spacing:.14em;color:var(--muted);font-weight:700;margin-bottom:8px;font-family:var(--rounded);white-space:nowrap}
  #pp-head .l{color:var(--long);font-weight:800} #pp-head .s{color:var(--short);font-weight:800}
  #pp-bar{height:7px;display:flex;overflow:hidden;border-radius:999px;background:rgba(0,0,0,.28);box-shadow:0 2px 8px rgba(0,0,0,.3)}
  #pp-long{background:var(--long);transition:width .4s}
  #pp-short{background:var(--short);transition:width .4s;flex:1}
  #pp-stats{display:flex;justify-content:space-between;margin-top:8px;font-size:10.5px;font-variant-numeric:tabular-nums}
  .pp-col.pp-s{text-align:right}
  .pp-main{font-weight:800}
  .pp-l .pp-main{color:var(--long)}
  .pp-s .pp-main{color:var(--short)}
  .pp-sub{font-size:9px;color:var(--muted);margin-top:2px;letter-spacing:.03em}

  /* ── bawah kanan: killfeed ringkas ── */
  #killfeed{bottom:max(16px,env(safe-area-inset-bottom) + 12px);right:max(16px,env(safe-area-inset-right) + 12px);width:260px;max-width:calc(100vw - 32px);padding:9px 11px;text-align:left}
  #killfeed h4{font-size:9px;letter-spacing:.24em;color:var(--muted);margin-bottom:7px;font-weight:600;font-family:var(--rounded)}
  #kills{overflow:hidden;max-height:112px}
  .kill{font-size:10px;padding:4px 8px;margin-bottom:3px;background:rgba(255,255,255,.04);border-radius:7px;border-left:2px solid;animation:slidein .25s ease-out;font-variant-numeric:tabular-nums;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .kill .kt{opacity:.55;margin-right:4px}
  .kill.buy{border-color:var(--long);color:var(--long)}
  .kill.sell{border-color:var(--short);color:var(--short)}
  .kill.liq{border-color:var(--gold);color:var(--gold)}
  .kill .tag{color:var(--gold);font-weight:700}
  @keyframes slidein{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}

  /* ── bawah kiri: controls, ringkas ── */
  #controls{bottom:max(16px,env(safe-area-inset-bottom) + 12px);left:max(16px,env(safe-area-inset-left) + 12px);font-size:9.5px;line-height:1.7;letter-spacing:.04em;padding:10px 13px;max-width:230px}
  #controls b{color:var(--ink);font-weight:600}
  #cam-row{display:flex;gap:5px;margin-bottom:7px}
  #cam-row .btn{padding:4px 8px;font-size:9px}
  #audio-btn{margin-top:7px;width:100%}

  #flash{position:fixed;inset:0;pointer-events:none;z-index:8;background:#fff;opacity:0}

  /* ── lapisan efek: angka damage melayang & streak ── */
  #fx-layer{position:fixed;inset:0;pointer-events:none;z-index:11;overflow:hidden}
  .fnum{position:absolute;transform:translate(-50%,-50%);font-family:var(--rounded);font-weight:800;font-size:15px;opacity:1;transition:transform .9s ease-out,opacity .9s ease-out;text-shadow:0 2px 8px rgba(0,0,0,.65);will-change:transform,opacity}
  .fnum.up{color:var(--long)} .fnum.dn{color:var(--short)}
  #unit-tip{position:fixed;z-index:12;pointer-events:none;background:rgba(10,16,12,.82);border:1px solid var(--line);border-radius:10px;padding:7px 10px;font-family:var(--rounded);font-size:11px;line-height:1.5;display:none;flex-direction:column;gap:1px;backdrop-filter:blur(6px);box-shadow:0 8px 22px rgba(0,0,0,.42)}
  #unit-tip.show{display:flex}
  #unit-tip b{font-size:11px;letter-spacing:.05em}
  #unit-tip b.buy{color:var(--long)} #unit-tip b.sell{color:var(--short)}
  #unit-tip span{color:var(--ink);opacity:.92;font-variant-numeric:tabular-nums}
  #unit-tip .tt{opacity:.5;font-size:10px}
  #streak{position:fixed;top:calc(14% + 118px);left:50%;transform:translateX(-50%) scale(.7);z-index:11;pointer-events:none;font-family:var(--rounded);font-weight:800;font-size:clamp(16px,2.4vw,22px);letter-spacing:.05em;opacity:0;transition:opacity .18s,transform .18s;text-shadow:0 2px 12px rgba(0,0,0,.6);white-space:nowrap}
  #streak.show{opacity:1;transform:translateX(-50%) scale(1);animation:streakPulse .5s ease-out}
  #streak.buy{color:var(--long)} #streak.sell{color:var(--short)}
  @keyframes streakPulse{0%{transform:translateX(-50%) scale(1.45)}100%{transform:translateX(-50%) scale(1)}}
  @media (prefers-reduced-motion: reduce){ .kill{animation:none} }

  @media (max-width:760px){
    #killfeed{width:165px;padding:8px 9px}
    #killfeed h4{font-size:8px}
    .kill{font-size:9px;padding:3px 6px}
    #controls .keys{display:none}
    #controls{max-width:165px;padding:9px 11px}
    #center-price{top:13%}
    #pressure{bottom:calc(max(16px,env(safe-area-inset-bottom) + 12px) + 112px);width:min(320px,90vw);padding:9px 12px}
    #pp-head{font-size:8px}
    #pp-stats{font-size:9.5px}
  }
</style>
</head>
<body>
<div id="flash"></div>
<div id="fx-layer"></div>
<div id="streak"></div>
<div id="unit-tip"></div>

<div class="hud" id="feed-badge">
  <span id="feed-dot"></span><span id="feed-text">MENYAMBUNG…</span>
  <button class="btn warn" id="retry">SAMBUNG ULANG</button>
</div>

<div class="hud" id="center-price">
  <div id="cp-value">—</div>
  <div id="cp-sub">BTC / USDT <span id="cp-pct">0.00%</span></div>
</div>

<div class="hud panel" id="pressure">
  <div id="pp-head">TEKANAN PASAR · 60 DETIK · <span class="l">PANJANG</span> <span class="vs">vs</span> <span class="s">PENDEK</span></div>
  <div id="pp-bar"><div id="pp-long" style="width:50%"></div><div id="pp-short"></div></div>
  <div id="pp-stats">
    <div class="pp-col pp-l">
      <div class="pp-main"><span id="pp-long-usd">$0</span> · <span id="pp-long-pct">50%</span></div>
      <div class="pp-sub"><span id="pp-long-cnt">0</span> order beli</div>
    </div>
    <div class="pp-col pp-s">
      <div class="pp-main"><span id="pp-short-pct">50%</span> · <span id="pp-short-usd">$0</span></div>
      <div class="pp-sub"><span id="pp-short-cnt">0</span> order jual</div>
    </div>
  </div>
</div>

<div class="hud panel" id="killfeed">
  <h4>KILLFEED</h4>
  <div id="kills"></div>
</div>

<div class="hud panel" id="controls">
  <div id="cam-row">
    <button class="btn active" data-m="0">SINEMATIK</button>
    <button class="btn" data-m="1">IKUTI</button>
    <button class="btn" data-m="2">BEBAS</button>
  </div>
  <div class="keys">
    <b>drag</b> putar · <b>scroll</b> zoom<br>
    <b>1/2/3</b> kamera · <b>WASD</b> geser · <b>Q/E</b> tinggi
  </div>
  <button class="btn" id="audio-btn">AUDIO AKTIF</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(() => {
'use strict';

/* ═══════════ CONFIG ═══════════ */
const STREAM = 'btcusdt';
const T_SHELL = 300;       // ≥ $300  → tembakan kecil terlihat
const T_HEAVY = 25000;     // ≥ $25K  → tembakan berat + sorotan
const T_WHALE = 100000;    // ≥ $100K → serangan tank
const MAX_UNITS = 30;
const CROWD_MAX = 80;      // jumlah maksimum prajurit per sisi
const CROWD_START = 48;    // jumlah awal prajurit per sisi
const C_LONG = 0x2dd6a5, C_SHORT = 0xff6584, C_GOLD = 0xffc857, C_GOLD2 = 0xff9f5a;

/* ═══════════ THREE SETUP — lapangan hijau cerah di bawah langit ═══════════ */
const SKY = 0x8fc6ec;
const scene = new THREE.Scene();
scene.background = new THREE.Color(SKY);
scene.fog = new THREE.Fog(SKY, 500, 2400);

const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 1, 6000);
const renderer = new THREE.WebGLRenderer({ antialias:true, powerPreference:'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

scene.add(new THREE.HemisphereLight(0xcfe9ff, 0x38471f, .85));
const sun = new THREE.DirectionalLight(0xfff3d6, .7);
sun.position.set(-260, 420, -180);
scene.add(sun);
const fill = new THREE.DirectionalLight(0xffffff, .18);
fill.position.set(300, 200, 260);
scene.add(fill);

/* ═══════════ LAPANGAN — rumput gelap, kontras dengan pasukan ═══════════ */
const ground = new THREE.Mesh(new THREE.PlaneGeometry(4000,4000), new THREE.MeshLambertMaterial({ color:0x4a5c30 }));
ground.rotation.x = -Math.PI/2;
scene.add(ground);

function patchTexture(){
  const c = document.createElement('canvas'); c.width=c.height=256;
  const g = c.getContext('2d');
  const r = g.createRadialGradient(128,128,0,128,128,128);
  r.addColorStop(0,'rgba(70,58,32,.4)');
  r.addColorStop(.6,'rgba(58,50,30,.2)');
  r.addColorStop(1,'rgba(58,50,30,0)');
  g.fillStyle=r; g.fillRect(0,0,256,256);
  return new THREE.CanvasTexture(c);
}
const field = new THREE.Mesh(
  new THREE.PlaneGeometry(560,440),
  new THREE.MeshBasicMaterial({ map:patchTexture(), transparent:true, depthWrite:false })
);
field.rotation.x = -Math.PI/2;
field.position.y = .4;
scene.add(field);

/* ═══════════ GARIS DEPAN & WILAYAH — bergerak mengikuti tekanan ═══════════ */
let buyShare = 0.5, frontX = 0;
const TERR_HALF = 300;
function terrPlane(color){
  const m = new THREE.Mesh(new THREE.PlaneGeometry(1,1),
    new THREE.MeshBasicMaterial({ color, transparent:true, opacity:.14, depthWrite:false }));
  m.rotation.x = -Math.PI/2; m.position.y = .45; scene.add(m); return m;
}
const buyTerr = terrPlane(C_LONG), sellTerr = terrPlane(C_SHORT);
const clashLine = new THREE.Mesh(
  new THREE.BoxGeometry(4, 3, 480),
  new THREE.MeshBasicMaterial({ color:0xffffff, transparent:true, opacity:.4, blending:THREE.AdditiveBlending, depthWrite:false })
);
clashLine.position.y = 1.4; scene.add(clashLine);

/* ═══════════ LANGIT & CUACA DINAMIS — ikut mood pasar ═══════════ */
let mood = 0, moodTarget = 0;
const SKY_STORM = new THREE.Color(0x2b3542), SKY_CALM = new THREE.Color(SKY), SKY_PUMP = new THREE.Color(0xffd9a3);
const _sky = new THREE.Color();
function weatherPoints(n, color, size, additive){
  const g = new THREE.BufferGeometry();
  const p = new Float32Array(n*3), v = new Float32Array(n);
  for (let i=0;i<n;i++){
    p[i*3]=(Math.random()-.5)*900; p[i*3+1]=Math.random()*320; p[i*3+2]=(Math.random()-.5)*700;
    v[i]=.5+Math.random();
  }
  g.setAttribute('position', new THREE.BufferAttribute(p,3));
  const mat = new THREE.PointsMaterial({ color, size, transparent:true, opacity:0, depthWrite:false });
  if (additive) mat.blending = THREE.AdditiveBlending;
  const m = new THREE.Points(g, mat); scene.add(m);
  return { m, v, n, attr:g.attributes.position };
}
const rain = weatherPoints(520, 0xcfe0ff, 2.2, false);
const embers = weatherPoints(280, 0xffc46b, 3.4, true);

/* ═══════════ TEXTURES / GEOMETRY BERSAMA ═══════════ */
function glowTexture(){
  const c = document.createElement('canvas'); c.width=c.height=64;
  const g = c.getContext('2d');
  const r = g.createRadialGradient(32,32,0,32,32,32);
  r.addColorStop(0,'rgba(255,255,255,1)');
  r.addColorStop(.35,'rgba(255,255,255,.55)');
  r.addColorStop(1,'rgba(255,255,255,0)');
  g.fillStyle=r; g.fillRect(0,0,64,64);
  return new THREE.CanvasTexture(c);
}
const GLOW = glowTexture();
const ringGeo = new THREE.RingGeometry(1, 1.35, 48);
const IDENT_Q = new THREE.Quaternion();

/* gabung beberapa BufferGeometry (posisi+normal) jadi satu — tanpa lib eksternal */
function mergeGeoms(geoms){
  const nn = geoms.map(g => g.index ? g.toNonIndexed() : g);
  let count = 0;
  for (const g of nn) count += g.attributes.position.count;
  const pos = new Float32Array(count*3), nor = new Float32Array(count*3);
  let o = 0;
  for (const g of nn){
    pos.set(g.attributes.position.array, o);
    nor.set(g.attributes.normal.array, o);
    o += g.attributes.position.count*3;
  }
  const out = new THREE.BufferGeometry();
  out.setAttribute('position', new THREE.BufferAttribute(pos,3));
  out.setAttribute('normal', new THREE.BufferAttribute(nor,3));
  return out;
}
function boxPart(w,h,d, x,y,z){ const g = new THREE.BoxGeometry(w,h,d); g.translate(x,y,z); return g; }
/* prajurit kartun memegang senapan, kaki di y=0, menghadap +x */
function buildSoldier(){
  const parts = [
    boxPart(0.7,3.0,0.7,  0,1.5,-0.6),   // kaki kiri
    boxPart(0.7,3.0,0.7,  0,1.5, 0.6),   // kaki kanan
    boxPart(1.5,3.4,2.1,  0,4.6, 0),     // badan
    boxPart(0.7,1.3,0.7,  0,6.7, 0),     // leher
    boxPart(1.3,1.3,1.3,  0.05,7.5,0),   // kepala
    boxPart(1.8,0.5,2.0,  0,8.2, 0),     // helm
    boxPart(0.8,0.28,2.0, 0.95,8.0,0),   // pinggir helm depan
    boxPart(1.9,0.55,0.6, 0.9,4.9,-0.85),// lengan belakang
    boxPart(1.9,0.55,0.6, 0.9,4.9, 0.85),// lengan depan
    boxPart(3.7,0.35,0.35,2.2,4.7,0.55), // laras senapan
    boxPart(0.9,0.8,0.4,  0.9,4.3,0.55), // magasin
  ];
  const geo = mergeGeoms(parts);
  parts.forEach(p=>p.dispose());
  return geo;
}

/* penanda kematian: kepulan debu lembut (bukan emoji) */
const puffMat = new THREE.SpriteMaterial({ map:GLOW, color:0x2a2620, transparent:true, opacity:.5, depthWrite:false });
const skulls = [];
function spawnSkull(pos){
  const spr = new THREE.Sprite(puffMat.clone());
  spr.position.set(pos.x, 4, pos.z);
  spr.scale.set(.1,.1,1);
  scene.add(spr);
  skulls.push({ spr, t:0, dur:.7 });
}

/* ═══════════ PASUKAN — prajurit kartun yang saling menembak ═══════════ */
const soldierGeo = buildSoldier();
const smx = new THREE.Matrix4(), spos = new THREE.Vector3(), sscl = new THREE.Vector3();
const sq = new THREE.Quaternion(), toppleQ = new THREE.Quaternion(), AXIS_Z = new THREE.Vector3(0,0,1);

function makeCrowd(color, sign){ // sign: -1 = beli (kiri), 1 = jual (kanan)
  const mat = new THREE.MeshLambertMaterial({ color, emissive:color, emissiveIntensity:.42 });
  const mesh = new THREE.InstancedMesh(soldierGeo, mat, CROWD_MAX);
  mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
  scene.add(mesh);
  const q = new THREE.Quaternion();
  if (sign>0) q.setFromAxisAngle(new THREE.Vector3(0,1,0), Math.PI); // sisi kanan menghadap kiri
  const slots = [];
  for (let i=0;i<CROWD_MAX;i++){
    const x = sign*(40 + Math.random()*120);
    const z = (Math.random()-.5)*230;
    slots.push({
      base: new THREE.Vector3(x,0,z),
      spawnFrom: new THREE.Vector3(x+sign*170, 0, z+(Math.random()-.5)*50),
      active: i<CROWD_START,
      dying:false, dieT:0,
      walking:i<CROWD_START, walkT:0,
      phase: Math.random()*Math.PI*2,
    });
  }
  return { mesh, slots, count:CROWD_START, q, sign };
}
const buyCrowd = makeCrowd(C_LONG, -1);
const sellCrowd = makeCrowd(C_SHORT, 1);

function killSoldier(crowd, n){
  for (let k=0;k<n;k++){
    let idx=-1;
    for (let i=0;i<crowd.slots.length;i++){ if (crowd.slots[i].active && !crowd.slots[i].dying){ idx=i; if (Math.random()<.4) break; } }
    if (idx<0) break;
    const s = crowd.slots[idx];
    s.dying = true; s.dieT = 0;
    crowd.count = Math.max(0, crowd.count-1);
    spawnSkull(s.base);
  }
}
function reviveSoldier(crowd){
  if (crowd.count >= CROWD_MAX) return;
  let idx=-1;
  for (let i=0;i<crowd.slots.length;i++){ if (!crowd.slots[i].active && !crowd.slots[i].dying){ idx=i; if (Math.random()<.4) break; } }
  if (idx<0) return;
  const s = crowd.slots[idx];
  s.active = true; s.walking = true; s.walkT = 0;
  crowd.count++;
}
function resetCrowd(crowd){
  crowd.count = CROWD_START;
  crowd.slots.forEach((s,i)=>{
    s.active = i<CROWD_START;
    s.dying = false; s.dieT = 0;
    s.walking = i<CROWD_START; s.walkT = 0;
  });
}
function updateCrowd(crowd, dt, t){
  const bias = crowd.pressBias || 0;
  for (let i=0;i<crowd.slots.length;i++){
    const s = crowd.slots[i];
    let x = s.base.x + bias, z = s.base.z, sc = 0, bob = 0, topple = 0;

    if (s.dying){
      s.dieT = Math.min(1, s.dieT + dt*2.6);
      topple = Math.min(1, s.dieT*1.5) * 1.5 * crowd.sign;   // tumbang ke belakang
      sc = s.dieT < .55 ? 1 : Math.max(0, 1-(s.dieT-.55)/.45);
      bob = -s.dieT*1.2;
      if (s.dieT>=1){ s.dying=false; s.active=false; }
    } else if (s.walking){
      s.walkT = Math.min(1, s.walkT + dt*.75);
      const e = 1-(1-s.walkT)*(1-s.walkT);
      x = s.spawnFrom.x + (s.base.x+bias-s.spawnFrom.x)*e;
      z = s.spawnFrom.z + (s.base.z-s.spawnFrom.z)*e;
      bob = Math.abs(Math.sin(t*9+s.phase))*.9;
      sc = 1;
      if (s.walkT>=1) s.walking=false;
    } else if (s.active){
      bob = Math.abs(Math.sin(t*2.4+s.phase))*.45;   // ayun ringan berdiri
      sc = 1;
    }

    // jangan biarkan prajurit melewati garis depan ke wilayah lawan
    if (crowd.sign < 0) x = Math.min(x, frontX - 16);
    else                x = Math.max(x, frontX + 16);

    if (sc <= .002 && !s.active && !s.dying) sscl.set(.0001,.0001,.0001);
    else sscl.set(sc, sc, sc);
    sq.copy(crowd.q);
    if (topple){ toppleQ.setFromAxisAngle(AXIS_Z, topple); sq.premultiply(toppleQ); }
    spos.set(x, bob, z);
    smx.compose(spos, sq, sscl);
    crowd.mesh.setMatrixAt(i, smx);
  }
  crowd.mesh.instanceMatrix.needsUpdate = true;
}

/* ═══════════ AUDIO — sederhana, satu tombol ═══════════ */
let AC=null, masterG, musicG, sfxG, musicNodes=[];
let audioOn = false;
const audioBtn = document.getElementById('audio-btn');
const MUSIC_LEVEL = .38, SFX_LEVEL = .34;

function initAudio(){
  AC = new (window.AudioContext||window.webkitAudioContext)();
  masterG = AC.createGain(); masterG.connect(AC.destination);
  musicG = AC.createGain(); musicG.gain.value = MUSIC_LEVEL; musicG.connect(masterG);
  sfxG = AC.createGain(); sfxG.gain.value = SFX_LEVEL; sfxG.connect(masterG);
  startMusic();
}

/* musik ambient generatif: drone lembut + pad berganti akor */
const CHORDS = [ [55,82.4,110,164.8], [49,73.4,98,146.8], [58.3,87.3,116.5,174.6], [43.7,65.4,87.3,130.8] ];
const MELODY = [0,2,1,3,2,1,3,2];   // pola arpeggio melintasi nada akor
let chordIdx = 0, chordTimer = null, seqTimer = null, seqStep = 0;
function playPluck(freq, when, level, dur){
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = 'triangle'; o.frequency.value = freq;
  g.gain.setValueAtTime(.0001, when);
  g.gain.exponentialRampToValueAtTime(level, when+.02);
  g.gain.exponentialRampToValueAtTime(.0001, when+dur);
  o.connect(g).connect(musicG); o.start(when); o.stop(when+dur+.05);
}
function startMusic(){
  const lp = AC.createBiquadFilter();
  lp.type='lowpass'; lp.frequency.value=420; lp.Q.value=.7;
  lp.connect(musicG);
  const lfo = AC.createOscillator(), lfoG = AC.createGain();
  lfo.frequency.value=.06; lfoG.gain.value=180;
  lfo.connect(lfoG).connect(lp.frequency); lfo.start();
  musicNodes = CHORDS[0].map((f,i)=>{
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = i<2 ? 'sawtooth' : 'triangle';
    o.frequency.value = f;
    o.detune.value = (Math.random()-.5)*8;
    g.gain.value = i<2 ? .05 : .035;
    o.connect(g).connect(lp);
    o.start();
    return { o, g };
  });
  // desis angin
  const buf = AC.createBuffer(1, AC.sampleRate*2, AC.sampleRate);
  const ch = buf.getChannelData(0);
  for (let i=0;i<ch.length;i++) ch[i] = (Math.random()*2-1)*.3;
  const noise = AC.createBufferSource(); noise.buffer=buf; noise.loop=true;
  const nf = AC.createBiquadFilter(); nf.type='bandpass'; nf.frequency.value=300; nf.Q.value=.4;
  const ng = AC.createGain(); ng.gain.value=.02;
  noise.connect(nf).connect(ng).connect(musicG);
  noise.start();
  chordTimer = setInterval(()=>{
    chordIdx = (chordIdx+1)%CHORDS.length;
    const t = AC.currentTime;
    musicNodes.forEach((n,i)=> n.o.frequency.exponentialRampToValueAtTime(CHORDS[chordIdx][i], t+4));
  }, 9000);

  // arpeggio melodi lembut + nada bas — bikin terasa seperti musik latar
  seqTimer = setInterval(()=>{
    if (!audioOn || !AC) return;
    const now = AC.currentTime + .06;
    const chord = CHORDS[chordIdx];
    const idx = MELODY[seqStep % MELODY.length] % chord.length;
    playPluck(chord[idx]*4, now, .10, .6);               // melodi (dua oktaf di atas)
    if (seqStep % 2 === 0) playPluck(chord[idx]*8, now+.14, .045, .32); // gema tipis
    if (seqStep % 4 === 0) playPluck(chord[0]*2, now, .11, .8);         // bas akar
    seqStep++;
  }, 300);
}
audioBtn.onclick = ()=>{
  if (!AC){ initAudio(); audioOn = true; }
  else {
    audioOn = !audioOn;
    if (audioOn) AC.resume(); else AC.suspend();
  }
  audioBtn.textContent = audioOn ? 'AUDIO AKTIF' : 'AKTIFKAN AUDIO';
  audioBtn.classList.toggle('active', audioOn);
};

/* audio aktif otomatis — browser mensyaratkan satu gestur pengguna
   sebelum AudioContext bisa benar-benar bersuara, jadi kita siapkan
   di awal lalu resume pada interaksi pertama apa pun */
initAudio();
audioOn = true;
audioBtn.textContent = 'AUDIO AKTIF';
audioBtn.classList.add('active');
/* Browser memblokir suara sampai ada satu interaksi pengguna. Kita coba
   resume sedini mungkin pada gerakan/gesture apa pun (bergerak mouse,
   scroll, sentuh, tekan tombol) supaya musik nyala secepatnya. */
const RESUME_EVENTS = ['pointerdown','pointermove','keydown','touchstart','wheel','scroll','click'];
const resumeAudioOnce = ()=>{
  if (AC && AC.state === 'suspended'){ AC.resume(); }
  if (AC && AC.state === 'running') RESUME_EVENTS.forEach(ev=>removeEventListener(ev, resumeAudioOnce));
};
RESUME_EVENTS.forEach(ev=>addEventListener(ev, resumeAudioOnce, { passive:true }));
if (AC) AC.resume().catch(()=>{});   // sebagian browser mengizinkan langsung

function playBoom(mag, tier){
  if (!audioOn || !AC) return;
  const t = AC.currentTime;
  // sub thump
  const o = AC.createOscillator(), g = AC.createGain();
  o.type='sine';
  o.frequency.setValueAtTime(tier===2 ? 60 : 90+mag*60, t);
  o.frequency.exponentialRampToValueAtTime(24, t+.5+mag*.4);
  g.gain.setValueAtTime(.001,t);
  g.gain.exponentialRampToValueAtTime(.14+mag*.25, t+.015);
  g.gain.exponentialRampToValueAtTime(.001, t+.6+mag*.5);
  o.connect(g).connect(sfxG); o.start(t); o.stop(t+1.3);
  // debris noise
  const dur = .3+mag*.5;
  const buf = AC.createBuffer(1, AC.sampleRate*dur, AC.sampleRate);
  const ch = buf.getChannelData(0);
  for (let i=0;i<ch.length;i++) ch[i] = (Math.random()*2-1)*Math.pow(1-i/ch.length,2);
  const src = AC.createBufferSource(); src.buffer=buf;
  const f = AC.createBiquadFilter(); f.type='lowpass'; f.frequency.value=1200+mag*2500;
  const ng = AC.createGain(); ng.gain.value=.1+mag*.2;
  src.connect(f).connect(ng).connect(sfxG); src.start(t);
}
function playChargeHorn(){
  if (!audioOn || !AC) return;
  const t = AC.currentTime;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type='square';
  o.frequency.setValueAtTime(46, t);
  o.frequency.linearRampToValueAtTime(66, t+1.2);
  o.frequency.linearRampToValueAtTime(40, t+2.2);
  const f = AC.createBiquadFilter(); f.type='lowpass'; f.frequency.value=240;
  g.gain.setValueAtTime(.001,t);
  g.gain.exponentialRampToValueAtTime(.16, t+.3);
  g.gain.exponentialRampToValueAtTime(.001, t+2.4);
  o.connect(f).connect(g).connect(sfxG);
  o.start(t); o.stop(t+2.5);
}
function playVolley(tier){
  if (!audioOn || !AC) return;
  const t0 = AC.currentTime;
  const shots = tier===2 ? 5 : tier===1 ? 3 : 1;
  for (let i=0;i<shots;i++){
    const t = t0 + i*(.02+Math.random()*.03);
    const dur = .06;
    const buf = AC.createBuffer(1, AC.sampleRate*dur, AC.sampleRate);
    const ch = buf.getChannelData(0);
    for (let j=0;j<ch.length;j++) ch[j] = (Math.random()*2-1)*Math.pow(1-j/ch.length,3);
    const src = AC.createBufferSource(); src.buffer = buf;
    const f = AC.createBiquadFilter(); f.type='highpass'; f.frequency.value=900;
    const g = AC.createGain(); g.gain.value = .045+Math.random()*.03;
    src.connect(f).connect(g).connect(sfxG); src.start(t);
  }
}
function playCheer(){
  if (!audioOn || !AC) return;
  const t = AC.currentTime;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type='triangle';
  o.frequency.setValueAtTime(520, t);
  o.frequency.exponentialRampToValueAtTime(880, t+.14);
  g.gain.setValueAtTime(.0001, t);
  g.gain.exponentialRampToValueAtTime(.12, t+.03);
  g.gain.exponentialRampToValueAtTime(.0001, t+.3);
  o.connect(g).connect(sfxG); o.start(t); o.stop(t+.32);
}

/* ═══════════ DATA FEED — REAL (Binance) atau DUMMY (simulasi lokal) ═══════════ */
const priceEl = document.getElementById('cp-value');
const cpPctEl = document.getElementById('cp-pct');
const badgeEl = document.getElementById('feed-badge');
const badgeTextEl = document.getElementById('feed-text');
const retryBtn = document.getElementById('retry');

let price = NaN, lastPrice = NaN, pct24 = 0;
let ws = null, wsLiq = null, wsTicker = null, live = false, retries = 0, connectGuard = null;

/* persentase perubahan 24 jam dari ticker Binance (bukan sejak halaman dibuka) */
function updatePct(){
  cpPctEl.textContent = (pct24>=0?'▲ ':'▼ ')+Math.abs(pct24).toFixed(2)+'%';
  cpPctEl.className = pct24>=0 ? 'up':'down';
}

function onTrade(p, qty, isBuy){
  lastPrice = price; price = p;
  const usd = p*qty;
  flow.push({ t:performance.now(), usd, buy:isBuy });
  priceEl.textContent = '$'+p.toLocaleString('en-US',{ maximumFractionDigits: p<10?4:2 });
  priceEl.className = pct24>=0 ? 'up':'down';

  const side = isBuy ? 'buy' : 'sell';
  const defender = isBuy ? sellCrowd : buyCrowd;
  const tier = usd>=T_WHALE ? 2 : usd>=T_HEAVY ? 1 : 0;
  const killed = tier===2 ? 10 : tier===1 ? 4 : 1;
  bumpStreak(side);
  if (usd >= T_WHALE){
    spawnBigUnit(side, usd);
    fireVolley(side, 2, Math.min(killed, 12));
    addShake(3); addHitstop(.11);
  } else if (usd >= T_SHELL){
    fireVolley(side, tier, killed);        // peluru yang membunuh saat mendarat
    if (tier===1){ addShake(1.1); addHitstop(.04); }
  } else {
    killSoldier(defender, killed);          // order kecil: tumbang seketika
  }
  logKill(side, qty, killed, tier===2?'PAUS':null);
}

function setBadge(state){
  badgeEl.className = 'hud' + (state==='connecting' ? '' : ' '+state);
  badgeTextEl.textContent = state==='live'?'LANGSUNG':state==='dead'?'TERPUTUS':'MENYAMBUNG…';
  retryBtn.style.display = state==='dead' ? 'inline-block' : 'none';
}

function connect(){
  disconnect();
  setBadge('connecting');

  /* spot aggTrade — semua transaksi buy/sell */
  try { ws = new WebSocket(`wss://stream.binance.com:9443/ws/${STREAM}@aggTrade`); }
  catch(e){ setBadge('dead'); return; }
  connectGuard = setTimeout(()=>{ if(!live){ setBadge('dead'); autoRetry(); } }, 6000);
  ws.onmessage = (ev)=>{
    if (!live){ live=true; retries=0; clearTimeout(connectGuard); setBadge('live'); }
    try {
      const d = JSON.parse(ev.data);
      onTrade(parseFloat(d.p), parseFloat(d.q), d.m===false); /* m=false → taker beli (long) */
    } catch(e){}
  };
  ws.onerror = ()=>{ clearTimeout(connectGuard); if(!live){ setBadge('dead'); autoRetry(); } };
  ws.onclose = ()=>{ if(live){ live=false; setBadge('dead'); autoRetry(); } };

  /* ticker 24 jam — persentase naik/turun harga selama 24 jam terakhir */
  try {
    wsTicker = new WebSocket(`wss://stream.binance.com:9443/ws/${STREAM}@ticker`);
    wsTicker.onmessage = (ev)=>{
      try { const d = JSON.parse(ev.data); pct24 = parseFloat(d.P); updatePct(); if (!isFinite(price)) priceEl.className = pct24>=0?'up':'down'; } catch(e){}
    };
  } catch(e){}

  /* futures forceOrder — likuidasi long/short sungguhan */
  try {
    wsLiq = new WebSocket(`wss://fstream.binance.com/ws/${STREAM}@forceOrder`);
    wsLiq.onmessage = (ev)=>{
      try {
        const o = JSON.parse(ev.data).o;
        const qty = parseFloat(o.q);
        const usd = parseFloat(o.ap)*qty;
        const isBuy = o.S === 'BUY'; /* BUY = short terlikuidasi */
        const side = isBuy ? 'buy' : 'sell';
        const n = usd>=T_WHALE ? 10 : 4;
        killSoldier(isBuy?sellCrowd:buyCrowd, n);
        const pos = new THREE.Vector3((side==='buy'?1:-1)*(20+Math.random()*80), 0, (Math.random()-.5)*200);
        explode(pos, isBuy?C_GOLD:C_GOLD2, Math.min(1, Math.log10(usd/1000+1)/2.5), usd>=T_WHALE?2:1);
        logKill(side, qty, n, 'LIKUIDASI');
      } catch(e){}
    };
  } catch(e){}
}
function disconnect(){
  live = false;
  if (connectGuard){ clearTimeout(connectGuard); connectGuard = null; }
  for (const s of [ws, wsLiq, wsTicker]){
    if (s){ s.onclose=null; s.onerror=null; s.onmessage=null; try{s.close();}catch(e){} }
  }
  ws = wsLiq = wsTicker = null;
}
function autoRetry(){
  if (retries >= 5) return;
  retries++;
  setTimeout(()=>{ if(!live) connect(); }, 4000);
}
retryBtn.onclick = ()=>{ retries=0; connect(); };

/* stats tiap detik */
setInterval(meterUpdate, 1000);

/* ═══════════ CAMERA — statis & sederhana, seluruh lapangan langsung terlihat ═══════════ */
let camMode = 0;
const orbit = { theta:.22, phi:.4, radius:540, target:new THREE.Vector3(0,10,0) };
const followPos = new THREE.Vector3(0,10,0);
const keys = {};
function setCamMode(m){
  camMode = m;
  document.querySelectorAll('.btn[data-m]').forEach(b=>b.classList.toggle('active', +b.dataset.m===m));
}
document.querySelectorAll('.btn[data-m]').forEach(b=> b.onclick=()=>setCamMode(+b.dataset.m));
addEventListener('keydown', e=>{
  if (e.key==='1') setCamMode(0);
  if (e.key==='2') setCamMode(1);
  if (e.key==='3') setCamMode(2);
  keys[e.key.toLowerCase()] = true;
});
addEventListener('keyup', e=> keys[e.key.toLowerCase()]=false);

let dragging=false, lx=0, ly=0, pinchD=0, downX=0, downY=0, downT=0, moved=false;
const cv = renderer.domElement;
cv.addEventListener('pointerdown', e=>{
  dragging=true; lx=e.clientX; ly=e.clientY;
  downX=e.clientX; downY=e.clientY; downT=performance.now(); moved=false;
});
addEventListener('pointerup', e=>{
  dragging=false;
  if (!moved && performance.now()-downT < 400) onTap(e);   // ketukan (bukan geser)
});
addEventListener('pointermove', e=>{
  if (!dragging){ hoverUnit(e); return; }
  const dx=e.clientX-lx, dy=e.clientY-ly;
  if (!moved && Math.abs(e.clientX-downX)+Math.abs(e.clientY-downY) > 6){ moved=true; if(camMode!==2) setCamMode(2); }
  if (moved){
    orbit.theta -= dx*.005;
    orbit.phi = Math.min(1.35, Math.max(.2, orbit.phi + dy*.004));
  }
  lx=e.clientX; ly=e.clientY;
});
cv.addEventListener('wheel', e=>{
  e.preventDefault();
  orbit.radius = Math.min(1400, Math.max(140, orbit.radius*(1+Math.sign(e.deltaY)*.08)));
  if(camMode!==2) setCamMode(2);
}, { passive:false });
cv.addEventListener('touchmove', e=>{
  if (e.touches.length===2){
    const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    if (pinchD) orbit.radius = Math.min(1400, Math.max(140, orbit.radius*pinchD/d));
    pinchD = d;
    if(camMode!==2) setCamMode(2);
  }
}, { passive:true });
cv.addEventListener('touchend', ()=>pinchD=0);

/* ═══════════ INTERAKSI — periksa unit paus & sorak di lapangan ═══════════ */
const raycaster = new THREE.Raycaster();
const ndc = new THREE.Vector2();
const groundPlane = new THREE.Plane(new THREE.Vector3(0,1,0), 0);
const _hitPt = new THREE.Vector3();
const tip = document.getElementById('unit-tip');
let pinnedT = 0;

function setRay(e){ ndc.x=(e.clientX/innerWidth)*2-1; ndc.y=-(e.clientY/innerHeight)*2+1; raycaster.setFromCamera(ndc, camera); }
function pickUnit(e){
  if (!bigUnitObjs.length) return null;
  setRay(e);
  const hits = raycaster.intersectObjects(bigUnitObjs, true);
  if (!hits.length) return null;
  let o = hits[0].object;
  while (o && !(o.userData && o.userData.pick)) o = o.parent;
  return o;
}
function showTip(u, x, y){
  const d = u.userData;
  tip.innerHTML =
    `<b class="${d.side}">ORDER ${d.side==='buy'?'BELI':'JUAL'} BESAR</b>` +
    `<span>${fmtUsd(d.usd)}</span>` +
    `<span>@ $${d.price.toLocaleString('en-US',{ maximumFractionDigits:2 })}</span>` +
    `<span class="tt">${new Date(d.ts).toLocaleTimeString('id-ID')}</span>`;
  tip.style.left = Math.min(innerWidth-150, x+14) + 'px';
  tip.style.top  = Math.max(8, y-8) + 'px';
  tip.classList.add('show');
}
function hideTip(){ tip.classList.remove('show'); }
function hoverUnit(e){
  const u = pickUnit(e);
  if (u){ showTip(u, e.clientX, e.clientY); cv.style.cursor='pointer'; }
  else { cv.style.cursor=''; if (performance.now() > pinnedT) hideTip(); }
}
function spawnCheer(pos){
  const rm = new THREE.Mesh(ringGeo, new THREE.MeshBasicMaterial({ color:C_GOLD, transparent:true, opacity:.7, side:THREE.DoubleSide, blending:THREE.AdditiveBlending, depthWrite:false }));
  rm.rotation.x = -Math.PI/2; rm.position.copy(pos); rm.position.y = 1.5;
  scene.add(rm);
  rings.push({ rm, t:0, dur:.7, max:16 });
  playCheer();
}
function onTap(e){
  const u = pickUnit(e);
  if (u){ showTip(u, e.clientX, e.clientY); pinnedT = performance.now()+1800; return; }
  setRay(e);
  if (raycaster.ray.intersectPlane(groundPlane, _hitPt)) spawnCheer(_hitPt);
}

/* ═══════════ MAIN LOOP ═══════════ */
const clock = new THREE.Clock();
let regenTimer = 1;
function tick(){
  requestAnimationFrame(tick);
  const dt = Math.min(clock.getDelta(), .05);
  const t = clock.elapsedTime;
  if (hitstop > 0) hitstop -= dt;
  const sdt = hitstop > 0 ? dt*0.12 : dt;   // jeda hantam melambatkan simulasi sesaat

  // garis depan bergerak mengikuti tekanan; pasukan maju/mundur
  const targetFront = (buyShare-0.5)*2*180;
  frontX += (targetFront - frontX)*Math.min(1, dt*0.8);
  buyCrowd.pressBias = frontX*0.55;
  sellCrowd.pressBias = frontX*0.55;
  const bw = Math.max(2, frontX + TERR_HALF);
  buyTerr.scale.set(bw, 480, 1);  buyTerr.position.x = -TERR_HALF + bw/2;
  const sw = Math.max(2, TERR_HALF - frontX);
  sellTerr.scale.set(sw, 480, 1); sellTerr.position.x = frontX + sw/2;
  clashLine.position.x = frontX;
  clashLine.material.color.setHex(buyShare>=0.5 ? C_LONG : C_SHORT);
  clashLine.material.opacity = .3 + Math.abs(buyShare-0.5)*1.1 + Math.sin(t*4)*.05;

  // langit & cuaca ikut mood
  mood += (moodTarget - mood)*Math.min(1, dt*0.5);
  _sky.copy(SKY_CALM);
  if (mood < 0) _sky.lerp(SKY_STORM, -mood); else _sky.lerp(SKY_PUMP, mood);
  scene.background.copy(_sky); scene.fog.color.copy(_sky);
  sun.intensity = .7 + mood*.22;
  sun.color.setHex(mood < 0 ? 0xa7bcd6 : 0xfff0cf);
  const rainOp = Math.max(0, -mood), embOp = Math.max(0, mood);
  rain.m.material.opacity = rainOp*.55;
  if (rainOp > .02){
    const a = rain.attr.array;
    for (let i=0;i<rain.n;i++){
      a[i*3+1] -= (320+rain.v[i]*520)*dt;
      if (a[i*3+1] < 0){ a[i*3+1]=320; a[i*3]=(Math.random()-.5)*900; a[i*3+2]=(Math.random()-.5)*700; }
    }
    rain.attr.needsUpdate = true;
  }
  embers.m.material.opacity = embOp*.75;
  if (embOp > .02){
    const a = embers.attr.array;
    for (let i=0;i<embers.n;i++){
      a[i*3+1] += (28+embers.v[i]*58)*dt;
      a[i*3]   += Math.sin(t*1.3+i)*7*dt;
      if (a[i*3+1] > 320){ a[i*3+1]=0; a[i*3]=(Math.random()-.5)*900; a[i*3+2]=(Math.random()-.5)*700; }
    }
    embers.attr.needsUpdate = true;
  }
  if (mood < -.55 && Math.random() < dt*.5){   // petir saat badai
    const f = document.getElementById('flash');
    f.style.transition='none'; f.style.opacity=.45;
    requestAnimationFrame(()=>{ f.style.transition='opacity .4s'; f.style.opacity=0; });
  }

  updateCrowd(buyCrowd, sdt, t);
  updateCrowd(sellCrowd, sdt, t);
  regenTimer -= dt;
  if (regenTimer <= 0){
    regenTimer = .11;
    reviveSoldier(Math.random()<.5 ? buyCrowd : sellCrowd);
  }

  for (let i=skulls.length-1;i>=0;i--){
    const s = skulls[i];
    s.t += sdt/s.dur;
    if (s.t>=1){ scene.remove(s.spr); s.spr.material.dispose(); skulls.splice(i,1); continue; }
    const e = s.t<.3 ? s.t/.3 : 1;
    const g = 3 + e*3.5;
    s.spr.scale.set(g, g, 1);
    s.spr.position.y = 4 + s.t*6;
    s.spr.material.opacity = (s.t<.4 ? .5 : .5*(1-(s.t-.4)/.6));
  }

  for (let i=units.length-1;i>=0;i--){
    const u = units[i];
    u.t += sdt/u.dur;
    if (u.t>=1){
      scene.remove(u.obj);
      if (u.tier!==2 && u.obj.material) u.obj.material.dispose();
      else { const bi = bigUnitObjs.indexOf(u.obj); if (bi>=0) bigUnitObjs.splice(bi,1); }
      explode(u.end, u.color, u.mag, u.tier);
      units.splice(i,1); continue;
    }
    const k = u.t;
    if (u.tier===2){
      u.obj.position.lerpVectors(u.start, u.end, k);
      u.obj.position.y = Math.abs(Math.sin(t*6 + u.start.z))*1.1;
    } else {
      u.obj.position.lerpVectors(u.start, u.end, k);
      u.obj.position.y = u.start.y + Math.sin(k*Math.PI)*u.apex;
    }
  }

  // peluru pelacak
  for (let i=bullets.length-1;i>=0;i--){
    const b = bullets[i];
    const step = b.speed*sdt;
    b.traveled += step;
    b.pos.addScaledVector(b.vel, step);
    _bdir.copy(b.vel);
    _bq.setFromUnitVectors(AXIS_X, _bdir);
    b.m.quaternion.copy(_bq);
    b.m.position.copy(b.pos);
    b.m.scale.set(16, .55, .55);
    if (b.traveled >= b.dist){
      makeSpark(b.target, b.color, 13, .2);
      if (b.kills){
        killSoldier(b.defender, 1);
        spawnSkull(b.target);
        floatNum(b.target, '-1', b.side==='buy'?'up':'dn');
        addShake(.35);
      }
      scene.remove(b.m);
      bullets.splice(i,1);
    }
  }

  // percikan / kilatan moncong
  for (let i=sparks.length-1;i>=0;i--){
    const s = sparks[i];
    s.t += sdt/s.dur;
    if (s.t>=1){ scene.remove(s.spr); s.spr.material.dispose(); sparks.splice(i,1); continue; }
    const g = s.size*(1 + s.t*1.3);
    s.spr.scale.set(g,g,1);
    s.spr.material.opacity = 1-s.t;
  }

  for (let i=booms.length-1;i>=0;i--){
    const b = booms[i];
    b.t += dt/b.dur;
    if (b.t>=1){ scene.remove(b.pts); b.pts.geometry.dispose(); b.pts.material.dispose(); booms.splice(i,1); continue; }
    const pos = b.pts.geometry.attributes.position;
    for (let j=0;j<b.vel.length;j++){
      b.vel[j].y -= 160*dt;
      pos.array[j*3]   += b.vel[j].x*dt;
      pos.array[j*3+1] = Math.max(1, pos.array[j*3+1]+b.vel[j].y*dt);
      pos.array[j*3+2] += b.vel[j].z*dt;
    }
    pos.needsUpdate = true;
    b.pts.material.opacity = 1-b.t;
  }

  for (let i=rings.length-1;i>=0;i--){
    const r = rings[i];
    r.t += dt/r.dur;
    if (r.t>=1){ scene.remove(r.rm); r.rm.material.dispose(); rings.splice(i,1); continue; }
    const s = 1 + r.t*r.max;
    r.rm.scale.set(s,s,1);
    r.rm.material.opacity = .8*(1-r.t);
  }

  if (camMode===0){
    orbit.theta = .22 + Math.sin(t*.05)*.12;
    orbit.phi = .4 + Math.sin(t*.08)*.03;
    orbit.radius += (540-orbit.radius)*dt*.6;
    orbit.target.lerp(new THREE.Vector3(0,10,0), dt);
  } else if (camMode===1){
    followPos.lerp(lastImpact, dt*2.2);
    orbit.target.lerp(new THREE.Vector3(followPos.x,15,followPos.z), dt*2.2);
    orbit.radius += (340-orbit.radius)*dt*.8;
  } else {
    const sp = 300*dt;
    const fwd = new THREE.Vector3(Math.sin(orbit.theta),0,Math.cos(orbit.theta));
    const rgt = new THREE.Vector3(fwd.z,0,-fwd.x);
    if (keys['w']) orbit.target.addScaledVector(fwd,-sp);
    if (keys['s']) orbit.target.addScaledVector(fwd, sp);
    if (keys['a']) orbit.target.addScaledVector(rgt,-sp);
    if (keys['d']) orbit.target.addScaledVector(rgt, sp);
    if (keys['q']) orbit.target.y = Math.max(5, orbit.target.y-sp);
    if (keys['e']) orbit.target.y += sp;
  }
  camera.position.set(
    orbit.target.x + orbit.radius*Math.cos(orbit.phi)*Math.sin(orbit.theta),
    orbit.target.y + orbit.radius*Math.sin(orbit.phi),
    orbit.target.z + orbit.radius*Math.cos(orbit.phi)*Math.cos(orbit.theta)
  );
  camera.lookAt(orbit.target);
  if (shake > .01){
    const k = shake * (orbit.radius/540);
    camera.position.x += (Math.random()-.5)*k*2.2;
    camera.position.y += (Math.random()-.5)*k*2.2;
    camera.position.z += (Math.random()-.5)*k*2.2;
    shake = Math.max(0, shake - dt*14);
  }

  renderer.render(scene, camera);
}

addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

connect();
tick();
})();
