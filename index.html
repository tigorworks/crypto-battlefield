<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>🎪 BTC Cartoon Battle — Live 🎪</title>
<style>
  :root{
    --bg-1:#87CEEB;
    --bg-2:#B0E0E6;
    --ink:#1a1a1a;
    --muted:#555555;
    --panel:rgba(255,255,255,.88);
    --line:rgba(100,100,100,.15);
    --long:#00CC66;
    --short:#FF6B35;
    --gold:#FFD700;
    --mono:ui-monospace,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace;
    --rounded:'Comic Sans MS','SF Pro Rounded','SFRounded',ui-rounded,system-ui,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:linear-gradient(180deg,#FFB6C1 0%,#87CEEB 50%,#98FB98 100%);font-family:var(--rounded);color:var(--muted)}
  canvas{display:block}
  .hud{position:fixed;z-index:10;user-select:none;-webkit-user-select:none}
  button{font-family:var(--rounded)}

  .panel{background:var(--panel);border:3px solid #FF69B4;border-radius:20px;backdrop-filter:blur(10px);box-shadow:0 8px 16px rgba(255,105,180,.3);transform:skewX(-1deg)}

  .btn{background:linear-gradient(135deg, #FFB6C1, #FFE4E1);border:2px solid #FF69B4;color:var(--ink);font-size:11px;font-weight:bold;padding:7px 13px;border-radius:12px;cursor:pointer;letter-spacing:.05em;transition:all .2s;box-shadow:0 4px 8px rgba(0,0,0,.1)}
  .btn:hover{transform:scale(1.05);box-shadow:0 6px 12px rgba(255,105,180,.4)}
  .btn.active{color:#fff;background:linear-gradient(135deg, var(--long), #00DD77);border-color:var(--long);box-shadow:0 0 16px rgba(0,204,102,.5)}
  .btn.active.gold{color:#333;background:linear-gradient(135deg, var(--gold), #FFED4E);border-color:var(--gold);box-shadow:0 0 16px rgba(255,215,0,.5)}
  .btn.warn{color:white;background:linear-gradient(135deg, var(--short), #FF8C00);border-color:var(--short);box-shadow:0 0 12px rgba(255,107,53,.4)}

  /* ── top-left: price ── */
  #price-panel{top:16px;left:16px;padding:15px 18px;min-width:240px;border-radius:25px}
  #symbol-row{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-bottom:8px}
  #symbol{font-size:13px;letter-spacing:.12em;color:var(--ink);font-family:var(--rounded);font-weight:700;text-transform:uppercase}
  #feed-badge{display:inline-flex;align-items:center;gap:6px;font-size:10px;letter-spacing:.08em;padding:4px 11px 4px 8px;border:2px solid var(--ink);border-radius:999px;color:var(--ink);font-family:var(--rounded);background:rgba(255,255,255,.6);font-weight:bold}
  #feed-dot{width:7px;height:7px;border-radius:50%;background:var(--muted)}
  #feed-badge.live{border-color:var(--long);color:var(--long);background:rgba(0,204,102,.15)}
  #feed-badge.live #feed-dot{background:var(--long);box-shadow:0 0 10px var(--long);animation:pulse 1.2s ease-in-out infinite}
  #feed-badge.dead{border-color:var(--short);color:var(--short);background:rgba(255,107,53,.15)}
  #feed-badge.dead #feed-dot{background:var(--short)}
  #feed-badge.dummy{border-color:var(--gold);color:#CC8800;background:rgba(255,215,0,.2)}
  #feed-badge.dummy #feed-dot{background:var(--gold);box-shadow:0 0 10px var(--gold);animation:pulse 1.2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  #price{font-size:36px;font-weight:900;color:var(--ink);letter-spacing:-.02em;font-variant-numeric:tabular-nums;text-shadow:2px 2px 4px rgba(0,0,0,.1)}
  #price.up{color:var(--long);animation:bounce .6s} #price.down{color:var(--short);animation:shake .3s}
  @keyframes bounce{0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)}}
  @keyframes shake{0%,100%{transform:translateX(0)} 25%{transform:translateX(-2px)} 75%{transform:translateX(2px)}}
  #sub-row{font-size:11px;margin-top:6px;letter-spacing:.04em;font-variant-numeric:tabular-nums;color:var(--ink);font-weight:500}
  #mode-switch{margin-top:12px;display:flex;gap:8px}
  #retry{display:none;margin-top:10px}

  /* ── top-center: battle meter LONG vs SHORT ── */
  #battle{top:16px;left:50%;transform:translateX(-50%);width:min(500px,94vw);padding:14px 18px;border-radius:25px}
  #battle h4{font-size:12px;letter-spacing:.15em;text-align:center;font-weight:700;margin-bottom:10px;font-family:var(--rounded);color:var(--ink);text-transform:uppercase}
  #battle h4 .long-lbl{color:var(--long);font-weight:900} #battle h4 .short-lbl{color:var(--short);font-weight:900}
  #meter{height:18px;display:flex;overflow:hidden;border-radius:999px;background:rgba(100,100,100,.2);border:2px solid rgba(0,0,0,.1);box-shadow:inset 0 2px 4px rgba(0,0,0,.1)}
  #m-long{background:linear-gradient(90deg,#00DD77,var(--long));transition:width .5s;box-shadow:inset 0 1px 2px rgba(255,255,255,.3)}
  #m-short{background:linear-gradient(90deg,var(--short),#FF8C00);transition:width .5s;flex:1;box-shadow:inset 0 1px 2px rgba(255,255,255,.2)}
  #meter-lbl{display:flex;justify-content:space-between;font-size:11px;margin-top:8px;font-variant-numeric:tabular-nums;font-weight:bold}
  #meter-lbl .l{color:var(--long)} #meter-lbl .s{color:var(--short)}
  #meter-cnt{display:flex;justify-content:space-between;font-size:10px;margin-top:4px;opacity:.9;font-variant-numeric:tabular-nums;color:var(--ink);font-weight:500}

  /* ── top-right: killfeed ── */
  #killfeed{top:16px;right:16px;width:280px;max-width:calc(100vw - 32px);padding:14px 16px;text-align:right;border-radius:25px}
  #killfeed h4{font-size:12px;letter-spacing:.12em;color:var(--ink);margin-bottom:10px;font-weight:700;font-family:var(--rounded);text-transform:uppercase}
  .kill{font-size:12px;padding:8px 12px;margin-bottom:6px;background:linear-gradient(135deg, rgba(255,255,255,.7), rgba(255,255,255,.5));border-radius:12px;border-left:4px solid;animation:slidein .3s ease-out;font-variant-numeric:tabular-nums;font-weight:600;box-shadow:0 2px 6px rgba(0,0,0,.1)}
  .kill.buy{border-color:var(--long);color:var(--long);background:linear-gradient(135deg, rgba(0,204,102,.15), rgba(0,204,102,.08))}
  .kill.sell{border-color:var(--short);color:var(--short);background:linear-gradient(135deg, rgba(255,107,53,.15), rgba(255,107,53,.08))}
  .kill.liq{border-color:var(--gold);color:#CC8800;background:linear-gradient(135deg, rgba(255,215,0,.15), rgba(255,215,0,.08))}
  .kill .whale{color:var(--gold);font-weight:900;text-transform:uppercase}
  @keyframes slidein{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}

  /* ── bottom-left: controls ── */
  #controls{bottom:16px;left:16px;font-size:11px;line-height:1.9;letter-spacing:.03em;padding:14px 18px;max-width:300px;border-radius:25px}
  #controls b{color:var(--ink);font-weight:700;text-transform:uppercase}
  #controls .keys{color:var(--muted);font-size:10px;margin-bottom:8px}
  #cam-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
  #audio-btn{margin-top:10px;width:100%;padding:9px 13px;font-size:12px}

  /* ── bottom-right: tape ── */
  #tape{bottom:16px;right:16px;font-size:11px;text-align:right;letter-spacing:.04em;font-variant-numeric:tabular-nums;font-weight:500}
  #tape div{margin-top:3px;opacity:.95;text-shadow:1px 1px 2px rgba(255,255,255,.5)}

  #flash{position:fixed;inset:0;pointer-events:none;z-index:8;background:#fff;opacity:0}
  @media (prefers-reduced-motion: reduce){ .kill{animation:none} }

  @media (max-width:760px){
    #battle{top:auto;bottom:96px}
    #killfeed{width:172px}
    #controls .keys{display:none}
    #controls{max-width:220px}
    #price{font-size:24px}
  }
</style>
</head>
<body>
<div id="flash"></div>

<div class="hud panel" id="price-panel">
  <div id="symbol-row">
    <span id="symbol">🎪 BTC / USDT 🎪</span>
    <span id="feed-badge"><span id="feed-dot"></span><span id="feed-text">Nyambung...</span></span>
  </div>
  <div id="price">—</div>
  <div id="sub-row"><span id="tps">0</span> trade/s · vol 1m <span id="vol1m">$0</span></div>
  <div id="mode-switch">
    <button class="btn active" id="mode-real" data-mode="real">🎬 DATA REAL</button>
    <button class="btn gold" id="mode-dummy" data-mode="dummy">🎭 DEMO</button>
  </div>
  <button class="btn warn" id="retry">🔄 COBA LAGI</button>
</div>

<div class="hud panel" id="battle">
  <h4>⚔️ ARENA PERTEMPURAN · 60 DETIK · <span class="long-lbl">PANJANG 📈</span> vs <span class="short-lbl">PENDEK 📉</span></h4>
  <div id="meter"><div id="m-long" style="width:50%"></div><div id="m-short"></div></div>
  <div id="meter-lbl">
    <span class="l"><b id="long-usd">$0</b> · <span id="long-pct">50%</span></span>
    <span class="s"><span id="short-pct">50%</span> · <b id="short-usd">$0</b></span>
  </div>
  <div id="meter-cnt">
    <span id="long-n">0 pembeli</span>
    <span id="short-n">0 penjual</span>
  </div>
</div>

<div class="hud panel" id="killfeed">
  <h4>🎬 SOROTAN TERKINI</h4>
  <div id="kills"></div>
</div>

<div class="hud panel" id="controls">
  <div id="cam-row">
    <button class="btn active" data-m="0">🎥 SINEMATIK</button>
    <button class="btn" data-m="1">👁️ IKUTI</button>
    <button class="btn" data-m="2">🆓 BEBAS</button>
  </div>
  <div class="keys">
    <b>drag</b> putar · <b>scroll</b> zoom<br>
    <b>1/2/3</b> kamera · <b>WASD</b> geser
  </div>
  <button class="btn" id="audio-btn">🔊 AKTIFKAN AUDIO</button>
</div>

<div class="hud" id="tape"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(() => {
'use strict';

/* ═══════════ CONFIG ═══════════ */
const STREAM = 'btcusdt';
const T_SHELL = 2000;      // ≥ $2K   → peluru kecil
const T_HEAVY = 25000;     // ≥ $25K  → komet berat + killfeed
const T_WHALE = 100000;    // ≥ $100K → paus raksasa
const MAX_UNITS = 30;
const RIDGE_N = 140;
const C_LONG = 0x2dd6a5, C_SHORT = 0xff6584, C_GOLD = 0xffc857, C_GOLD2 = 0xff9f5a;

/* ═══════════ THREE SETUP ═══════════ */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.FogExp2(0x87CEEB, 0.0007);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 1, 6000);
const renderer = new THREE.WebGLRenderer({ antialias:true, powerPreference:'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

scene.add(new THREE.HemisphereLight(0xFFD700, 0x87CEEB, .95));
const key = new THREE.DirectionalLight(0xFFFF99, .6);
key.position.set(-300, 500, -200);
scene.add(key);
const rim = new THREE.DirectionalLight(0x00DD77, .4);
rim.position.set(400, 250, 300);
scene.add(rim);

const ground = new THREE.Mesh(new THREE.PlaneGeometry(5000,5000), new THREE.MeshLambertMaterial({ color:0x90EE90 }));
ground.rotation.x = -Math.PI/2;
scene.add(ground);
const grid = new THREE.GridHelper(3000, 60, 0xFFB6C1, 0xE6E6FA);
grid.material.transparent = true; grid.material.opacity = .4;
grid.position.y = .5;
scene.add(grid);

/* ═══════════ PRICE RIDGE ═══════════ */
const ridgeGroup = new THREE.Group();
ridgeGroup.position.set(0,0,-700);
scene.add(ridgeGroup);
const ridgeBars = [];
const ridgeGeo = new THREE.BoxGeometry(9,1,6);
for (let i=0;i<RIDGE_N;i++){
  const m = new THREE.Mesh(ridgeGeo, new THREE.MeshBasicMaterial({ color:C_LONG, transparent:true, opacity:.85 }));
  m.position.x = (i - RIDGE_N/2)*11;
  ridgeGroup.add(m); ridgeBars.push(m);
}
const priceHist = [];
function pushRidge(p){
  if (!isFinite(p)) return;
  priceHist.push(p);
  if (priceHist.length > RIDGE_N) priceHist.shift();
  const mn = Math.min(...priceHist), mx = Math.max(...priceHist);
  const span = Math.max(mx-mn, 1e-9);
  for (let i=0;i<ridgeBars.length;i++){
    const b = ridgeBars[i], v = priceHist[i];
    if (v===undefined){ b.visible=false; continue; }
    b.visible = true;
    const h = 12 + ((v-mn)/span)*180;
    b.scale.y = h; b.position.y = h/2;
    const up = v >= (priceHist[i-1] ?? v);
    b.material.color.setHex(up ? C_LONG : C_SHORT);
    if (i===priceHist.length-1) b.material.color.setHex(up ? 0x7de9c8 : 0xffa0b3);
  }
}

/* ═══════════ TEXTURES / GEOMETRY BERSAMA ═══════════ */
function glowTexture(){
  const c = document.createElement('canvas'); c.width=c.height=64;
  const g = c.getContext('2d');
  const r = g.createRadialGradient(32,32,0,32,32,32);
  r.addColorStop(0,'rgba(255,255,255,1)');
  r.addColorStop(.35,'rgba(255,255,255,.55)');
  r.addColorStop(1,'rgba(255,255,255,0)');
  g.fillStyle=r; g.fillRect(0,0,64,64);
  return new THREE.CanvasTexture(c);
}
const GLOW = glowTexture();
const ringGeo = new THREE.RingGeometry(1, 1.35, 48);

/* ═══════════ MODEL PAUS (whale) — bulat & bersahabat ═══════════ */
function makeWhale(color){
  const g = new THREE.Group();
  const mat = new THREE.MeshLambertMaterial({ color, emissive:color, emissiveIntensity:.55 });
  const body = new THREE.Mesh(new THREE.SphereGeometry(1, 20, 14), mat);
  body.scale.set(3.2, 1.15, 1.25);
  g.add(body);
  const head = new THREE.Mesh(new THREE.SphereGeometry(.92, 16, 12), mat);
  head.position.set(2.6, .1, 0); head.scale.set(1.15, .95, 1.05);
  g.add(head);
  const tail = new THREE.Mesh(new THREE.ConeGeometry(.95, 2.2, 4), mat);
  tail.rotation.z = Math.PI/2; tail.rotation.y = Math.PI/4;
  tail.position.set(-3.6, .25, 0); tail.scale.set(1, 1, .25);
  g.add(tail);
  for (const s of [-1,1]){
    const fin = new THREE.Mesh(new THREE.ConeGeometry(.5, 1.6, 4), mat);
    fin.rotation.x = s*Math.PI/2.4; fin.rotation.z = -.5;
    fin.position.set(.8, -.35, s*1.1); fin.scale.set(1,1,.3);
    g.add(fin);
  }
  const eyeMat = new THREE.MeshBasicMaterial({ color:0x10121f });
  for (const s of [-1,1]){
    const eye = new THREE.Mesh(new THREE.SphereGeometry(.14, 10, 8), eyeMat);
    eye.position.set(3.35, .35, s*.55);
    g.add(eye);
  }
  const aura = new THREE.Sprite(new THREE.SpriteMaterial({ map:GLOW, color, transparent:true, opacity:.6, blending:THREE.AdditiveBlending, depthWrite:false }));
  aura.scale.set(14,14,1);
  g.add(aura);
  return g;
}

/* ═══════════ UNIT (peluru / komet / paus) ═══════════ */
const units = [];
const lastImpact = new THREE.Vector3(0,0,0);

function spawnUnit(side, usd){
  if (units.length >= MAX_UNITS) return;
  const color = side==='buy' ? C_LONG : C_SHORT;
  const tier = usd>=T_WHALE ? 2 : usd>=T_HEAVY ? 1 : 0;
  const mag = Math.min(1, Math.log10(usd/T_SHELL+1)/2.4);
  const sx = (side==='buy'?-1:1)*(760 + Math.random()*260);
  const start = new THREE.Vector3(sx, tier===2 ? 190+Math.random()*80 : 6, (Math.random()-.5)*720);
  const end = new THREE.Vector3((Math.random()-.5)*560, 0, (Math.random()-.5)*560);
  let obj, trail=null;

  if (tier===2){
    obj = makeWhale(color);
    const sc = 9 + mag*8;                 // makin besar order, makin besar pausnya
    obj.scale.set(sc, sc, sc);
    obj.lookAt(end);
    obj.rotateY(side==='buy' ? -Math.PI/2 : Math.PI/2);
    playWhaleHorn();
  } else {
    obj = new THREE.Sprite(new THREE.SpriteMaterial({ map:GLOW, color, transparent:true, blending:THREE.AdditiveBlending, depthWrite:false }));
    const s = tier===1 ? 22+mag*22 : 9+mag*14;
    obj.scale.set(s, s, 1);
    if (tier===1){
      trail = [];
      for (let i=0;i<6;i++){
        const t = new THREE.Sprite(new THREE.SpriteMaterial({ map:GLOW, color, transparent:true, opacity:.3-.04*i, blending:THREE.AdditiveBlending, depthWrite:false }));
        t.scale.set(s*.7, s*.7, 1);
        scene.add(t); trail.push(t);
      }
    }
  }
  scene.add(obj);
  units.push({ obj, trail, start, end,
    apex: tier===2 ? 0 : 120 + mag*260 + Math.random()*60,
    t:0, dur: tier===2 ? 2.6 : 1.3 + Math.random()*.7,
    side, usd, mag, color, tier });
}

/* ═══════════ LEDAKAN ═══════════ */
const booms = [], rings = [];
function explode(pos, color, mag, side, usd, tier, isLiq){
  const n = 26 + Math.floor(mag*(tier===2?110:44));
  const geo = new THREE.BufferGeometry();
  const px = new Float32Array(n*3), vel = [];
  for (let i=0;i<n;i++){
    px[i*3]=pos.x; px[i*3+1]=pos.y+2; px[i*3+2]=pos.z;
    const a = Math.random()*Math.PI*2, e = Math.random()*Math.PI*.5;
    const sp = 40 + Math.random()*(90 + mag*(tier===2?320:160));
    vel.push(new THREE.Vector3(Math.cos(a)*Math.cos(e)*sp, Math.sin(e)*sp*1.4, Math.sin(a)*Math.cos(e)*sp));
  }
  geo.setAttribute('position', new THREE.BufferAttribute(px,3));
  const pts = new THREE.Points(geo, new THREE.PointsMaterial({ color, size:3+mag*(tier===2?9:5), map:GLOW, transparent:true, blending:THREE.AdditiveBlending, depthWrite:false }));
  scene.add(pts);
  booms.push({ pts, vel, t:0, dur:1 + mag*(tier===2?1.4:.8) });

  const rm = new THREE.Mesh(ringGeo, new THREE.MeshBasicMaterial({ color, transparent:true, opacity:.8, side:THREE.DoubleSide, blending:THREE.AdditiveBlending, depthWrite:false }));
  rm.rotation.x = -Math.PI/2;
  rm.position.copy(pos); rm.position.y = 1.2;
  scene.add(rm);
  rings.push({ rm, t:0, dur: tier===2?1.4:.8, max:(tier===2?260:30) + mag*160 });

  if (mag>.45 || tier===2){
    const l = new THREE.PointLight(color, 3+mag*(tier===2?12:6), 500+mag*900, 2);
    l.position.copy(pos); l.position.y = 40;
    scene.add(l);
    setTimeout(()=>scene.remove(l), tier===2?450:260);
  }
  if (tier===2){
    const f = document.getElementById('flash');
    f.style.transition='none'; f.style.opacity=.16;
    requestAnimationFrame(()=>{ f.style.transition='opacity .7s'; f.style.opacity=0; });
  }
  lastImpact.copy(pos);
  playBoom(mag, tier);
  if (isLiq) addKill('liq', usd, side);
  else if (usd >= T_HEAVY) addKill(side, usd);
}

/* ═══════════ KILLFEED & TAPE ═══════════ */
const killsEl = document.getElementById('kills');
function fmtUsd(v){
  if (v>=1e6) return '$'+(v/1e6).toFixed(2)+'M';
  if (v>=1e3) return '$'+(v/1e3).toFixed(0)+'K';
  return '$'+v.toFixed(0);
}
function addKill(kind, usd, liqSide){
  const d = document.createElement('div');
  if (kind==='liq'){
    d.className = 'kill liq';
    d.innerHTML = '💥 LIKUIDASI ' + (liqSide==='buy'?'PENDEK':'PANJANG') + ' ' + fmtUsd(usd);
  } else {
    d.className = 'kill '+kind;
    const whale = usd >= T_WHALE;
    d.innerHTML = (whale?'<span class="whale">🐳 PAUS </span>':'') +
      (kind==='buy'?'📈 BELI ' :'📉 JUAL ') + fmtUsd(usd);
  }
  killsEl.prepend(d);
  while (killsEl.children.length > 7) killsEl.lastChild.remove();
  setTimeout(()=>{ if(d.parentNode){ d.style.opacity='0'; d.style.transition='opacity .6s'; setTimeout(()=>d.remove(),650);} }, 10000);
}
const tapeEl = document.getElementById('tape');
const tape = [];
function addTape(side, usd, price){
  tape.unshift(`<div style="color:${side==='buy'?'var(--long)':'var(--short)'}">${side==='buy'?'▲':'▼'} ${fmtUsd(usd)} @ ${price.toLocaleString('en-US',{maximumFractionDigits:2})}</div>`);
  if (tape.length>5) tape.pop();
  tapeEl.innerHTML = tape.join('');
}

/* ═══════════ BATTLE METER (long vs short 60s) ═══════════ */
let flow = [];   // {t, usd, buy}
function meterUpdate(){
  const now = performance.now();
  flow = flow.filter(f=>now-f.t < 60000);
  let bu=0, su=0, bn=0, sn=0;
  for (const f of flow){ if (f.buy){bu+=f.usd;bn++;} else {su+=f.usd;sn++;} }
  const tot = bu+su || 1;
  const lp = Math.round(bu/tot*100);
  document.getElementById('m-long').style.width = lp+'%';
  document.getElementById('long-usd').textContent = fmtUsd(bu);
  document.getElementById('short-usd').textContent = fmtUsd(su);
  document.getElementById('long-pct').textContent = lp+'%';
  document.getElementById('short-pct').textContent = (100-lp)+'%';
  document.getElementById('long-n').textContent = bn.toLocaleString()+' order beli';
  document.getElementById('short-n').textContent = sn.toLocaleString()+' order jual';
}

/* ═══════════ AUDIO — sederhana, satu tombol ═══════════ */
let AC=null, masterG, musicG, sfxG, musicNodes=[];
let audioOn = false;
const audioBtn = document.getElementById('audio-btn');
const MUSIC_LEVEL = .18, SFX_LEVEL = .5;

function initAudio(){
  AC = new (window.AudioContext||window.webkitAudioContext)();
  masterG = AC.createGain(); masterG.connect(AC.destination);
  musicG = AC.createGain(); musicG.gain.value = MUSIC_LEVEL; musicG.connect(masterG);
  sfxG = AC.createGain(); sfxG.gain.value = SFX_LEVEL; sfxG.connect(masterG);
  startMusic();
}

/* musik ambient generatif: drone lembut + pad berganti akor */
const CHORDS = [ [55,82.4,110,164.8], [49,73.4,98,146.8], [58.3,87.3,116.5,174.6], [43.7,65.4,87.3,130.8] ];
let chordIdx = 0, chordTimer = null;
function startMusic(){
  const lp = AC.createBiquadFilter();
  lp.type='lowpass'; lp.frequency.value=420; lp.Q.value=.7;
  lp.connect(musicG);
  const lfo = AC.createOscillator(), lfoG = AC.createGain();
  lfo.frequency.value=.06; lfoG.gain.value=180;
  lfo.connect(lfoG).connect(lp.frequency); lfo.start();
  musicNodes = CHORDS[0].map((f,i)=>{
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = i<2 ? 'sawtooth' : 'triangle';
    o.frequency.value = f;
    o.detune.value = (Math.random()-.5)*8;
    g.gain.value = i<2 ? .05 : .035;
    o.connect(g).connect(lp);
    o.start();
    return { o, g };
  });
  // desis angin
  const buf = AC.createBuffer(1, AC.sampleRate*2, AC.sampleRate);
  const ch = buf.getChannelData(0);
  for (let i=0;i<ch.length;i++) ch[i] = (Math.random()*2-1)*.3;
  const noise = AC.createBufferSource(); noise.buffer=buf; noise.loop=true;
  const nf = AC.createBiquadFilter(); nf.type='bandpass'; nf.frequency.value=300; nf.Q.value=.4;
  const ng = AC.createGain(); ng.gain.value=.02;
  noise.connect(nf).connect(ng).connect(musicG);
  noise.start();
  chordTimer = setInterval(()=>{
    chordIdx = (chordIdx+1)%CHORDS.length;
    const t = AC.currentTime;
    musicNodes.forEach((n,i)=> n.o.frequency.exponentialRampToValueAtTime(CHORDS[chordIdx][i], t+4));
  }, 9000);
}
audioBtn.onclick = ()=>{
  if (!AC){ initAudio(); audioOn = true; }
  else {
    audioOn = !audioOn;
    if (audioOn) AC.resume(); else AC.suspend();
  }
  audioBtn.textContent = audioOn ? '🔊 MUSIK AKTIF' : '🔊 AKTIFKAN AUDIO';
  audioBtn.classList.toggle('active', audioOn);
};

function playBoom(mag, tier){
  if (!audioOn || !AC) return;
  const t = AC.currentTime;
  // sub thump
  const o = AC.createOscillator(), g = AC.createGain();
  o.type='sine';
  o.frequency.setValueAtTime(tier===2 ? 60 : 90+mag*60, t);
  o.frequency.exponentialRampToValueAtTime(24, t+.5+mag*.4);
  g.gain.setValueAtTime(.001,t);
  g.gain.exponentialRampToValueAtTime(.14+mag*.25, t+.015);
  g.gain.exponentialRampToValueAtTime(.001, t+.6+mag*.5);
  o.connect(g).connect(sfxG); o.start(t); o.stop(t+1.3);
  // debris noise
  const dur = .3+mag*.5;
  const buf = AC.createBuffer(1, AC.sampleRate*dur, AC.sampleRate);
  const ch = buf.getChannelData(0);
  for (let i=0;i<ch.length;i++) ch[i] = (Math.random()*2-1)*Math.pow(1-i/ch.length,2);
  const src = AC.createBufferSource(); src.buffer=buf;
  const f = AC.createBiquadFilter(); f.type='lowpass'; f.frequency.value=1200+mag*2500;
  const ng = AC.createGain(); ng.gain.value=.1+mag*.2;
  src.connect(f).connect(ng).connect(sfxG); src.start(t);
}
function playWhaleHorn(){
  if (!audioOn || !AC) return;
  const t = AC.currentTime;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type='square';
  o.frequency.setValueAtTime(46, t);
  o.frequency.linearRampToValueAtTime(66, t+1.2);
  o.frequency.linearRampToValueAtTime(40, t+2.2);
  const f = AC.createBiquadFilter(); f.type='lowpass'; f.frequency.value=240;
  g.gain.setValueAtTime(.001,t);
  g.gain.exponentialRampToValueAtTime(.16, t+.3);
  g.gain.exponentialRampToValueAtTime(.001, t+2.4);
  o.connect(f).connect(g).connect(sfxG);
  o.start(t); o.stop(t+2.5);
}

/* ═══════════ DATA FEED — REAL (Binance) atau DUMMY (simulasi lokal) ═══════════ */
const priceEl = document.getElementById('price');
const badgeEl = document.getElementById('feed-badge');
const badgeTextEl = document.getElementById('feed-text');
const tpsEl = document.getElementById('tps');
const volEl = document.getElementById('vol1m');
const retryBtn = document.getElementById('retry');
const modeRealBtn = document.getElementById('mode-real');
const modeDummyBtn = document.getElementById('mode-dummy');

let price = NaN, lastPrice = NaN, tradeCount = 0, volWindow = [];
let ws = null, wsLiq = null, live = false, retries = 0, connectGuard = null;
let dummyMode = false, dummyTimer = null, dummyBase = 65000;

function onTrade(p, qty, isBuy){
  lastPrice = price; price = p;
  const usd = p*qty;
  tradeCount++;
  volWindow.push({ t:performance.now(), usd });
  flow.push({ t:performance.now(), usd, buy:isBuy });
  priceEl.textContent = p.toLocaleString('en-US',{ maximumFractionDigits: p<10?4:2 });
  priceEl.className = p>=lastPrice ? 'up':'down';
  if (usd >= T_SHELL){
    spawnUnit(isBuy?'buy':'sell', usd);
    addTape(isBuy?'buy':'sell', usd, p);
  }
}

function setBadge(state){
  badgeEl.className = state==='connecting' ? '' : state;
  badgeTextEl.textContent = state==='live'?'🎬 LANGSUNG':state==='dead'?'⚠️ PUTUS':state==='dummy'?'🎭 DEMO':'🔄 Nyambung…';
  retryBtn.style.display = state==='dead' ? 'inline-block' : 'none';
}

function resetStats(){
  priceHist.length = 0; flow.length = 0; volWindow.length = 0; tape.length = 0;
  tapeEl.innerHTML = '';
  price = lastPrice = NaN;
  priceEl.textContent = '—'; priceEl.className = '';
}

function connect(){
  if (dummyMode) return;
  disconnect();
  setBadge('connecting');

  /* spot aggTrade — semua transaksi buy/sell */
  try { ws = new WebSocket(`wss://stream.binance.com:9443/ws/${STREAM}@aggTrade`); }
  catch(e){ setBadge('dead'); return; }
  connectGuard = setTimeout(()=>{ if(!live && !dummyMode){ setBadge('dead'); autoRetry(); } }, 6000);
  ws.onmessage = (ev)=>{
    if (!live){ live=true; retries=0; clearTimeout(connectGuard); setBadge('live'); }
    try {
      const d = JSON.parse(ev.data);
      onTrade(parseFloat(d.p), parseFloat(d.q), d.m===false); /* m=false → taker beli (long) */
    } catch(e){}
  };
  ws.onerror = ()=>{ clearTimeout(connectGuard); if(!live && !dummyMode){ setBadge('dead'); autoRetry(); } };
  ws.onclose = ()=>{ if(live && !dummyMode){ live=false; setBadge('dead'); autoRetry(); } };

  /* futures forceOrder — likuidasi long/short sungguhan */
  try {
    wsLiq = new WebSocket(`wss://fstream.binance.com/ws/${STREAM}@forceOrder`);
    wsLiq.onmessage = (ev)=>{
      try {
        const o = JSON.parse(ev.data).o;
        const usd = parseFloat(o.ap)*parseFloat(o.q);
        const isBuy = o.S === 'BUY'; /* BUY = short terlikuidasi */
        const side = isBuy ? 'buy' : 'sell';
        const pos = new THREE.Vector3((Math.random()-.5)*500, 0, (Math.random()-.5)*500);
        explode(pos, isBuy?C_GOLD:C_GOLD2, Math.min(1, Math.log10(usd/1000+1)/2.5), side, usd, usd>=T_WHALE?2:1, true);
      } catch(e){}
    };
  } catch(e){}
}
function disconnect(){
  live = false;
  if (connectGuard){ clearTimeout(connectGuard); connectGuard = null; }
  for (const s of [ws, wsLiq]){
    if (s){ s.onclose=null; s.onerror=null; s.onmessage=null; try{s.close();}catch(e){} }
  }
  ws = wsLiq = null;
}
function autoRetry(){
  if (retries >= 5) return;
  retries++;
  setTimeout(()=>{ if(!live && !dummyMode) connect(); }, 4000);
}
retryBtn.onclick = ()=>{ retries=0; connect(); };

/* simulasi lokal — dipakai saat sumber data asli tidak bisa dijangkau */
function startDummy(){
  disconnect();
  setBadge('dummy');
  dummyBase = isFinite(price) ? price : 65000;
  dummyTimer = setInterval(()=>{
    const n = 1 + Math.floor(Math.random()*3);
    for (let i=0;i<n;i++){
      dummyBase *= 1 + (Math.random()-.5)*0.0006;
      const roll = Math.random();
      let qty = .01 + Math.random()*.4;
      if (roll > .992) qty = 1.8 + Math.random()*3.5;       // paus
      else if (roll > .95) qty = .45 + Math.random()*1.3;   // berat
      onTrade(dummyBase, qty, Math.random() > .48);
    }
    if (Math.random() < .02){
      const usd = 5000 + Math.random()*150000;
      const isBuy = Math.random() > .5;
      const pos = new THREE.Vector3((Math.random()-.5)*500, 0, (Math.random()-.5)*500);
      explode(pos, isBuy?C_GOLD:C_GOLD2, Math.min(1, Math.log10(usd/1000+1)/2.5), isBuy?'buy':'sell', usd, usd>=T_WHALE?2:1, true);
    }
  }, 260);
}
function stopDummy(){
  if (dummyTimer){ clearInterval(dummyTimer); dummyTimer = null; }
}

function setMode(m){
  const wantDummy = m === 'dummy';
  if (wantDummy === dummyMode) return;
  dummyMode = wantDummy;
  modeRealBtn.classList.toggle('active', !dummyMode);
  modeDummyBtn.classList.toggle('active', dummyMode);
  resetStats();
  if (dummyMode){ stopDummy(); startDummy(); }
  else { stopDummy(); retries = 0; connect(); }
}
modeRealBtn.onclick = ()=>setMode('real');
modeDummyBtn.onclick = ()=>setMode('dummy');

/* stats tiap detik */
setInterval(()=>{
  tpsEl.textContent = tradeCount; tradeCount = 0;
  const now = performance.now();
  volWindow = volWindow.filter(v=>now-v.t < 60000);
  volEl.textContent = fmtUsd(volWindow.reduce((a,b)=>a+b.usd,0));
  if (isFinite(price)) pushRidge(price);
  meterUpdate();
}, 1000);

/* ═══════════ CAMERA ═══════════ */
let camMode = 0;
const orbit = { theta:.6, phi:.42, radius:900, target:new THREE.Vector3(0,40,0) };
const followPos = new THREE.Vector3(0,40,0);
const keys = {};
function setCamMode(m){
  camMode = m;
  document.querySelectorAll('.btn[data-m]').forEach(b=>b.classList.toggle('active', +b.dataset.m===m));
}
document.querySelectorAll('.btn[data-m]').forEach(b=> b.onclick=()=>setCamMode(+b.dataset.m));
addEventListener('keydown', e=>{
  if (e.key==='1') setCamMode(0);
  if (e.key==='2') setCamMode(1);
  if (e.key==='3') setCamMode(2);
  keys[e.key.toLowerCase()] = true;
});
addEventListener('keyup', e=> keys[e.key.toLowerCase()]=false);

let dragging=false, lx=0, ly=0, pinchD=0;
const cv = renderer.domElement;
cv.addEventListener('pointerdown', e=>{ dragging=true; lx=e.clientX; ly=e.clientY; if(camMode!==2) setCamMode(2); });
addEventListener('pointerup', ()=>dragging=false);
addEventListener('pointermove', e=>{
  if(!dragging) return;
  orbit.theta -= (e.clientX-lx)*.005;
  orbit.phi = Math.min(1.35, Math.max(.08, orbit.phi + (e.clientY-ly)*.004));
  lx=e.clientX; ly=e.clientY;
});
cv.addEventListener('wheel', e=>{
  e.preventDefault();
  orbit.radius = Math.min(2200, Math.max(180, orbit.radius*(1+Math.sign(e.deltaY)*.08)));
  if(camMode!==2) setCamMode(2);
}, { passive:false });
cv.addEventListener('touchmove', e=>{
  if (e.touches.length===2){
    const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    if (pinchD) orbit.radius = Math.min(2200, Math.max(180, orbit.radius*pinchD/d));
    pinchD = d;
    if(camMode!==2) setCamMode(2);
  }
}, { passive:true });
cv.addEventListener('touchend', ()=>pinchD=0);

/* ═══════════ MAIN LOOP ═══════════ */
const clock = new THREE.Clock();
function tick(){
  requestAnimationFrame(tick);
  const dt = Math.min(clock.getDelta(), .05);
  const t = clock.elapsedTime;

  for (let i=units.length-1;i>=0;i--){
    const u = units[i];
    u.t += dt/u.dur;
    if (u.t>=1){
      scene.remove(u.obj);
      if (u.trail) u.trail.forEach(x=>{ scene.remove(x); x.material.dispose(); });
      if (u.obj.material) u.obj.material.dispose();
      explode(u.end, u.color, u.mag, u.side, u.usd, u.tier, false);
      units.splice(i,1); continue;
    }
    const k = u.t;
    if (u.tier===2){
      /* paus: melayang lalu menukik di akhir */
      const cruise = Math.min(k/.75, 1);
      u.obj.position.lerpVectors(u.start, new THREE.Vector3(u.end.x, u.start.y, u.end.z), cruise);
      if (k>.75){
        const dive = (k-.75)/.25;
        u.obj.position.y = u.start.y*(1-dive*dive);
        u.obj.rotation.z = (u.side==='buy'?-1:1)*dive*.9;
      }
      u.obj.position.y += Math.sin(t*2+u.start.z)*2;
      u.obj.rotation.x = Math.sin(t*3)*0.06;
    } else {
      u.obj.position.lerpVectors(u.start, u.end, k);
      u.obj.position.y = u.start.y + Math.sin(k*Math.PI)*u.apex;
      if (u.trail){
        for (let j=0;j<u.trail.length;j++){
          const kk = Math.max(0, k - (j+1)*.03);
          u.trail[j].position.lerpVectors(u.start, u.end, kk);
          u.trail[j].position.y = u.start.y + Math.sin(kk*Math.PI)*u.apex;
        }
      }
    }
  }

  for (let i=booms.length-1;i>=0;i--){
    const b = booms[i];
    b.t += dt/b.dur;
    if (b.t>=1){ scene.remove(b.pts); b.pts.geometry.dispose(); b.pts.material.dispose(); booms.splice(i,1); continue; }
    const pos = b.pts.geometry.attributes.position;
    for (let j=0;j<b.vel.length;j++){
      b.vel[j].y -= 160*dt;
      pos.array[j*3]   += b.vel[j].x*dt;
      pos.array[j*3+1] = Math.max(1, pos.array[j*3+1]+b.vel[j].y*dt);
      pos.array[j*3+2] += b.vel[j].z*dt;
    }
    pos.needsUpdate = true;
    b.pts.material.opacity = 1-b.t;
  }

  for (let i=rings.length-1;i>=0;i--){
    const r = rings[i];
    r.t += dt/r.dur;
    if (r.t>=1){ scene.remove(r.rm); r.rm.material.dispose(); rings.splice(i,1); continue; }
    const s = 1 + r.t*r.max;
    r.rm.scale.set(s,s,1);
    r.rm.material.opacity = .8*(1-r.t);
  }

  if (camMode===0){
    orbit.theta += dt*.07;
    orbit.phi = .38 + Math.sin(t*.11)*.08;
    orbit.radius += (950 + Math.sin(t*.07)*180 - orbit.radius)*dt*.5;
    orbit.target.lerp(new THREE.Vector3(0,40,0), dt);
  } else if (camMode===1){
    followPos.lerp(lastImpact, dt*2.2);
    orbit.target.lerp(new THREE.Vector3(followPos.x,20,followPos.z), dt*2.2);
    orbit.radius += (430-orbit.radius)*dt*.8;
  } else {
    const sp = 420*dt;
    const fwd = new THREE.Vector3(Math.sin(orbit.theta),0,Math.cos(orbit.theta));
    const rgt = new THREE.Vector3(fwd.z,0,-fwd.x);
    if (keys['w']) orbit.target.addScaledVector(fwd,-sp);
    if (keys['s']) orbit.target.addScaledVector(fwd, sp);
    if (keys['a']) orbit.target.addScaledVector(rgt,-sp);
    if (keys['d']) orbit.target.addScaledVector(rgt, sp);
    if (keys['q']) orbit.target.y = Math.max(5, orbit.target.y-sp);
    if (keys['e']) orbit.target.y += sp;
  }
  camera.position.set(
    orbit.target.x + orbit.radius*Math.cos(orbit.phi)*Math.sin(orbit.theta),
    orbit.target.y + orbit.radius*Math.sin(orbit.phi),
    orbit.target.z + orbit.radius*Math.cos(orbit.phi)*Math.cos(orbit.theta)
  );
  camera.lookAt(orbit.target);

  renderer.render(scene, camera);
}

addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

connect();
tick();
})();
