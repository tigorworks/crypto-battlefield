/* ═══════════ MAIN LOOP ═══════════ */
const clock = new THREE.Clock();
let regenTimer = 1;
function tick(){
  requestAnimationFrame(tick);
  const dt = Math.min(clock.getDelta(), .05);
  const t = clock.elapsedTime;
  if (hitstop > 0) hitstop -= dt;
  if (slowmo > 0) slowmo -= dt;
  // jeda hantam melambatkan simulasi sesaat; gerak lambat (serangan udara) menahan lebih lama & tak sekeras
  const sdt = hitstop > 0 ? dt*0.12 : (slowmo > 0 ? dt*0.4 : dt);

  // garis depan bergerak mengikuti tekanan; pasukan maju/mundur
  // sorak penonton (cheerBias) mendorong sesaat lalu meluruh kembali ke tekanan pasar sebenarnya
  cheerBias *= Math.pow(0.5, dt/1.6);              // paruh-waktu ~1.6 dtk
  if (Math.abs(cheerBias) < 0.5) cheerBias = 0;
  const targetFront = (buyShare-0.5)*2*180 + cheerBias;
  frontX += (targetFront - frontX)*Math.min(1, dt*0.8);
  buyCrowd.pressBias = frontX*0.55;
  sellCrowd.pressBias = frontX*0.55;
  const bw = Math.max(2, frontX + TERR_HALF);
  buyTerr.scale.set(bw, 480, 1);  buyTerr.position.x = -TERR_HALF + bw/2;
  const sw = Math.max(2, TERR_HALF - frontX);
  sellTerr.scale.set(sw, 480, 1); sellTerr.position.x = frontX + sw/2;
  clashLine.position.x = frontX;
  clashLine.material.color.setHex(buyShare>=0.5 ? C_LONG : C_SHORT);
  clashLine.material.opacity = (.3 + Math.abs(buyShare-0.5)*1.1 + Math.sin(t*4)*.05) * (1 - lull*0.7);

  // ── CUACA VOLATILITAS — langit dikendalikan pergerakan harga (pump → aurora, dump → badai) ──
  mood += (moodTarget - mood)*Math.min(1, dt*0.5);
  const nowWx = performance.now();
  while (priceHist.length > 1 && nowWx - priceHist[0].t > 50000) priceHist.shift();
  let volTarget = 0;
  if (priceHist.length > 1 && nowWx - priceHist[0].t > 4000 && price === price){
    const pctMove = (price - priceHist[0].p)/priceHist[0].p;
    volTarget = Math.max(-1, Math.min(1, pctMove/0.003));   // ±0,3% dalam ≤50 dtk = cuaca penuh
  }
  if (nowWx < volForceUntil) volTarget = volForce;          // paksaan uji __testEvent('pump'/'dump')
  vol += (volTarget - vol)*Math.min(1, dt*0.35);
  liqStorm = Math.max(0, liqStorm - dt/14);                 // badai likuidasi mereda ±14 dtk
  stormW = Math.min(1, Math.max(0, -vol)*1.15 + liqStorm + Math.max(0, -mood)*0.3);
  pumpW  = Math.min(1, Math.max(0, vol)*1.15 + Math.max(0, mood)*0.3);
  _sky.copy(SKY_CALM);
  if (stormW > pumpW) _sky.lerp(SKY_STORM, stormW); else _sky.lerp(SKY_PUMP, pumpW*0.9);
  // siklus siang–malam (independen dari pasar): malam bikin tracer & ledakan makin menonjol
  const daylight = 0.5 + 0.5*Math.cos((t % DAY_PERIOD)/DAY_PERIOD * Math.PI*2);   // 1=siang, 0=malam
  _sky.lerp(SKY_NIGHT, (1-daylight)*0.82);
  _sky.multiplyScalar(0.5 + 0.5*daylight);
  scene.background.copy(_sky); scene.fog.color.copy(_sky);
  // kabut menebal saat badai — medan tempur tenggelam dalam kelam
  scene.fog.near = FOG_NEAR - 340*stormW;
  scene.fog.far  = FOG_FAR - 1500*stormW;
  sun.intensity = (.7 + (pumpW - stormW)*.22) * (0.3 + 0.7*daylight);
  sun.color.setHex(stormW > .35 ? 0xa7bcd6 : 0xfff0cf);
  moonMat.opacity = (1-daylight)*0.85;
  updateShootingStar(dt, daylight);
  // banner naratif saat cuaca berubah drastis
  if (!stormActive && stormW > .6){ stormActive = true; showEvent(I18N[lang].stormIn, 'sell'); }
  else if (stormActive && stormW < .3) stormActive = false;
  if (!auroraActive && pumpW > .6){ auroraActive = true; showEvent(I18N[lang].auroraIn, 'buy'); }
  else if (auroraActive && pumpW < .3) auroraActive = false;

  // petir saat badai (dump keras) — makin ganas badainya, makin rapat sambarannya
  if (stormW > 0.4){
    lightningT -= dt;
    if (lightningT <= 0){
      lightningT = 2.2 + Math.random()*(9 - 6*stormW);
      addFlash(.32 + Math.random()*.15, '#dfeaff');
      setTimeout(()=>addFlash(.2, '#dfeaff'), 90);   // kilat ganda, lebih redup
      const z0 = strikeBolt();
      playThunder(z0);
    }
  } else lightningT = 4 + Math.random()*3;
  if (bolt.visible){ boltT -= dt; boltMat.opacity = Math.max(0, boltT/0.18); if (boltT <= 0) bolt.visible = false; }
  // kilat layar meluruh
  if (flashV > .001){ flashEl.style.background = flashColor; flashEl.style.opacity = flashV; flashV = Math.max(0, flashV - dt*3.2); }
  else if (flashEl.style.opacity !== '0'){ flashEl.style.opacity = '0'; }
  const rainOp = stormW, embOp = pumpW;
  rain.m.material.opacity = rainOp*.7;
  if (rainOp > .02){
    const a = rain.attr.array, fall = 1 + stormW*.8;   // badai penuh → hujan lebih deras & cepat
    for (let i=0;i<rain.n;i++){
      a[i*3+1] -= (320+rain.v[i]*520)*fall*dt;
      if (a[i*3+1] < 0){ a[i*3+1]=320; a[i*3]=(Math.random()-.5)*900; a[i*3+2]=(Math.random()-.5)*700; }
    }
    rain.attr.needsUpdate = true;
  }
  embers.m.material.opacity = embOp*.75;
  if (embOp > .02){
    const a = embers.attr.array;
    for (let i=0;i<embers.n;i++){
      a[i*3+1] += (28+embers.v[i]*58)*dt;
      a[i*3]   += Math.sin(t*1.3+i)*7*dt;
      if (a[i*3+1] > 320){ a[i*3+1]=0; a[i*3]=(Math.random()-.5)*900; a[i*3+2]=(Math.random()-.5)*700; }
    }
    embers.attr.needsUpdate = true;
  }
  // aurora pump — tirai hijau berarak pelan, makin jelas saat langit gelap
  const auOp = pumpW * (0.5 + 0.45*(1-daylight));
  for (const A of auroras){
    A.mat.opacity = auOp * A.op * (0.85 + Math.sin(t*.7 + A.ph)*0.15);
    A.mat.map.offset.x += A.sp*dt;
  }

  // ROUT — haluskan derajat kabur tiap sisi (masuk cepat, pulih perlahan)
  const nowMs = performance.now();
  for (const c of [buyCrowd, sellCrowd]){
    const routing = c.routUntil > nowMs ? 1 : 0;
    c.flee += (routing - c.flee) * Math.min(1, dt*(routing ? 3 : 1.4));
  }

  // JEDA TENANG — dinilai relatif terhadap rerata laju transaksi sesi berjalan (bukan angka mutlak),
  // supaya tetap peka baik di pasangan cepat (BTC, puluhan transaksi/detik) maupun lambat: dianggap
  // "sepi" saat laju 15 detik terakhir jatuh jauh di bawah rerata adaptifnya sendiri.
  let recentCnt = 0, cnt15 = 0;
  for (let i=flow.length-1;i>=0;i--){
    const age = nowMs - flow[i].t;
    if (age >= 15000) break;
    cnt15++;
    if (age < 6000) recentCnt++;
  }
  const rate15 = cnt15/15;
  flowRateEMA = flowRateEMA===null ? rate15 : flowRateEMA + (rate15-flowRateEMA)*Math.min(1, dt/45);
  const lullTarget = (recentCnt < 4 || (flowRateEMA > 0.15 && rate15 < flowRateEMA*0.4)) ? 1 : 0;
  lull += (lullTarget - lull) * Math.min(1, dt*(lullTarget ? 0.7 : 2.5));
  if (!lullActive && lull > 0.7){ lullActive = true; showEvent(I18N[lang].lull, 'neutral'); setMusicLayer('calm'); }
  else if (lullActive && lull < 0.3){ lullActive = false; showEvent(I18N[lang].lullEnd, 'neutral'); playChargeHorn(); setMusicLayer('busy'); }

  updateCrowd(buyCrowd, sdt, t);
  updateCrowd(sellCrowd, sdt, t);
  // bala bantuan HANYA masuk saat jumlah di bawah target (persentase buy/sell).
  // pengurangan jumlah terjadi lewat peluru lawan — prajurit mati karena tertembak, bukan kabur.
  // isi cepat beberapa sekaligus supaya seimbang dengan laju kematian → banyak pergerakan masuk/mati.
  regenTimer -= dt;
  if (regenTimer <= 0){
    regenTimer = .05;
    for (const c of [buyCrowd, sellCrowd]){
      let n = Math.min(14, c.target - c.count);   // isi cepat agar seimbang dengan laju kematian
      while (n-- > 0) reviveSoldier(c);
    }
  }
  // jangan pernah ada jeda tembakan lebih dari ~0.25 detik — KECUALI saat gencatan (pasar sunyi)
  if (lull < 0.6 && performance.now() - lastFireT > 250) ambientFire();

  for (let i=skulls.length-1;i>=0;i--){
    const s = skulls[i];
    s.t += sdt/s.dur;
    if (s.t>=1){ scene.remove(s.spr); s.spr.material.dispose(); skulls.splice(i,1); continue; }
    const e = s.t<.3 ? s.t/.3 : 1;
    const g = 3 + e*3.5;
    s.spr.scale.set(g, g, 1);
    s.spr.position.y = 4 + s.t*6;
    s.spr.material.opacity = (s.t<.4 ? .5 : .5*(1-(s.t-.4)/.6));
  }

  for (let i=units.length-1;i>=0;i--){
    const u = units[i];
    if (u.tier===2){
      u.clock += sdt;
      if (u.phase==='approach'){
        const k = Math.min(1, u.clock/u.approachDur);
        const e = 1-(1-k)*(1-k);                                 // ease-out: melambat saat tiba di garis depan
        u.obj.position.lerpVectors(u.start, u.end, e);
        if (k>=1){ u.phase='hold'; u.clock=0; }
      } else if (u.phase==='hold'){
        // MENETAP di garis depan sambil menghujani lawan — efeknya jadi terlihat
        u.obj.position.x = u.end.x;
        u.obj.position.z = u.end.z + Math.sin(t*0.7 + u.start.z)*4;   // menggeser pelan, terlihat hidup
        if (u.clock >= u.holdDur) enterDeath(u);
      } else {                                                   // death — sudah tertembak, sekarat sebelum meledak
        u.obj.rotation.z += sdt*2.6*u.deathSpin;                 // oleng
        u.obj.position.y -= sdt*(u.fly>0 ? 14 : 3);              // tersungkur / jatuh
        if (u.clock >= u.deathDur){
          scene.remove(u.obj);
          const bi = bigUnitObjs.indexOf(u.obj); if (bi>=0) bigUnitObjs.splice(bi,1);
          explode(u.obj.position, u.color, u.mag, u.tier);
          units.splice(i,1); continue;
        }
      }
      if (u.phase!=='death'){
        // melayang lebih tinggi & jelas mengambang untuk unit udara
        const amp = u.fly>0 ? 3.2 : 0;
        u.obj.position.y = u.fly + (u.fly>0 ? Math.sin(t*1.8 + u.start.z)*amp : 0);
      }
      if (u.rotor) u.rotor.rotation.y += sdt*40;                 // baling-baling berputar
      if (u.wheels && u.phase==='approach')                      // roda menggelinding selama melaju masuk
        for (const w of u.wheels) w.rotation.z -= sdt*9;
      if (u.heli && u.phase!=='death'){                          // rotor meniupkan debu di tanah bawahnya
        u.dustT -= sdt;
        if (u.dustT <= 0){ u.dustT = .1; spawnDust(u.obj.position.x, u.obj.position.z, 24, 7+Math.random()*6); }
      }
      if (u.phase!=='death'){                                    // masih hidup → terus menyerang
        u.fireT -= sdt;
        if (u.fireT <= 0){
          u.fireT = .16;
          const from = u.obj.position.clone(); from.y += 2;
          fireBullet(u.side, from, crowdPoint(u.defender, 14), true, u.defender, true); // peluru besar, jangkauan jauh
          playCannon();
        }
      }
    } else {
      u.t += sdt/u.dur;
      if (u.t>=1){
        scene.remove(u.obj);
        if (u.obj.material) u.obj.material.dispose();
        explode(u.end, u.color, u.mag, u.tier);
        units.splice(i,1); continue;
      }
      const k = u.t;
      u.obj.position.lerpVectors(u.start, u.end, k);
      u.obj.position.y = u.start.y + Math.sin(k*Math.PI)*u.apex;
    }
  }

  // serangan udara — pembom melintas menjatuhkan bom beruntun di garis lawan
  for (let i=airstrikes.length-1;i>=0;i--){
    const a = airstrikes[i];
    a.t += sdt / a.dur;
    const k = Math.min(1, a.t);
    a.obj.position.lerpVectors(a.from, a.to, k);
    a.obj.position.y = 150 + Math.sin(k*Math.PI)*8;
    if (a.rotor) a.rotor.rotation.y += sdt*40;
    while (a.dropped < a.drops.length && k >= a.drops[a.dropped]){
      a.dropped++;
      const gp = new THREE.Vector3(a.obj.position.x, 1, a.z0 + (Math.random()-.5)*42);
      explode(gp, a.side==='buy' ? C_LONG : C_SHORT, .9, 2);
      makeSpark(gp, C_GOLD, 34, .4);
      killSoldier(a.defender, 5);
      spawnSkull(gp);
      addShake(1.6); addFlash(.26, '#ffd9a3');
      playBoom(.9, 2);
    }
    if (a.t >= 1){
      scene.remove(a.obj);
      const bi = bigUnitObjs.indexOf(a.obj); if (bi>=0) bigUnitObjs.splice(bi,1);
      airstrikes.splice(i,1);
      triggerRout(a.side==='buy' ? 'sell' : 'buy', 1);   // korban lari kocar-kacir
    }
  }

  // tembakan artileri — mortir jatuh beruntun ke wilayah lawan (varian lain order boss)
  for (let i=barrages.length-1;i>=0;i--){
    const b = barrages[i];
    b.t += sdt;
    while (b.done < b.shells.length && b.t >= b.shells[b.done].at){
      const s = b.shells[b.done++];
      b.curPos.copy(s.pos);
      explode(s.pos, C_GOLD2, .85+Math.random()*.25, 2);
      makeSpark(s.pos, C_GOLD, 26, .3);
      killSoldier(b.defender, 4);
      spawnSkull(s.pos);
      addShake(1.3); addFlash(.2, '#ffcf8c');
      playBoom(.85, 2);
    }
    if (b.t >= b.dur){
      barrages.splice(i,1);
      triggerRout(b.side==='buy' ? 'sell' : 'buy', .8);
    }
  }

  // peluru pelacak
  for (let i=bullets.length-1;i>=0;i--){
    const b = bullets[i];
    const step = b.speed*sdt;
    b.traveled += step;
    b.pos.addScaledVector(b.vel, step);
    _bdir.copy(b.vel);
    _bq.setFromUnitVectors(AXIS_X, _bdir);
    b.m.quaternion.copy(_bq);
    b.m.position.copy(b.pos);
    b.m.scale.set(b.len, b.w, b.w);
    if (b.traveled >= b.dist){
      const killN = b.big ? 3 : 1;                               // peluru besar = ledakan area
      if (b.kills || b.big || Math.random() < .22) makeSpark(b.target, b.color, b.big?28:12, b.big?.32:.18);
      if (b.kills){
        killSoldier(b.defender, killN);
        spawnSkull(b.target);
        floatNum(b.target, '-'+killN, b.side==='buy'?'up':'dn');
        if (b.big) addShake(.6);
      }
      scene.remove(b.m);
      bullets.splice(i,1);
    }
  }

  // percikan / kilatan moncong
  for (let i=sparks.length-1;i>=0;i--){
    const s = sparks[i];
    s.t += sdt/s.dur;
    if (s.t>=1){ scene.remove(s.spr); s.spr.material.dispose(); sparks.splice(i,1); continue; }
    const g = s.size*(1 + s.t*1.3);
    s.spr.scale.set(g,g,1);
    s.spr.material.opacity = 1-s.t;
  }

  // debu rotor helikopter — mengembang keluar lalu menipis
  for (let i=dusts.length-1;i>=0;i--){
    const d = dusts[i];
    d.t += sdt/d.dur;
    if (d.t>=1){ scene.remove(d.spr); d.spr.material.dispose(); dusts.splice(i,1); continue; }
    d.spr.position.x += d.vx*sdt; d.spr.position.z += d.vz*sdt;
    d.spr.position.y += 2.5*sdt;
    const g = d.size*(.5 + d.t*1.6);
    d.spr.scale.set(g,g,1);
    d.spr.material.opacity = .38*(1-d.t);
  }

  // puing ledakan — terpental dengan gravitasi, memantul, tergeletak, lalu mengecil & hilang
  for (let i=debris.length-1;i>=0;i--){
    const d = debris[i];
    if (d.state===2){                                     // meredup: mengecil sampai hilang
      d.t += sdt;
      const k = 1 - d.t/.7;
      if (k<=0){ scene.remove(d.m); debris.splice(i,1); continue; }
      d.m.scale.setScalar(d.s*k);
      d.m.position.y = d.s*k*.5;
      continue;
    }
    if (d.state===1){                                     // tergeletak beberapa detik
      d.t -= sdt;
      if (d.t<=0){ d.state=2; d.t=0; }
      continue;
    }
    d.vy -= 220*sdt;                                      // terpental (fisika sederhana)
    d.m.position.x += d.vx*sdt; d.m.position.y += d.vy*sdt; d.m.position.z += d.vz*sdt;
    d.m.rotation.x += d.rx*sdt; d.m.rotation.z += d.rz*sdt;
    if (d.m.position.y <= d.s*.5 && d.vy < 0){
      d.m.position.y = d.s*.5;
      if (++d.bounce > 1 || Math.abs(d.vy) < 30){ d.state=1; d.t=2.2+Math.random()*2; }
      else { d.vy*=-.38; d.vx*=.55; d.vz*=.55; d.rx*=.5; d.rz*=.5; }
    }
  }

  // kawah gosong — bertahan beberapa detik lalu memudar
  for (let i=craters.length-1;i>=0;i--){
    const c = craters[i];
    c.t += dt;
    if (c.t > c.hold){
      const k = 1 - (c.t - c.hold)/c.fade;
      if (k <= 0){ scene.remove(c.m); c.m.material.dispose(); craters.splice(i,1); continue; }
      c.m.material.opacity = .9*k;
    }
  }

  for (let i=booms.length-1;i>=0;i--){
    const b = booms[i];
    b.t += dt/b.dur;
    if (b.t>=1){ scene.remove(b.pts); b.pts.geometry.dispose(); b.pts.material.dispose(); booms.splice(i,1); continue; }
    const pos = b.pts.geometry.attributes.position;
    for (let j=0;j<b.vel.length;j++){
      b.vel[j].y -= 160*dt;
      pos.array[j*3]   += b.vel[j].x*dt;
      pos.array[j*3+1] = Math.max(1, pos.array[j*3+1]+b.vel[j].y*dt);
      pos.array[j*3+2] += b.vel[j].z*dt;
    }
    pos.needsUpdate = true;
    b.pts.material.opacity = 1-b.t;
  }

  for (let i=rings.length-1;i>=0;i--){
    const r = rings[i];
    r.t += dt/r.dur;
    if (r.t>=1){ scene.remove(r.rm); r.rm.material.dispose(); rings.splice(i,1); continue; }
    const s = 1 + r.t*r.max;
    r.rm.scale.set(s,s,1);
    r.rm.material.opacity = .8*(1-r.t);
  }

  if (lockUnit && lockPosNow(_lockPos)){
    // A2: kunci — kamera merapat & mengorbit pelan unit yang dipilih, di atas mode apa pun
    _camTgt.copy(_lockPos); _camTgt.y += 6;
    orbit.target.lerp(_camTgt, Math.min(1, dt*4));
    orbit.phi    += (0.32 - orbit.phi   )*Math.min(1, dt*2.2);
    orbit.radius += (72   - orbit.radius)*Math.min(1, dt*2.2);
    orbit.theta  += dt*0.25 * (lockUnit.side==='buy' ? 1 : -1);
  } else if (camMode===0){
    const shotDef = CINE_SHOTS[cineIdx];
    if (t - cineShotStart > shotDef.dur){
      let ni; do { ni = (Math.random()*CINE_SHOTS.length)|0; } while (ni===cineIdx && CINE_SHOTS.length>1);
      cineIdx = ni; cineShotStart = t;
    }
    const shot = shotDef.run(t-cineShotStart, t, frontX, shotDef.dur);
    orbit.theta  += (shot.theta  - orbit.theta )*dt*.8;
    orbit.phi    += (shot.phi    - orbit.phi   )*dt*.8;
    orbit.radius += (shot.radius - orbit.radius)*dt*.7;
    _camTgt.set(shot.tx, shot.ty, shot.tz);
    orbit.target.lerp(_camTgt, dt*.8);
  } else if (camMode===1){
    followPos.lerp(lastImpact, dt*2.2);
    orbit.target.lerp(new THREE.Vector3(followPos.x,15,followPos.z), dt*2.2);
    orbit.radius += (340-orbit.radius)*dt*.8;
  } else {
    const sp = 300*dt;
    const fwd = new THREE.Vector3(Math.sin(orbit.theta),0,Math.cos(orbit.theta));
    const rgt = new THREE.Vector3(fwd.z,0,-fwd.x);
    if (keys['w']) orbit.target.addScaledVector(fwd,-sp);
    if (keys['s']) orbit.target.addScaledVector(fwd, sp);
    if (keys['a']) orbit.target.addScaledVector(rgt,-sp);
    if (keys['d']) orbit.target.addScaledVector(rgt, sp);
    if (keys['q']) orbit.target.y = Math.max(5, orbit.target.y-sp);
    if (keys['e']) orbit.target.y += sp;
  }
  camera.position.set(
    orbit.target.x + orbit.radius*Math.cos(orbit.phi)*Math.sin(orbit.theta),
    orbit.target.y + orbit.radius*Math.sin(orbit.phi),
    orbit.target.z + orbit.radius*Math.cos(orbit.phi)*Math.cos(orbit.theta)
  );
  camera.lookAt(orbit.target);
  if (shake > .01){
    const k = shake * (orbit.radius/540);
    camera.position.x += (Math.random()-.5)*k*2.2;
    camera.position.y += (Math.random()-.5)*k*2.2;
    camera.position.z += (Math.random()-.5)*k*2.2;
    shake = Math.max(0, shake - dt*14);
  }

  // penanda cincin & lencana untuk unit yang terkunci (A2)
  if (lockUnit && lockPosNow(_lockPos)){
    lockRing.visible = true;
    lockRing.position.set(_lockPos.x, 1.4, _lockPos.z);
    const pl = 3 + Math.sin(t*6)*.5;
    lockRing.scale.set(pl, pl, 1);
    lockRing.material.color.setHex(lockColor());
    _pv.copy(_lockPos); _pv.y += 10; _pv.project(camera);
    if (_pv.z < 1){
      lockBadge.style.left = ((_pv.x*.5+.5)*innerWidth) + 'px';
      lockBadge.style.top  = ((-_pv.y*.5+.5)*innerHeight) + 'px';
    }
  } else if (lockRing.visible){
    lockRing.visible = false;
    lockBadge.className = '';
  }

  renderer.render(scene, camera);
}

addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

    streakSuffixT2:'× SEDANG PANAS', streakSuffixT3:'× TAK TERBENDUNG',
    whaleTag:'PAUS', liqTag:'LIKUIDASI',
    topBuy:'BELI TERBESAR', topSell:'JUAL TERBESAR',

  },
};
let lang = 'en';
try { const saved = localStorage.getItem('bf-lang'); if (saved==='en' || saved==='id') lang = saved; } catch(e){}
const langBtn = document.getElementById('lang-btn');
function applyLanguage(){
  const L = I18N[lang];
  document.documentElement.lang = lang;
  langBtn.textContent = lang.toUpperCase();
  langBtn.title = L.langBtnTitle;
  retryBtn.textContent = L.retry;
  setBadge(feedState);
  fsBtn.title = fsElement() ? L.fsExit : L.fsEnter;

  document.getElementById('pp-head-label').textContent = L.pressureLabel;
  document.getElementById('pp-long-word').textContent = L.long;

/* ═══════════════════════════════════════════════════════════
   FITUR: KARTU MOMEN — tangkap & bagikan momen besar
   ═══════════════════════════════════════════════════════════ */
const RFONT="'SF Pro Rounded','SFRounded',ui-rounded,system-ui,sans-serif";
const MFONT="ui-monospace,'SF Mono',Menlo,Consolas,monospace";
const cardModal=document.getElementById('card-modal'), cardImg=document.getElementById('card-img');
const shareBtn=document.getElementById('share-btn');
const mtEl=document.getElementById('moment-toast'), mtTxt=document.getElementById('mt-txt'),
      mtSave=document.getElementById('mt-save'), mtClose=document.getElementById('mt-close');
const cardDownloadBtn=document.getElementById('card-download'), cardShareBtn=document.getElementById('card-share'), cardCloseBtn=document.getElementById('card-close');
let lastToast=-1e9, pendingMoment=null, cardCanvas=null, mtTimer=null;
function grabSnap(){
  const s=renderer.domElement, c=document.createElement('canvas');
  c.width=s.width; c.height=s.height;
  try { c.getContext('2d').drawImage(s,0,0); } catch(e){}
  return c;
}
function bigMoment(type, side, usd, p){
  const huge = type==='liq' ? usd>=200000 : usd>=1500000;   // hanya yang benar-benar besar
  if (!huge) return;
  const now=performance.now();
  if (now-lastToast < 12000) return;                        // jangan spam
  lastToast=now;
  pendingMoment={ type, side, usd, price:p, ts:Date.now(), snap:grabSnap() };
  const L=I18N[lang];
  mtTxt.innerHTML = (type==='liq'?L.momentToastLiq:L.momentToastWhale)+' · <b>'+fmtUsd(usd)+'</b>';
  mtSave.textContent=L.momentSave;
  mtEl.classList.add('show');
  clearTimeout(mtTimer); mtTimer=setTimeout(()=>mtEl.classList.remove('show'), 8000);
}
function buildCard(m){
  const cw=1200, ch=630, c=document.createElement('canvas'); c.width=cw; c.height=ch;
  const x=c.getContext('2d'), L=I18N[lang];
  const snap = m.snap || grabSnap();
  if (snap && snap.width){
    const sr=snap.width/snap.height, cr=cw/ch; let sw,sh,sx,sy;
    if (sr>cr){ sh=ch; sw=ch*sr; sx=(cw-sw)/2; sy=0; } else { sw=cw; sh=cw/sr; sx=0; sy=(ch-sh)/2; }
    x.drawImage(snap, sx,sy,sw,sh);
  } else { x.fillStyle='#0e1226'; x.fillRect(0,0,cw,ch); }
  const gr=x.createLinearGradient(0,ch*0.4,0,ch); gr.addColorStop(0,'rgba(10,12,24,0)'); gr.addColorStop(1,'rgba(10,12,24,.94)');
  x.fillStyle=gr; x.fillRect(0,0,cw,ch);
  x.fillStyle='rgba(10,12,24,.55)'; x.fillRect(0,0,cw,72);
  x.textBaseline='alphabetic'; x.textAlign='left';
  x.font='800 30px '+RFONT; x.fillStyle='#eef1fb'; x.fillText('BTC BATTLEFIELD', 40, 47);
  x.textAlign='right'; x.font='700 18px '+MFONT; x.fillStyle='#8891b8';
  x.fillText(new Date(m.ts).toLocaleString(), cw-40, 46);
  const col = m.type==='liq' ? '#ffc857' : (m.side==='buy'?'#2dd6a5':'#ff6584');
  const label = m.type==='liq' ? L.momentLiq : m.type==='snapshot' ? L.momentSnap : (m.side==='buy'?L.momentWhaleBuy:L.momentWhaleSell);
  x.textAlign='left'; x.font='800 60px '+RFONT; x.fillStyle=col;
  x.fillText(m.usd ? label+'   '+fmtUsd(m.usd) : label, 40, ch-118);
  x.font='700 32px '+MFONT; x.fillStyle='#eef1fb';
  x.fillText('@ $'+(m.price||price||0).toLocaleString('en-US',{maximumFractionDigits:0}), 40, ch-70);
  const lp=Math.round(buyShare*100);
  x.font='800 22px '+RFONT;
  x.fillStyle='#2dd6a5'; x.fillText('BUY '+lp+'%', 40, ch-28);
  const w1=x.measureText('BUY '+lp+'%').width;
  x.fillStyle='#8891b8'; x.fillText('  vs  ', 40+w1, ch-28);
  const w2=x.measureText('  vs  ').width;
  x.fillStyle='#ff6584'; x.fillText((100-lp)+'% SELL', 40+w1+w2, ch-28);
  x.textAlign='right'; x.font='700 16px '+MFONT; x.fillStyle='rgba(255,255,255,.4)';
  x.fillText('live BTC/USDT', cw-40, ch-28);
  return c;
}
function safeDataURL(c){ try { return c.toDataURL('image/png'); } catch(e){ return ''; } }
function openCard(m){
  const L=I18N[lang];
  cardCanvas = buildCard(m);
  const url = safeDataURL(cardCanvas);
  if (url) cardImg.src = url; else cardImg.removeAttribute('src');
  cardDownloadBtn.textContent=L.cardDownload; cardShareBtn.textContent=L.cardShare; cardCloseBtn.textContent=L.cardClose;
  cardShareBtn.style.display = (navigator.canShare) ? '' : 'none';
  cardModal.classList.add('show');
}
shareBtn.onclick=()=>openCard({ type:'snapshot', side:buyShare>=.5?'buy':'sell', usd:null, price, ts:Date.now(), snap:grabSnap() });
mtSave.onclick=()=>{ mtEl.classList.remove('show'); if(pendingMoment) openCard(pendingMoment); };
mtClose.onclick=()=>mtEl.classList.remove('show');
cardCloseBtn.onclick=()=>cardModal.classList.remove('show');
cardModal.onclick=(e)=>{ if(e.target===cardModal) cardModal.classList.remove('show'); };
cardDownloadBtn.onclick=()=>{ if(cardCanvas){ const u=safeDataURL(cardCanvas); if(u){ const a=document.createElement('a'); a.href=u; a.download='btc-battlefield.png'; a.click(); } } };
cardShareBtn.onclick=()=>{ if(!cardCanvas) return; cardCanvas.toBlob(async (blob)=>{ if(!blob) return;
  const file=new File([blob],'btc-battlefield.png',{type:'image/png'});
  try { if(navigator.canShare && navigator.canShare({files:[file]})) await navigator.share({ files:[file], title:'BTC Battlefield' }); } catch(e){}
}, 'image/png'); };

applyLanguage();

/* bantuan uji manual dari console (peristiwa langka sulit ditunggu secara alami di pasar nyata):
   __testEvent('airstrike' | 'barrage' | 'streak' | 'star' | 'pump' | 'dump' | 'crater') */
window.__testEvent = (name)=>{
  const usd = T_BOSS*1.5, side = Math.random()<.5 ? 'buy' : 'sell';
  if (name==='airstrike') spawnAirstrike(side, usd);
  else if (name==='barrage') spawnBarrage(side, usd);
  else if (name==='streak'){ for (let i=0;i<20;i++) bumpStreak(side); }
  else if (name==='star') nextStarCheck = 0;
  else if (name==='pump'){ volForce = 1; volForceUntil = performance.now()+15000; }
  else if (name==='dump'){ volForce = -1; volForceUntil = performance.now()+15000; liqStorm = 1; }
  else if (name==='crater') explode(new THREE.Vector3((Math.random()-.5)*200, 1, (Math.random()-.5)*200), C_GOLD, .9, 2);
  else if (name==='tank') spawnBigUnit(side, 100000);
  else if (name==='heli') spawnBigUnit(side, 500000);
  else return 'unknown — use: airstrike | barrage | streak | star | pump | dump | crater | tank | heli';
  return 'triggered: ' + name;
};

connect();
tick();
})();
</script>

<script type="module">
/* ═══════════ ONLINE COUNT & OBROLAN — Firebase Realtime Database ═══════════
   Modul terpisah dari script utama; kalau Firebase gagal dimuat (mis. offline),
   fitur ini diam-diam nonaktif tanpa mengganggu battlefield-nya sendiri. */
import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js';
import {
  getDatabase, ref, set, remove, onValue, onChildAdded, onChildRemoved, onDisconnect,
  push, serverTimestamp, query, limitToLast, get, orderByChild, endAt, update,
} from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js';

const firebaseConfig = {
  apiKey: 'AIzaSyBhe3TTSR_TS8i7cMflawq-ukZdkv4NLds',
  authDomain: 'btc-battle-44645.firebaseapp.com',
  projectId: 'btc-battle-44645',
  storageBucket: 'btc-battle-44645.firebasestorage.app',
  messagingSenderId: '159434799273',
  appId: '1:159434799273:web:29150b6142eed8280ed1b8',
};
const DATABASE_URL = 'https://btc-battle-44645-default-rtdb.asia-southeast1.firebasedatabase.app/';

/* ── terjemahan: modul ini terpisah dari script utama, jadi bahasa dibaca lewat
   <html lang="..">  (yang sudah diatur applyLanguage() di script utama) dan disinkron ulang
   lewat MutationObserver setiap kali tombol EN/ID di script utama diklik ── */
const CHAT_I18N = {
  en: {
    online:'online', chatTitle:'CHAT', chatBtnTitle:'Chat', onlineTitle:'Watching now',
    closeAria:'Close', emptyText:'No messages yet. Say something!', namePlaceholder:'Name',
    textPlaceholder:'Type a message…', sendAria:'Send', emojiAria:'Emoji', guestPrefix:'Soldier',
  },
  id: {
    online:'online', chatTitle:'OBROLAN', chatBtnTitle:'Obrolan', onlineTitle:'Sedang menonton',
    closeAria:'Tutup', emptyText:'Belum ada obrolan. Mulai duluan!', namePlaceholder:'Nama',
    textPlaceholder:'Ketik pesan…', sendAria:'Kirim', emojiAria:'Emoji', guestPrefix:'Prajurit',
  },
};

/* emoji standar untuk dipilih lewat picker, tanpa perlu library luar */
const EMOJI_LIST = ['😀','😂','😍','😎','🔥','👍','👎','❤️','🎉','😢','😡','🚀','💰','📈','📉','🐂','🐻','💎','🙌','😱','🤔','👀','✅','❌','😴','🥳','💯','⚡','🤝','😭'];

try {
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app, DATABASE_URL);
  const clientId = crypto.randomUUID ? crypto.randomUUID() : 'c'+Math.random().toString(36).slice(2)+Date.now();
  let chatLang = document.documentElement.lang === 'id' ? 'id' : 'en';
  let lastOnlineN = 1;

  /* ── jumlah online: hadir/hilang lewat onDisconnect, disiapkan ulang tiap koneksi tersambung
     (pola resmi Firebase — supaya tetap akurat walau sempat putus-nyambung) ── */
  const onlineCountEl = document.getElementById('online-count');
  const chatOnlineLabelEl = document.getElementById('chat-online-label');
  onValue(ref(db, '.info/connected'), (snap) => {
    if (snap.val() !== true) return;
    const myPresenceRef = ref(db, 'presence/' + clientId);
    onDisconnect(myPresenceRef).remove().then(() => { set(myPresenceRef, true); });
  });
  function renderOnlineCount(){
    const word = CHAT_I18N[chatLang].online;
    if (onlineCountEl) onlineCountEl.textContent = lastOnlineN + ' ' + word;
    if (chatOnlineLabelEl) chatOnlineLabelEl.textContent = '· ' + lastOnlineN + ' ' + word;
  }
  onValue(ref(db, 'presence'), (snap) => {
    lastOnlineN = Math.max(1, snap.exists() ? Object.keys(snap.val()).length : 0);
    renderOnlineCount();
  });

  /* ── obrolan: 50 pesan terakhir, nama tersimpan di localStorage ── */
  const chatBtn = document.getElementById('chat-btn'), chatPanel = document.getElementById('chat-panel'),
        chatClose = document.getElementById('chat-close'), chatMsgs = document.getElementById('chat-msgs'),
        chatForm = document.getElementById('chat-form'),
        chatName = document.getElementById('chat-name'), chatText = document.getElementById('chat-text'),
        chatBadge = document.getElementById('chat-badge'), chatTitleEl = document.querySelector('#chat-head h4'),
        onlinePillEl = document.getElementById('online-pill'),
        emojiBtn = document.getElementById('chat-emoji-btn'), emojiPicker = document.getElementById('emoji-picker');
  let chatEmpty = document.getElementById('chat-empty');

  chatName.value = localStorage.getItem('bf-chat-name') || (CHAT_I18N[chatLang].guestPrefix + Math.floor(Math.random()*9000+1000));

  function applyChatLang(newLang){
    chatLang = newLang;
    const L = CHAT_I18N[chatLang];
    onlinePillEl.title = L.onlineTitle;
    chatBtn.title = L.chatBtnTitle; chatBtn.setAttribute('aria-label', L.chatBtnTitle);
    chatTitleEl.textContent = L.chatTitle;
    chatClose.setAttribute('aria-label', L.closeAria);
    chatName.placeholder = L.namePlaceholder;
    chatText.placeholder = L.textPlaceholder;
    document.getElementById('chat-send').setAttribute('aria-label', L.sendAria);
    emojiBtn.setAttribute('aria-label', L.emojiAria);
    if (chatEmpty) chatEmpty.textContent = L.emptyText;
    renderOnlineCount();
  }
  applyChatLang(chatLang);
  new MutationObserver(() => {
    const newLang = document.documentElement.lang === 'id' ? 'id' : 'en';
    if (newLang !== chatLang) applyChatLang(newLang);
  }).observe(document.documentElement, { attributes:true, attributeFilter:['lang'] });

  let unread = 0, chatOpen = false;

  function setBadge(){
    chatBadge.textContent = unread > 9 ? '9+' : String(unread);
    chatBadge.classList.toggle('show', unread > 0 && !chatOpen);
  }
  chatBtn.onclick = () => {
    chatOpen = !chatOpen;
    chatPanel.classList.toggle('open', chatOpen);
    chatBtn.classList.toggle('active', chatOpen);
    if (chatOpen){ unread = 0; setBadge(); chatMsgs.scrollTop = chatMsgs.scrollHeight; chatText.focus(); }
  };
  chatClose.onclick = () => { chatOpen = false; chatPanel.classList.remove('open'); chatBtn.classList.remove('active'); };

  /* ── emoji picker: grid statis, klik = sisip di posisi kursor lalu kembali fokus ── */
  for (const em of EMOJI_LIST){
    const b = document.createElement('button');
    b.type = 'button'; b.textContent = em;
    b.onclick = () => {
      const start = chatText.selectionStart ?? chatText.value.length;
      const end = chatText.selectionEnd ?? chatText.value.length;
      chatText.value = chatText.value.slice(0, start) + em + chatText.value.slice(end);
      const pos = start + em.length;
      chatText.focus();
      chatText.setSelectionRange(pos, pos);
    };
    emojiPicker.appendChild(b);
  }
  let emojiOpen = false;
  emojiBtn.onclick = () => {
    emojiOpen = !emojiOpen;
    emojiPicker.classList.toggle('open', emojiOpen);
    emojiBtn.classList.toggle('active', emojiOpen);
  };

  let firstLoad = true;
  const chatQuery = query(ref(db, 'chat'), limitToLast(50));   // batas tampil 50 pesan terakhir — tetap berlaku terlepas dari cleanup di bawah
  onChildAdded(chatQuery, (snap) => {
    const m = snap.val();
    if (!m || typeof m.name !== 'string' || typeof m.text !== 'string') return;
    if (chatEmpty){ chatEmpty.remove(); chatEmpty = null; }
    const row = document.createElement('div');
    row.className = 'cm' + (m.name === chatName.value ? ' me' : '');
    row.dataset.key = snap.key;
    const nameSpan = document.createElement('span'); nameSpan.className = 'cn'; nameSpan.textContent = m.name + ': ';
    const textSpan = document.createElement('span'); textSpan.className = 'cx'; textSpan.textContent = m.text;   // textContent — jangan innerHTML (cegah XSS)
    row.append(nameSpan, textSpan);
    if (m.ts){
      const timeSpan = document.createElement('span'); timeSpan.className = 'ct';
      timeSpan.textContent = new Date(m.ts).toLocaleTimeString(chatLang==='id'?'id-ID':'en-US', { hour:'2-digit', minute:'2-digit' });
      row.appendChild(timeSpan);
    }
    chatMsgs.appendChild(row);
    chatMsgs.scrollTop = chatMsgs.scrollHeight;
    if (!firstLoad && !chatOpen){ unread++; setBadge(); }
  });
  onChildRemoved(chatQuery, (snap) => {   // ikut hilang dari tampilan semua orang saat cleanup 24 jam menghapusnya
    const row = chatMsgs.querySelector(`[data-key="${snap.key}"]`);
    if (row) row.remove();
    if (!chatMsgs.querySelector('.cm') && !chatEmpty){
      chatEmpty = document.createElement('div'); chatEmpty.id = 'chat-empty';
      chatEmpty.textContent = CHAT_I18N[chatLang].emptyText;
      chatMsgs.appendChild(chatEmpty);
    }
  });
  setTimeout(() => { firstLoad = false; }, 1500);   // beri waktu batch pesan lama masuk dulu sebelum dihitung "unread"

  /* ── bersihkan pesan lebih tua dari 24 jam — RTDB tidak punya TTL bawaan, jadi disapu dari
     client tiap kali app dibuka (+ diulang tiap 30 menit selama tab tetap terbuka). Ini murni
     soal retensi data (privasi/kebersihan); tampilan tetap dibatasi limitToLast(50) di atas. */
  const DAY_MS = 24*60*60*1000;
  async function cleanupOldChat(){
    try {
      const cutoff = Date.now() - DAY_MS;
      const oldSnap = await get(query(ref(db, 'chat'), orderByChild('ts'), endAt(cutoff)));
      if (!oldSnap.exists()) return;
      const updates = {};
      oldSnap.forEach((child) => { updates[child.key] = null; });
      await update(ref(db, 'chat'), updates);
    } catch (e) { console.warn('gagal bersihkan pesan lama (cek Firebase Rules mengizinkan hapus):', e); }
  }
  cleanupOldChat();
  setInterval(cleanupOldChat, 30*60*1000);

  chatForm.onsubmit = (e) => {
    e.preventDefault();
    let name = chatName.value.trim().slice(0,16);
    if (!name){   // nama kosong → buatkan nama tamu dulu & tampilkan di kolomnya sebelum terkirim
      name = CHAT_I18N[chatLang].guestPrefix + Math.floor(Math.random()*9000+1000);
      chatName.value = name;
    }
    const text = chatText.value.trim().slice(0,200);
    if (!text) return;
    localStorage.setItem('bf-chat-name', name);
    const sentText = chatText.value;
    push(ref(db, 'chat'), { name, text, ts: serverTimestamp() })
      .then(() => { chatText.value = ''; })   // baru dikosongkan kalau memang berhasil terkirim
      .catch((err) => {
        console.error('gagal kirim pesan chat (cek Firebase Realtime Database Rules):', err);
        chatText.value = sentText;
        chatText.placeholder = chatLang==='id' ? 'Gagal terkirim — cek Rules Firebase' : 'Failed to send — check Firebase Rules';
      });
  };
} catch (e) {
  console.warn('online/chat (Firebase) gagal dimuat:', e);
}
</script>
