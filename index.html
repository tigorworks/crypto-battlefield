<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>BTC Battlefield — Live</title>
<link rel="preload" href="three.min.js" as="script">
<link rel="preload" href="land.jpg" as="image">
<style>
  :root{
    --bg-1:#0a0c18;
    --bg-2:#1b2050;
    --ink:#eef1fb;
    --muted:#8891b8;
    --panel:rgba(19,22,42,.82);
    --line:rgba(255,255,255,.08);
    --long:#2dd6a5;
    --short:#ff6584;
    --gold:#ffc857;
    --mono:ui-monospace,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace;
    --rounded:'SF Pro Rounded','SFRounded',ui-rounded,system-ui,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:linear-gradient(180deg,#bfe3f7 0%,#9dc077 55%,#7fa85f 100%);font-family:var(--mono);color:var(--muted)}
  canvas{display:block;touch-action:none}   /* biar drag 1-jari & cubit ditangani app, bukan di-scroll browser */
  .hud{position:fixed;z-index:10;user-select:none;-webkit-user-select:none}
  button{font-family:var(--rounded)}

  /* ── layar muat awal: tampil segera, memberi umpan balik saat aset & mesin 3D dimuat ── */
  #boot{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:15px;background:linear-gradient(180deg,#0a0c18,#141a33);transition:opacity .55s ease;font-family:var(--rounded)}
  #boot.gone{opacity:0;pointer-events:none}
  #boot .bt{font-size:15px;font-weight:800;letter-spacing:.22em;text-transform:uppercase;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.6)}
  #boot .bs{font-size:10px;letter-spacing:.2em;color:var(--muted);font-weight:700}
  #boot .ring{width:32px;height:32px;border-radius:50%;border:3px solid rgba(255,255,255,.14);border-top-color:var(--long);animation:bootspin .8s linear infinite}
  @keyframes bootspin{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion: reduce){ #boot .ring{animation:none} }
  #boot .bq{max-width:420px;padding:0 28px;margin-top:6px;text-align:center;font-style:italic;font-size:14px;line-height:1.5;color:rgba(255,255,255,.82);text-shadow:0 2px 10px rgba(0,0,0,.5)}
  #boot .bq-by{margin-top:8px;font-size:10px;font-style:normal;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;backdrop-filter:blur(10px);box-shadow:0 14px 34px rgba(0,0,0,.4)}

  .btn{background:rgba(255,255,255,.03);border:1px solid var(--line);color:var(--muted);font-size:10px;padding:5px 11px;border-radius:9px;cursor:pointer;letter-spacing:.09em;transition:border-color .15s,color .15s,background .15s}
  .btn:hover{color:var(--ink);background:rgba(255,255,255,.07)}
  .btn.active{color:var(--long);border-color:rgba(45,214,165,.5);background:rgba(45,214,165,.1)}
  .btn.warn{color:var(--short);border-color:rgba(255,101,132,.5)}

  /* ── top-left: status live sederhana, tiru referensi ── */
  #feed-badge{top:max(16px,env(safe-area-inset-top) + 12px);left:max(16px,env(safe-area-inset-left) + 12px);display:inline-flex;align-items:center;gap:7px;background:rgba(10,16,10,.5);padding:6px 12px;border-radius:7px;font-size:11px;letter-spacing:.12em;font-weight:700;color:var(--muted);font-family:var(--rounded)}
  #feed-dot{width:7px;height:7px;border-radius:50%;background:var(--muted)}
  #feed-badge.live{color:var(--long)}
  #feed-badge.live #feed-dot{background:var(--long);box-shadow:0 0 8px var(--long);animation:pulse 1.6s ease-in-out infinite}
  #feed-badge.dead{color:var(--short)}
  #feed-badge.dead #feed-dot{background:var(--short)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  #retry{display:none;margin-left:6px;padding:3px 9px;font-size:9px}
  /* saat fullscreen, tombol X exit browser (mis. iPad/Safari) menutup badge di kiri-atas → pindahkan ke
     tengah-atas. (Dulu dipindah ke kanan-atas, tapi itu sekarang tabrakan dengan tombol chat/EN/fullscreen
     dan panel obrolan yang juga di kanan-atas.) */
  body.is-fs #feed-badge{
    left:50%;
    right:auto;
    top:max(16px,env(safe-area-inset-top) + 12px);
    transform:translateX(-50%);
  }

  /* ── tengah atas: harga besar mengambang di atas lapangan, kontras tinggi ── */
  #center-price{top:14%;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;z-index:9}
  #cp-value{font-size:clamp(36px,6vw,72px);font-weight:800;color:#fff;letter-spacing:-.01em;font-variant-numeric:tabular-nums;text-shadow:0 3px 0 rgba(0,0,0,.18),0 2px 4px rgba(0,0,0,.5),0 12px 30px rgba(0,0,0,.55),0 0 44px rgba(0,0,0,.35);transition:color .15s}
  #cp-value.up{color:var(--long);text-shadow:0 3px 0 rgba(0,0,0,.2),0 2px 4px rgba(0,0,0,.5),0 0 34px rgba(45,214,165,.5),0 12px 30px rgba(0,0,0,.5)}
  #cp-value.down{color:var(--short);text-shadow:0 3px 0 rgba(0,0,0,.2),0 2px 4px rgba(0,0,0,.5),0 0 34px rgba(255,101,132,.5),0 12px 30px rgba(0,0,0,.5)}
  #cp-sub{font-size:14px;font-weight:700;letter-spacing:.14em;margin-top:2px;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.55)}
  #cp-pct.up{color:var(--long)} #cp-pct.down{color:var(--short)}
  /* ── bawah tengah: tekanan pasar (panjang vs pendek), widget sendiri ── */
  #pressure{bottom:max(16px,env(safe-area-inset-bottom) + 12px);left:50%;transform:translateX(-50%);width:320px;max-width:calc(100vw - 32px);padding:11px 15px;text-align:center}
  #pp-head{font-size:9px;letter-spacing:.14em;color:var(--muted);font-weight:700;margin-bottom:8px;font-family:var(--rounded);white-space:nowrap}
  #pp-head .l{color:var(--long);font-weight:800} #pp-head .s{color:var(--short);font-weight:800}
  #pp-bar{height:7px;display:flex;overflow:hidden;border-radius:999px;background:rgba(0,0,0,.28);box-shadow:0 2px 8px rgba(0,0,0,.3)}
  #pp-long{background:var(--long);transition:width .4s}
  #pp-short{background:var(--short);transition:width .4s;flex:1}
  #pp-stats{display:flex;justify-content:space-between;margin-top:8px;font-size:10.5px;font-variant-numeric:tabular-nums}
  .pp-col.pp-s{text-align:right}
  .pp-main{font-weight:800}
  .pp-l .pp-main{color:var(--long)}
  .pp-s .pp-main{color:var(--short)}
  .pp-sub{font-size:9px;color:var(--muted);margin-top:2px;letter-spacing:.03em}

  /* ── bawah kanan: killfeed ringkas ── */
  #killfeed{bottom:max(16px,env(safe-area-inset-bottom) + 12px);right:max(16px,env(safe-area-inset-right) + 12px);width:300px;max-width:calc(100vw - 32px);padding:9px 11px;text-align:left}
  #killfeed h4{font-size:9px;letter-spacing:.24em;color:var(--muted);margin-bottom:7px;font-weight:600;font-family:var(--rounded)}
  /* rekor order terbesar sepanjang sesi — dipatri di atas killfeed */
  #kill-records{display:flex;flex-direction:column;gap:3px;margin-bottom:7px;padding-bottom:7px;border-bottom:1px solid var(--line)}
  .krec{font-size:10px;padding:4px 8px;border-radius:7px;border-left:2px solid;background:rgba(255,255,255,.07);font-variant-numeric:tabular-nums;display:flex;justify-content:space-between;align-items:center;gap:8px;white-space:nowrap;overflow:hidden}
  .krec.buy{border-color:var(--long);color:var(--long)}
  .krec.sell{border-color:var(--short);color:var(--short)}
  .krec .krec-label{opacity:.7;font-weight:700;font-size:9px;letter-spacing:.08em;font-family:var(--rounded);flex-shrink:0}
  .krec .krec-val{font-weight:600;overflow:hidden;text-overflow:ellipsis}
  #kills{overflow:hidden;max-height:112px}
  .kill{font-size:10px;padding:4px 8px;margin-bottom:3px;background:rgba(255,255,255,.04);border-radius:7px;border-left:2px solid;animation:slidein .25s ease-out;font-variant-numeric:tabular-nums;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .kill .kt{opacity:.55;margin-right:4px}
  .kill.buy{border-color:var(--long);color:var(--long)}
  .kill.sell{border-color:var(--short);color:var(--short)}
  .kill.liq{border-color:var(--gold);color:var(--gold)}
  .kill .tag{color:var(--gold);font-weight:700}
  @keyframes slidein{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}

  /* ── bawah kiri: controls, ringkas ── */
  #controls{bottom:max(16px,env(safe-area-inset-bottom) + 12px);left:max(16px,env(safe-area-inset-left) + 12px);font-size:9.5px;line-height:1.7;letter-spacing:.04em;padding:10px 13px;max-width:290px}
  #controls b{color:var(--ink);font-weight:600}
  #cam-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px}
  #cam-row .btn{padding:4px 8px;font-size:9px;white-space:nowrap}
  #audio-row{display:flex;flex-direction:column;gap:6px;margin-top:8px}
  .vol-row{display:flex;align-items:center;gap:8px}
  .vol-label{flex:none;width:32px;font-size:9px;letter-spacing:.08em;font-weight:700;color:var(--long);cursor:pointer;user-select:none;-webkit-user-select:none;font-family:var(--rounded);transition:color .15s}
  .vol-label.muted{color:var(--muted);text-decoration:line-through}
  .vol-slider{flex:1;-webkit-appearance:none;appearance:none;height:4px;border-radius:999px;background:rgba(255,255,255,.14);outline:none;cursor:pointer}
  .vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:var(--long);box-shadow:0 0 6px rgba(45,214,165,.55);cursor:pointer;margin-top:-3.5px}
  .vol-slider::-moz-range-thumb{width:11px;height:11px;border:none;border-radius:50%;background:var(--long);box-shadow:0 0 6px rgba(45,214,165,.55);cursor:pointer}
  .vol-slider::-moz-range-track{height:4px;border-radius:999px;background:rgba(255,255,255,.14)}
  .vol-slider::-moz-range-progress{height:4px;border-radius:999px;background:var(--long)}
  .vol-slider.muted::-webkit-slider-thumb{background:var(--muted);box-shadow:none}
  .vol-slider.muted::-moz-range-thumb{background:var(--muted);box-shadow:none}
  .vol-slider.muted::-moz-range-progress{background:var(--muted)}

  /* ── kanan atas: baris tombol (obrolan, widget, bahasa, layar penuh) ──
     dikelompokkan dalam satu flex row supaya kalau salah satu tombol disembunyikan
     (mis. tombol layar penuh di iPhone), yang lain rapat mengisi — tak ada "lubang" */
  #hud-topright{top:max(16px,env(safe-area-inset-top) + 12px);right:max(16px,env(safe-area-inset-right) + 12px);display:flex;align-items:center;gap:8px}
  #hud-topright > .hud{position:relative;top:auto;right:auto;flex:none}
  #lang-btn{display:flex;align-items:center;justify-content:center;width:38px;height:38px;padding:0;background:rgba(10,16,12,.6);border:1px solid var(--line);border-radius:10px;color:var(--ink);cursor:pointer;backdrop-filter:blur(6px);font-family:var(--rounded);font-size:11px;font-weight:800;letter-spacing:.04em}
  #lang-btn:hover{color:var(--long);border-color:rgba(45,214,165,.5)}
  #fs-btn{display:flex;align-items:center;justify-content:center;width:38px;height:38px;padding:0;background:rgba(10,16,12,.6);border:1px solid var(--line);border-radius:10px;color:var(--ink);cursor:pointer;backdrop-filter:blur(6px)}
  #fs-btn svg{stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  #fs-btn:hover{color:var(--long);border-color:rgba(45,214,165,.5)}
  /* ── toggle audio master: satu ketukan bisukan/nyalakan musik + efek (penting di ponsel) ── */
  #audio-btn{display:flex;align-items:center;justify-content:center;width:38px;height:38px;padding:0;background:rgba(10,16,12,.6);border:1px solid var(--line);border-radius:10px;color:var(--ink);cursor:pointer;backdrop-filter:blur(6px)}
  #audio-btn svg{stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  @media (hover:hover){ #audio-btn:hover{color:var(--long);border-color:rgba(45,214,165,.5)} }
  #audio-btn.muted{color:var(--short);border-color:rgba(255,101,132,.5)}

  #online-pill{display:inline-flex;align-items:center;margin-left:8px;padding:3px 9px 3px 8px;border-radius:999px;background:rgba(45,214,165,.16);border:1px solid rgba(45,214,165,.4);color:var(--long);font-weight:800;font-size:10px;letter-spacing:.04em}

  #widgets-btn{display:flex;align-items:center;justify-content:center;width:38px;height:38px;padding:0;background:rgba(10,16,12,.6);border:1px solid var(--line);border-radius:10px;color:var(--ink);cursor:pointer;backdrop-filter:blur(6px)}
  #widgets-btn.active{color:var(--long);border-color:rgba(45,214,165,.5)}
  @media (hover:hover){ #widgets-btn:hover{color:var(--long);border-color:rgba(45,214,165,.5)} }
  #widgets-btn svg{stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

  #chat-btn{display:flex;align-items:center;justify-content:center;width:38px;height:38px;padding:0;background:rgba(10,16,12,.6);border:1px solid var(--line);border-radius:10px;color:var(--ink);cursor:pointer;backdrop-filter:blur(6px)}
  #chat-btn:hover,#chat-btn.active{color:var(--long);border-color:rgba(45,214,165,.5)}
  #chat-btn svg{stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  #chat-btn .badge{position:absolute;top:-5px;right:-5px;min-width:16px;height:16px;padding:0 4px;border-radius:8px;background:var(--short);color:#fff;font-size:9px;font-weight:800;line-height:16px;font-family:var(--rounded);display:none}
  #chat-btn .badge.show{display:block}

  #chat-panel{top:calc(max(16px,env(safe-area-inset-top) + 12px) + 50px);right:max(16px,env(safe-area-inset-right) + 12px);width:340px;max-height:min(640px,calc(100vh - 110px));display:none;flex-direction:column;overflow:hidden;z-index:15}
  #chat-panel.open{display:flex}
  #chat-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--line);flex:none}
  #chat-head-l{display:flex;align-items:baseline;gap:8px}
  #chat-head h4{font-size:10px;letter-spacing:.22em;color:var(--ink);font-weight:700;font-family:var(--rounded)}
  #chat-online-label{font-size:10px;color:var(--long);font-weight:700}
  #chat-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;line-height:1;padding:4px}
  #chat-close:hover{color:var(--ink)}
  #chat-msgs{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:9px;font-size:12.5px;min-height:260px}
  #chat-msgs .cm{align-self:flex-start;max-width:86%;padding:7px 11px;border-radius:14px 14px 14px 3px;background:rgba(255,255,255,.055);line-height:1.45;word-wrap:break-word}
  #chat-msgs .cm.me{align-self:flex-end;background:rgba(45,214,165,.14);border-radius:14px 14px 3px 14px}
  #chat-msgs .cm .cn{font-weight:700;color:var(--long)}
  #chat-msgs .cm .cx{color:var(--ink)}
  #chat-msgs .cm.me .cn{color:var(--gold)}
  #chat-msgs .cm .ct{margin-left:6px;font-size:9px;color:var(--muted);font-weight:500;letter-spacing:.02em}
  #chat-empty{color:var(--muted);font-size:11px;text-align:center;margin:auto;line-height:1.6}
  #chat-namerow{display:flex;align-items:center;gap:7px;padding:10px 13px 0;flex:none;color:var(--muted);border-top:1px solid var(--line)}
  #chat-namerow svg{stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex:none}
  #chat-form{display:flex;align-items:center;gap:7px;padding:8px 11px 11px;flex:none}
  #chat-name{flex:1;min-width:0;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:10px;color:var(--ink);font-size:11.5px;padding:7px 10px;font-family:var(--rounded)}
  #chat-text{flex:1;min-width:0;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:18px;color:var(--ink);font-size:12px;padding:9px 13px;font-family:var(--rounded)}
  #chat-name:focus,#chat-text:focus{outline:none;border-color:rgba(45,214,165,.5)}
  #chat-send{width:36px;height:36px;flex:none;display:flex;align-items:center;justify-content:center;background:var(--long);border:none;color:#08281f;border-radius:50%;cursor:pointer;transition:transform .12s,background .12s}
  #chat-send svg{stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
  #chat-send:hover{background:#3ef0bd;transform:scale(1.06)}
  #chat-emoji-btn{width:34px;height:34px;flex:none;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.05);border:1px solid var(--line);color:var(--muted);border-radius:50%;cursor:pointer;transition:color .12s,border-color .12s}
  #chat-emoji-btn svg{stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  #chat-emoji-btn:hover,#chat-emoji-btn.active{color:var(--long);border-color:rgba(45,214,165,.5)}
  #emoji-picker{display:none;flex-wrap:wrap;gap:2px;padding:10px;border-top:1px solid var(--line);max-height:150px;overflow-y:auto;flex:none}
  #emoji-picker.open{display:flex}
  #emoji-picker button{width:32px;height:32px;flex:none;background:none;border:none;font-size:18px;line-height:1;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  #emoji-picker button:hover{background:rgba(255,255,255,.08)}
  @media (max-width:640px){ #chat-panel{width:calc(100vw - 24px)} }

  #flash{position:fixed;inset:0;pointer-events:none;z-index:8;background:#fff;opacity:0}

  /* ── lapisan efek: angka damage melayang & streak ── */
  #fx-layer{position:fixed;inset:0;pointer-events:none;z-index:11;overflow:hidden}
  .fnum{position:absolute;transform:translate(-50%,-50%);font-family:var(--rounded);font-weight:800;font-size:15px;opacity:1;transition:transform .9s ease-out,opacity .9s ease-out;text-shadow:0 2px 8px rgba(0,0,0,.65);will-change:transform,opacity}
  .fnum.up{color:var(--long)} .fnum.dn{color:var(--short)}
  #unit-tip{position:fixed;z-index:12;pointer-events:none;background:rgba(10,16,12,.82);border:1px solid var(--line);border-radius:10px;padding:7px 10px;font-family:var(--rounded);font-size:11px;line-height:1.5;display:none;flex-direction:column;gap:1px;backdrop-filter:blur(6px);box-shadow:0 8px 22px rgba(0,0,0,.42)}
  #unit-tip.show{display:flex}
  #unit-tip b{font-size:11px;letter-spacing:.05em}
  #unit-tip b.buy{color:var(--long)} #unit-tip b.sell{color:var(--short)}
  #unit-tip span{color:var(--ink);opacity:.92;font-variant-numeric:tabular-nums}
  #unit-tip .tt{opacity:.5;font-size:10px}
  /* ── lencana kunci: mengikuti unit yang di-follow, klik untuk lepas ── */
  #lock-badge{position:fixed;z-index:12;transform:translate(-50%,-150%);background:rgba(10,16,12,.85);border:1px solid var(--line);border-radius:999px;padding:5px 11px;font-family:var(--rounded);font-size:11px;font-weight:800;letter-spacing:.05em;display:none;align-items:center;gap:8px;backdrop-filter:blur(6px);box-shadow:0 8px 22px rgba(0,0,0,.45);cursor:pointer;white-space:nowrap;pointer-events:auto}
  #lock-badge.show{display:inline-flex}
  #lock-badge.buy{color:var(--long);border-color:rgba(45,214,165,.5)}
  #lock-badge.sell{color:var(--short);border-color:rgba(255,101,132,.5)}
  #lock-badge .lx{opacity:.55;font-weight:700;font-size:12px;line-height:1}
  #streak{position:fixed;top:calc(14% + 118px);left:50%;transform:translateX(-50%) scale(.7);z-index:11;pointer-events:none;font-family:var(--rounded);font-weight:800;font-size:clamp(16px,2.4vw,22px);letter-spacing:.05em;opacity:0;transition:opacity .18s,transform .18s;text-shadow:0 2px 12px rgba(0,0,0,.6);white-space:nowrap}
  #streak.show{opacity:1;transform:translateX(-50%) scale(1);animation:streakPulse .5s ease-out}
  #streak.buy{color:var(--long)} #streak.sell{color:var(--short)}
  #streak.t2{font-size:clamp(19px,2.9vw,27px);text-shadow:0 2px 16px rgba(0,0,0,.65),0 0 18px currentColor}
  #streak.t3{font-size:clamp(22px,3.4vw,32px);text-shadow:0 2px 20px rgba(0,0,0,.7),0 0 26px currentColor;letter-spacing:.07em}
  @keyframes streakPulse{0%{transform:translateX(-50%) scale(1.45)}100%{transform:translateX(-50%) scale(1)}}
  /* ── kabar peristiwa: rout, serangan udara, jeda pasar ── */

<script>
(() => {

const CROWD_START = 48;    // jumlah awal prajurit per sisi
const C_LONG = 0x2dd6a5, C_SHORT = 0xff6584, C_GOLD = 0xffc857, C_GOLD2 = 0xff9f5a;

/* ═══════════ THREE SETUP — lapangan hijau cerah di bawah langit ═══════════ */
const SKY = 0x8fc6ec;
const scene = new THREE.Scene();
scene.background = new THREE.Color(SKY);
scene.fog = new THREE.Fog(SKY, 500, 2400);

const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 1, 6000);
const renderer = new THREE.WebGLRenderer({ antialias:true, powerPreference:'high-performance', preserveDrawingBuffer:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

scene.add(new THREE.HemisphereLight(0xcfe9ff, 0x38471f, .85));
const sun = new THREE.DirectionalLight(0xfff3d6, .7);
sun.position.set(-260, 420, -180);
scene.add(sun);
const fill = new THREE.DirectionalLight(0xffffff, .18);
fill.position.set(300, 200, 260);
scene.add(fill);

/* ═══════════ LAPANGAN — foto rumput asli (land.png), ubin diulang di seluruh lapangan ═══════════ */
/* peta normal dari kecerahan kanvas — memberi rumput kesan bergelombang di bawah cahaya matahari */
function normalFromCanvas(src, strength){
  const w = src.width, h = src.height, d = src.getContext('2d').getImageData(0,0,w,h).data;
  const out = document.createElement('canvas'); out.width=w; out.height=h;
  const octx = out.getContext('2d'), img = octx.createImageData(w,h);
  const lum = (x,y)=>{ x=(x+w)%w; y=(y+h)%h; const i=(y*w+x)*4; return (d[i]*.299+d[i+1]*.587+d[i+2]*.114)/255; };
  for (let y=0;y<h;y++) for (let x=0;x<w;x++){
    const nx=(lum(x-1,y)-lum(x+1,y))*strength, ny=(lum(x,y-1)-lum(x,y+1))*strength, nz=1;
    const len=Math.hypot(nx,ny,nz), i=(y*w+x)*4;
    img.data[i]=(nx/len*.5+.5)*255; img.data[i+1]=(ny/len*.5+.5)*255; img.data[i+2]=(nz/len*.5+.5)*255; img.data[i+3]=255;
  }
  octx.putImageData(img,0,0);
  return out;
}
const GROUND_REPEAT = 22;
const groundMat = new THREE.MeshStandardMaterial({ color:0x4a5c30, roughness:1, metalness:0 });
const ground = new THREE.Mesh(new THREE.PlaneGeometry(4000,4000), groundMat);
ground.rotation.x = -Math.PI/2;
scene.add(ground);
/* sembunyikan layar muat begitu lapangan siap; jaring pengaman agar tak pernah nyangkut */
function bootHide(){ const b=document.getElementById('boot'); if(b && !b.classList.contains('gone')){ b.classList.add('gone'); setTimeout(()=>{ if(b.parentNode) b.remove(); }, 650); } }
setTimeout(bootHide, 6000);
new THREE.TextureLoader().load('land.jpg', (tex)=>{
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(GROUND_REPEAT, GROUND_REPEAT);
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
  groundMat.color.set(0xffffff);   // biarkan warna asli foto, jangan ditimpa tint hijau
  groundMat.map = tex;
  groundMat.needsUpdate = true;
  bootHide();
  try {
    // dibuka lewat file:// (bukan server lokal) membuat kanvas "tainted" — baca piksel gagal,
    // tapi foto tanahnya sendiri (di atas) sudah tampil, jadi peta normal ini cukup dilewati saja
    const nCanvas = document.createElement('canvas'); nCanvas.width = nCanvas.height = 512;
    nCanvas.getContext('2d').drawImage(tex.image, 0, 0, 512, 512);
    const normalMap = new THREE.CanvasTexture(normalFromCanvas(nCanvas, 1.8));
    normalMap.wrapS = normalMap.wrapT = THREE.RepeatWrapping;
    normalMap.repeat.copy(tex.repeat);
    groundMat.normalMap = normalMap;
    groundMat.needsUpdate = true;
  } catch(e){}
}, undefined, bootHide);   // tekstur gagal → tetap lanjut (lapangan warna solid)

function patchTexture(){
  const c = document.createElement('canvas'); c.width=c.height=256;
  const g = c.getContext('2d');
  const r = g.createRadialGradient(128,128,0,128,128,128);
  r.addColorStop(0,'rgba(70,58,32,.4)');
  r.addColorStop(.6,'rgba(58,50,30,.2)');
  r.addColorStop(1,'rgba(58,50,30,0)');
  g.fillStyle=r; g.fillRect(0,0,256,256);
  return new THREE.CanvasTexture(c);
}
const field = new THREE.Mesh(
  new THREE.PlaneGeometry(560,440),
  new THREE.MeshBasicMaterial({ map:patchTexture(), transparent:true, depthWrite:false })
);
field.rotation.x = -Math.PI/2;
field.position.y = .4;
scene.add(field);

/* ═══════════ GARIS DEPAN & WILAYAH — bergerak mengikuti tekanan ═══════════ */
let buyShare = 0.5, frontX = 0;
const TERR_HALF = 300;
function terrPlane(color){
  const m = new THREE.Mesh(new THREE.PlaneGeometry(1,1),
    new THREE.MeshBasicMaterial({ color, transparent:true, opacity:.14, depthWrite:false }));
  m.rotation.x = -Math.PI/2; m.position.y = .45; scene.add(m); return m;
}
const buyTerr = terrPlane(C_LONG), sellTerr = terrPlane(C_SHORT);
const clashLine = new THREE.Mesh(
  new THREE.BoxGeometry(4, 3, 480),
  new THREE.MeshBasicMaterial({ color:0xffffff, transparent:true, opacity:.4, blending:THREE.AdditiveBlending, depthWrite:false })
);
clashLine.position.y = 1.4; scene.add(clashLine);

/* ═══════════ LANGIT & CUACA DINAMIS — ikut mood pasar ═══════════ */
let mood = 0, moodTarget = 0, lull = 0, lullActive = false;
/* ── SISTEM CUACA VOLATILITAS — cuaca dikendalikan pergerakan HARGA, bukan sekadar arus order:
   pasar tenang → cerah; pump kencang → aurora hijau + tracer lebih menyala;
   dump tajam / likuidasi massal → badai petir gelap, hujan deras & kabut tebal ── */
let vol = 0;                     // arah volatilitas harga yang dihaluskan, -1 (dump)..1 (pump)
let liqStorm = 0;                // dorongan badai ekstra dari likuidasi massal, meluruh sendiri
let pumpW = 0, stormW = 0;       // bobot cuaca aktif frame ini (dipakai juga oleh tracer)
let volForce = 0, volForceUntil = 0;   // paksaan uji manual lewat __testEvent('pump'/'dump')
let stormActive = false, auroraActive = false;
const priceHist = [];            // sampel harga ±50 dtk terakhir untuk mengukur volatilitas
const FOG_NEAR = 500, FOG_FAR = 2400;   // jarak kabut normal — dirapatkan saat badai
const SKY_STORM = new THREE.Color(0x2b3542), SKY_CALM = new THREE.Color(SKY), SKY_PUMP = new THREE.Color(0xffd9a3);
const SKY_NIGHT = new THREE.Color(0x0b1230);
const _sky = new THREE.Color();
const DAY_PERIOD = 240;   // detik untuk satu siklus siang→malam penuh — malam bikin tracer & ledakan menonjol
function weatherPoints(n, color, size, additive){
  const g = new THREE.BufferGeometry();
  const p = new Float32Array(n*3), v = new Float32Array(n);
  for (let i=0;i<n;i++){
    p[i*3]=(Math.random()-.5)*900; p[i*3+1]=Math.random()*320; p[i*3+2]=(Math.random()-.5)*700;
    v[i]=.5+Math.random();
  }
  g.setAttribute('position', new THREE.BufferAttribute(p,3));
  const mat = new THREE.PointsMaterial({ color, size, transparent:true, opacity:0, depthWrite:false });
  if (additive) mat.blending = THREE.AdditiveBlending;
  const m = new THREE.Points(g, mat); scene.add(m);
  return { m, v, n, attr:g.attributes.position };
}
const rain = weatherPoints(520, 0xcfe0ff, 2.2, false);
const embers = weatherPoints(280, 0xffc46b, 3.4, true);

/* ── AURORA — tirai cahaya hijau di langit saat harga pump kencang ── */
function auroraTexture(){
  const c = document.createElement('canvas'); c.width = 512; c.height = 128;
  const g = c.getContext('2d');
  for (let i=0;i<64;i++){   // pita-pita vertikal acak → kesan tirai aurora bergelombang
    const x = Math.random()*512, w = 6 + Math.random()*26, a = .05 + Math.random()*.16;
    const grd = g.createLinearGradient(0,0,0,128);
    grd.addColorStop(0,  'rgba(110,255,185,0)');
    grd.addColorStop(.3, `rgba(110,255,185,${a})`);
    grd.addColorStop(.72,`rgba(70,215,255,${a*.6})`);
    grd.addColorStop(1,  'rgba(70,215,255,0)');
    g.fillStyle = grd; g.fillRect(x,0,w,128);
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = THREE.RepeatWrapping;
  return tex;
}
const auroras = [];
for (const d of [ { w:2800, h:430, y:330, z:1350, sp:.012, op:1 },
                  { w:3400, h:540, y:410, z:1620, sp:-.007, op:.65 } ]){
  for (const zs of [-1,1]){   // sepasang di depan & belakang medan agar terlihat dari segala arah kamera
    const mat = new THREE.MeshBasicMaterial({ map:auroraTexture(), transparent:true, opacity:0,

/* gabung beberapa BufferGeometry (posisi+normal) jadi satu — tanpa lib eksternal */
function mergeGeoms(geoms){
  const nn = geoms.map(g => g.index ? g.toNonIndexed() : g);
  let count = 0;
  for (const g of nn) count += g.attributes.position.count;
  const pos = new Float32Array(count*3), nor = new Float32Array(count*3);
  let o = 0;
  for (const g of nn){
    pos.set(g.attributes.position.array, o);
    nor.set(g.attributes.normal.array, o);
    o += g.attributes.position.count*3;
  }
  const out = new THREE.BufferGeometry();
  out.setAttribute('position', new THREE.BufferAttribute(pos,3));
  out.setAttribute('normal', new THREE.BufferAttribute(nor,3));
  return out;
}
function boxPart(w,h,d, x,y,z){ const g = new THREE.BoxGeometry(w,h,d); g.translate(x,y,z); return g; }

function makeCrowd(color, sign){ // sign: -1 = beli (kiri), 1 = jual (kanan)
  const mat = new THREE.MeshLambertMaterial({ color, emissive:color, emissiveIntensity:.42, fog:false });
  const mesh = new THREE.InstancedMesh(soldierGeo, mat, CROWD_MAX);

  // prajurit jadi kecil & ke-antialias sampai warnanya (terutama merah) tenggelam di rumput hijau
  const glowPos = new Float32Array(CROWD_MAX*3);
  const glowGeo = new THREE.BufferGeometry();
  glowGeo.setAttribute('position', new THREE.BufferAttribute(glowPos,3).setUsage(THREE.DynamicDrawUsage));
  const glowMat = new THREE.PointsMaterial({ color, map:GLOW, size:9, sizeAttenuation:true, transparent:true, opacity:.9, blending:THREE.AdditiveBlending, depthWrite:false, fog:false });
  const glow = new THREE.Points(glowGeo, glowMat);
  scene.add(glow);

  const q = new THREE.Quaternion();
  if (sign>0) q.setFromAxisAngle(new THREE.Vector3(0,1,0), Math.PI); // sisi kanan menghadap kiri
  const slots = [];
  for (let i=0;i<CROWD_MAX;i++){
    const x = sign*(40 + Math.random()*120);
    const z = (Math.random()-.5)*230;
    slots.push({
      base: new THREE.Vector3(x,0,z),
      spawnFrom: new THREE.Vector3(x+sign*170, 0, z+(Math.random()-.5)*50),
      active: i<CROWD_START,
      dying:false, dieT:0,
      walking:i<CROWD_START, walkT:0,
      phase: Math.random()*Math.PI*2,
      recoil: 0,   // 1 tepat setelah menembak → tersentak ke belakang, meluruh cepat
    });
  }
  return { mesh, glow, glowPos, slots, count:CROWD_START, target:CROWD_START, q, sign, routUntil:0, flee:0 };
}

function killSoldier(crowd, n){
  for (let k=0;k<n;k++){
    let idx=-1;
    for (let i=0;i<crowd.slots.length;i++){ if (crowd.slots[i].active && !crowd.slots[i].dying){ idx=i; if (Math.random()<.4) break; } }
    if (idx<0) break;
    const s = crowd.slots[idx];
    s.dying = true; s.dieT = 0;
    crowd.count = Math.max(0, crowd.count-1);
    spawnSkull(s.base);
  }
}
/* bala bantuan masuk (order baru di sisi ini) */
function reviveSoldier(crowd){
  if (crowd.count >= CROWD_MAX) return;
  let idx=-1;
  for (let i=0;i<crowd.slots.length;i++){ const c=crowd.slots[i]; if (!c.active && !c.dying){ idx=i; if (Math.random()<.4) break; } }
  if (idx<0) return;
  const s = crowd.slots[idx];
  s.active = true; s.walking = true; s.walkT = 0;
  crowd.count++;
}
function resetCrowd(crowd){
  crowd.count = CROWD_START;
  crowd.slots.forEach((s,i)=>{
    s.active = i<CROWD_START;
    s.dying = false; s.dieT = 0;
    s.walking = i<CROWD_START; s.walkT = 0;
  });
}
function updateCrowd(crowd, dt, t){
  const bias = crowd.pressBias || 0;
  for (let i=0;i<crowd.slots.length;i++){
    const s = crowd.slots[i];
    let x = s.base.x + bias, z = s.base.z, sc = 0, bob = 0, topple = 0;

    if (s.dying){
      s.dieT = Math.min(1, s.dieT + dt*2.6);
      topple = Math.min(1, s.dieT*1.5) * 1.5 * crowd.sign;   // tumbang ke belakang
      sc = s.dieT < .55 ? 1 : Math.max(0, 1-(s.dieT-.55)/.45);
      bob = -s.dieT*1.2;
      if (s.dieT>=1){ s.dying=false; s.active=false; }
    } else if (s.walking){
      s.walkT = Math.min(1, s.walkT + dt*.75);
      const e = 1-(1-s.walkT)*(1-s.walkT);
      x = s.spawnFrom.x + (s.base.x+bias-s.spawnFrom.x)*e;
      z = s.spawnFrom.z + (s.base.z-s.spawnFrom.z)*e;
      bob = Math.abs(Math.sin(t*9+s.phase))*.9;
      sc = 1;
      if (s.walkT>=1) s.walking=false;
    } else if (s.active){
      bob = Math.abs(Math.sin(t*2.4+s.phase))*.45;   // ayun ringan berdiri
      sc = 1;
    }

    // RECOIL — prajurit tersentak ke belakang sesaat setelah melepas tembakan
    if (s.recoil > 0 && !s.dying){
      x += crowd.sign * s.recoil * 1.1;
      topple += s.recoil * .1 * crowd.sign;   // condong ke belakang sedikit
      s.recoil = Math.max(0, s.recoil - dt*5);
    }

    // ROUT — sisi yang kalah telak pecah formasi & lari panik ke belakang wilayah sendiri
    let facing = 0;
    const flee = crowd.flee;
    if (flee > .02 && !s.dying && (s.active || s.walking)){
      x += crowd.sign * flee * (58 + (s.phase*13 % 46));   // makin jauh dari musuh
      bob = Math.abs(Math.sin(t*11 + s.phase)) * (.9 + flee);   // langkah panik cepat
      if (flee > .5) facing = Math.PI;                    // balik badan membelakangi musuh
    }

    // jangan biarkan prajurit melewati garis depan ke wilayah lawan
    if (crowd.sign < 0) x = Math.min(x, frontX - 16);
    else                x = Math.max(x, frontX + 16);

    if (sc <= .002 && !s.active && !s.dying) sscl.set(.0001,.0001,.0001);
    else sscl.set(sc, sc, sc);
    sq.copy(crowd.q);
    if (facing){ faceQ.setFromAxisAngle(AXIS_Y, facing); sq.multiply(faceQ); }
    if (topple){ toppleQ.setFromAxisAngle(AXIS_Z, topple); sq.premultiply(toppleQ); }
    spos.set(x, bob, z);
    smx.compose(spos, sq, sscl);
    crowd.mesh.setMatrixAt(i, smx);

    const gi = i*3;
    if (sc <= .002 && !s.active && !s.dying){
      crowd.glowPos[gi+1] = -500; // sembunyikan di bawah tanah saat tidak aktif
    } else {
      crowd.glowPos[gi] = x; crowd.glowPos[gi+1] = bob + 5.5; crowd.glowPos[gi+2] = z;
    }
  }
  crowd.mesh.instanceMatrix.needsUpdate = true;
  crowd.glow.geometry.attributes.position.needsUpdate = true;
}

const bomberNoseGeo = new THREE.ConeGeometry(.85, 2, 12);
const bomberWingGeo = new THREE.BoxGeometry(2.4, .2, 8.4);
const bomberTailWingGeo = new THREE.BoxGeometry(1.4, .16, 3.2);
const bomberFinGeo = new THREE.BoxGeometry(1.3, 1.6, .16);
const bomberEngineGeo = new THREE.CylinderGeometry(.5, .5, 1.8, 10);
function makeBomber(side){
  const mat = tankMat[side];
  const g = new THREE.Group();
  const body = new THREE.Mesh(bomberBodyGeo, mat); body.rotation.z=-Math.PI/2; g.add(body);
  const nose = new THREE.Mesh(bomberNoseGeo, mat); nose.rotation.z=-Math.PI/2; nose.position.set(4.2,0,0); g.add(nose);
  const wing = new THREE.Mesh(bomberWingGeo, mat); wing.position.set(-.4,0,0); g.add(wing);
  const tail = new THREE.Mesh(bomberTailWingGeo, mat); tail.position.set(-3.2,0,0); g.add(tail);
  const fin = new THREE.Mesh(bomberFinGeo, mat); fin.position.set(-3.3,.9,0); g.add(fin);
  for (const s of [-1,1]){
    const eng = new THREE.Mesh(bomberEngineGeo, darkMat); eng.rotation.z=Math.PI/2; eng.position.set(-.2,-.5,s*2.6); g.add(eng);
  }
  const aura = new THREE.Sprite(tankAuraMat[side]); aura.scale.set(26,26,1); g.add(aura);
  return g;
}

/* tangga tingkatan unit besar — tiap tingkat kini bisa punya beberapa varian karakter,
   dipilih acak tiap kemunculan supaya tidak monoton (mis. tank vs APC di tingkat yang sama) */
const T_TITAN = 3000000;   // ≥ $3jt → puncak tingkatan: bomber
const BIG_UNIT_TIERS = [
  { max:300000,    fly:0,  makers:[{key:'tank',maker:makeTank}, {key:'apc',maker:makeAPC}] },
  { max:1000000,   fly:26, makers:[{key:'helicopter',maker:makeHelicopter}] },   // lebih melayang tinggi di udara
  { max:T_TITAN,   fly:38, makers:[{key:'jet',maker:makeJet}] },
  { max:Infinity,  fly:46, makers:[{key:'bomber',maker:makeBomber}] },
];
/* skala dasar per jenis unit — dihitung per model (bukan angka seragam) supaya tiap unit
   terlihat proporsional jauh melebihi tinggi prajurit (≈8.5 unit), bukan sekadar sedikit lebih besar.
   Kendaraan darat (tank/APC) diukur dari tinggi bodinya; pesawat (heli/jet/bomber) dari panjang
   badannya, karena bentuknya pipih — kalau dipatok dari tinggi, hasilnya jadi raksasa tak masuk akal. */
const UNIT_BASE_SCALE = { tank:7.6, apc:9.5, helicopter:6.0, jet:7.1, bomber:6.2 };
function pickBigUnit(usd){
  const tier = BIG_UNIT_TIERS.find(t => usd < t.max);
  const pick = tier.makers[Math.floor(Math.random()*tier.makers.length)];
  return { maker:pick.maker, key:pick.key, fly: tier.fly };
}

/* ═══════════ UNIT (tembakan / unit besar) ═══════════ */
const units = [];
const lastImpact = new THREE.Vector3(0,0,0);

function spawnBigUnit(side, usd){
  if (units.length >= MAX_UNITS) return;
  const color = side==='buy' ? C_LONG : C_SHORT;
  const mag = Math.min(1, Math.log10(usd/T_WHALE+1)/2);
  const pick = pickBigUnit(usd);
  const sx = (side==='buy'?-1:1)*185;
  const start = new THREE.Vector3(sx, pick.fly, (Math.random()-.5)*180);
  const ownSign = side==='buy' ? -1 : 1;   // sisi wilayah sendiri, sama seperti formasi prajurit (base.x)
  const ex = pick.fly>0
    ? -ownSign*28                          // unit udara: tetap melintas ke garis depan/wilayah lawan seperti semula
    : ownSign*(130+Math.random()*25);      // unit darat (tank/APC): berhenti di barisan belakang pasukan sendiri, menyerang dari sana
  const end = new THREE.Vector3(ex, pick.fly, (Math.random()-.5)*180);
  const obj = pick.maker(side);
  const rotor = obj.userData && obj.userData.rotor;
  const wheels = obj.userData && obj.userData.wheels;
  const sc = UNIT_BASE_SCALE[pick.key] * (0.9 + mag*0.3);   // identitas ukuran per jenis, mag cuma variasi ±
  obj.scale.set(sc, sc, sc);
  obj.rotation.y = side==='buy' ? 0 : Math.PI;   // moncong menghadap musuh
  obj.userData = { pick:true, side, usd, price, ts:Date.now(), rotor };
  scene.add(obj);
  bigUnitObjs.push(obj);
  playChargeHorn();
  // fase: 'approach' (masuk) → 'hold' (menetap & menghujani lawan) → 'death' (tertembak lalu meledak)
  units.push({ obj, start, end, apex:0, t:0, dur:2.0, side, usd, mag, color, tier:2,
               fly:pick.fly, rotor, wheels, heli:pick.key==='helicopter', dustT:.25,
               defender: side==='buy'?sellCrowd:buyCrowd,
               phase:'approach', clock:0, fireT:.2,
               approachDur:1.2, holdDur:3.4+Math.random()*1.6, deathDur:.6, deathSpin:0 });
}

/* sang paus akhirnya tertembak jatuh oleh lawan → balasan peluru dari sisi musuh, lalu sekarat */
function enterDeath(u){
  u.phase = 'death'; u.clock = 0;
  u.deathSpin = Math.random()<.5 ? -1 : 1;
  const target = u.obj.position.clone();
  const foe = u.side==='buy' ? 'sell' : 'buy';                 // peluru datang DARI lawan
  for (let j=0;j<7;j++){
    const from = crowdPoint(u.defender, 20, true);
    const to = target.clone().add(new THREE.Vector3((Math.random()-.5)*7,(Math.random()-.5)*7,(Math.random()-.5)*7));
    fireBullet(foe, from, to, false, u.defender, true);       // tracer besar menghajar sang paus
  }
  playVolley(2);
}

/* ═══════════ SERANGAN UDARA — peristiwa langka untuk order raksasa (≥ T_BOSS) ═══════════
   pembom raksasa melintas tinggi menembus barisan lawan sambil menjatuhkan bom beruntun;
   dipadukan gerak lambat sinematik, kilat layar & guncangan besar. */
const airstrikes = [];
let lastAirstrike = -1e9;
function spawnAirstrike(side, usd){
  const now = performance.now();
  if (now - lastAirstrike < 9000 || airstrikes.length) return;   // sangat langka — jangan spam
  lastAirstrike = now;
  const defender = side==='buy' ? sellCrowd : buyCrowd;
  const ownSign = side==='buy' ? -1 : 1;
  const z0 = (Math.random()-.5)*130;
  const from = new THREE.Vector3(ownSign*280, 150, z0);
  const to   = new THREE.Vector3(-ownSign*280, 150, z0);
  const obj = makeBomber(side);
  const sc = UNIT_BASE_SCALE.bomber * 1.9;   // jauh lebih besar dari pembom biasa
  obj.scale.set(sc, sc, sc);
  obj.rotation.y = side==='buy' ? 0 : Math.PI;
  obj.position.copy(from);
  scene.add(obj); bigUnitObjs.push(obj);
  const drops = [];
  for (let k=0;k<7;k++) drops.push(.34 + k*.075);   // fraksi lintasan tempat bom jatuh
  airstrikes.push({ obj, from, to, t:0, dur:3.2, side, defender, drops, dropped:0, z0 });
  // sentuhan sinematik
  addSlowmo(1.2); addFlash(.5, '#fff2c8'); addShake(3.4);
  playChargeHorn();
  showEvent(side==='buy' ? I18N[lang].airstrikeBuy : I18N[lang].airstrikeSell, side, true);
}

/* ═══════════ TEMBAKAN ARTILERI — varian lain peristiwa langka untuk order raksasa (≥ T_BOSS):
   rentetan mortir jatuh dari langit ke wilayah lawan tanpa unit pembom, supaya order boss
   tak selalu terlihat sama seperti serangan udara. ═══════════ */
const barrages = [];
let lastBarrage = -1e9;
function spawnBarrage(side, usd){
  const now = performance.now();
  if (now - lastBarrage < 9000 || barrages.length) return;   // sangat langka — jangan spam
  lastBarrage = now;
  const defender = side==='buy' ? sellCrowd : buyCrowd;
  const shells = [];
  let tCursor = .5;
  for (let k=0;k<6;k++){ tCursor += .32 + Math.random()*.18; shells.push({ at:tCursor, pos:groundPoint(defender) }); }
  const b = { t:0, dur: shells[shells.length-1].at + .7, shells, done:0, side, defender, curPos:shells[0].pos.clone() };
  barrages.push(b);
  addSlowmo(1.0); addFlash(.42, '#ffe8c8'); addShake(2.8);
  playChargeHorn();
  showEvent(side==='buy' ? I18N[lang].barrageBuy : I18N[lang].barrageSell, side, true);
}

/* ═══════════ TEMBAK-TEMBAKAN — peluru pelacak, kilatan moncong & percikan ═══════════ */
const bullets = [], sparks = [], bigUnitObjs = [];
let lastFireT = 0;   // waktu tembakan terakhir (ms) — agar tak pernah ada jeda kosong
const bulletGeo = new THREE.BoxGeometry(1,1,1);
const bulletMat = {
  buy:  new THREE.MeshBasicMaterial({ color:0xd8fff1 }),
  sell: new THREE.MeshBasicMaterial({ color:0xffdbe4 }),
};
const AXIS_X = new THREE.Vector3(1,0,0);
const _bq = new THREE.Quaternion(), _bdir = new THREE.Vector3();
const MAXBULLETS = 360, MAXSPARKS = 200;

function makeSpark(pos, color, size, dur){
  if (sparks.length >= MAXSPARKS) return;
  const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map:GLOW, color, transparent:true, blending:THREE.AdditiveBlending, depthWrite:false }));
  spr.position.copy(pos); spr.scale.set(size,size,1);
  scene.add(spr);
  sparks.push({ spr, t:0, dur, size });
}
/* debu baling-baling — helikopter meniupkan pusaran debu di tanah bawahnya */
const dusts = [], DUST_MAX = 46;
const dustBaseMat = new THREE.SpriteMaterial({ map:GLOW, color:0xb5a078, transparent:true, opacity:0, depthWrite:false });
function spawnDust(x, z, spread, size){
  if (dusts.length >= DUST_MAX){ const o = dusts.shift(); scene.remove(o.spr); o.spr.material.dispose(); }
  const a = Math.random()*Math.PI*2, r0 = spread*(.25+Math.random()*.35);
  const spr = new THREE.Sprite(dustBaseMat.clone());
  spr.position.set(x+Math.cos(a)*r0, 1.6, z+Math.sin(a)*r0);
  spr.scale.set(size*.5, size*.5, 1);
  scene.add(spr);
  dusts.push({ spr, t:0, dur:.8+Math.random()*.5, size,
               vx:Math.cos(a)*(20+Math.random()*18), vz:Math.sin(a)*(20+Math.random()*18) });
}
function fireBullet(side, from, to, kills, defender, big){
  if (bullets.length >= MAXBULLETS){ const old = bullets.shift(); scene.remove(old.m); } // buang tertua, jangan berhenti menembak
  const m = new THREE.Mesh(bulletGeo, bulletMat[side]);
  m.position.copy(from);
  scene.add(m);
  lastFireT = performance.now();
  const vel = to.clone().sub(from); const dist = vel.length(); vel.normalize();
  const col = side==='buy'?C_LONG:C_SHORT;
  const glowK = 1 + pumpW*.9;   // pump kencang → peluru pelacak lebih tebal & bercahaya
  bullets.push({ m, pos:from.clone(), vel, speed:(big?520:640)+Math.random()*180, kills, defender, side,
                 target:to.clone(), traveled:0, dist, color: col,
                 len: (big?46:16)*glowK, w: (big?2.1:.55)*glowK, big:!!big });
  if (big) makeSpark(from, col, 22*glowK, .18);                   // ledakan moncong unit besar
  else if (Math.random() < .5 + pumpW*.3) makeSpark(from, col, 9*glowK, .1);
}
/* titik di posisi pasukan saat ini — ikut garis depan yang bergerak;
   shooter=true → prajurit terpilih dianggap MENEMBAK dari sini & memainkan animasi recoil */
function crowdPoint(crowd, jitter, shooter){
  const bias = crowd.pressBias || 0;
  const N = crowd.slots.length, start = Math.floor(Math.random()*N);
  let s = null;
  for (let k=0;k<N;k++){ const c = crowd.slots[(start+k)%N]; if (c.active && !c.dying){ s = c; break; } }
  let x, z;
  if (s){ x = s.base.x + bias; z = s.base.z; if (shooter) s.recoil = 1; }
  else { x = crowd.sign*(40+Math.random()*80) + bias; z = (Math.random()-.5)*230; }
  // tetap di sisi pasukannya sendiri terhadap garis depan (sama seperti clamp prajurit)
  if (crowd.sign < 0) x = Math.min(x, frontX - 16); else x = Math.max(x, frontX + 16);
  return new THREE.Vector3(x + (Math.random()-.5)*jitter, 5+Math.random()*3, z + (Math.random()-.5)*jitter);
}
/* titik tanah kosong di sisi lawan — target peluru yang TIDAK membunuh (meleset ke tanah) */
function groundPoint(defender){
  const bias = defender.pressBias || 0;
  let x = defender.sign*(50+Math.random()*150) + bias;
  if (defender.sign < 0) x = Math.min(x, frontX - 22); else x = Math.max(x, frontX + 22);
  return new THREE.Vector3(x, 1.4, (Math.random()-.5)*260);
}
function fireVolley(side, tier, killed){
  const attacker = side==='buy' ? buyCrowd : sellCrowd;
  const defender = side==='buy' ? sellCrowd : buyCrowd;
  const n = killed + (tier===2 ? 3 : 1);   // sebagian besar peluru mengenai prajurit; hanya sedikit yang meleset
  for (let i=0;i<n;i++){
    const kills = i < killed;
    const from = crowdPoint(attacker, 8, true);                        // dari prajurit penyerang (recoil)
    const to   = kills ? crowdPoint(defender, 10) : groundPoint(defender); // yang membunuh → prajurit, meleset → tanah
    fireBullet(side, from, to, kills, defender);
  }
  playVolley(tier);
}
/* tembakan latar saat pasar sepi — mengisi jeda supaya baku tembak tak pernah kosong.
   hanya visual (tidak membunuh) agar jumlah pasukan tetap mewakili persentase buy/sell. */
function ambientFire(){
  for (const side of ['buy','sell']){
    const attacker = side==='buy' ? buyCrowd : sellCrowd;
    const defender = side==='buy' ? sellCrowd : buyCrowd;
    if (attacker.count <= 0) continue;
    const n = 1 + (Math.random()<.4 ? 1 : 0);   // sedikit saja — cukup agar tak sepi, tidak boros peluru
    for (let i=0;i<n;i++) fireBullet(side, crowdPoint(attacker,8,true), groundPoint(defender), false, defender);  // ke tanah, tidak kena prajurit
  }
  playVolley(0);
}

/* ═══════════ JUICE — getar layar, jeda hantam, angka melayang, streak ═══════════ */
let shake = 0, hitstop = 0, lastHitstopT = -10;
function addShake(a){ shake = Math.min(5, shake + a); }
function addHitstop(s){
  // jeda-hantam hanya sesekali; jangan menumpuk/berantai sampai simulasi macet
  const now = performance.now()/1000;
  if (hitstop > 0 || now - lastHitstopT < 0.6) return;
  lastHitstopT = now; hitstop = s;
}

const fxLayer = document.getElementById('fx-layer');
const _pv = new THREE.Vector3();
function floatNum(worldPos, text, cls){
  _pv.copy(worldPos); _pv.y += 8; _pv.project(camera);
  if (_pv.z > 1) return;
  const el = document.createElement('div');
  el.className = 'fnum ' + (cls||'');
  el.textContent = text;
  el.style.left = ((_pv.x*.5+.5)*innerWidth) + 'px';
  el.style.top  = ((-_pv.y*.5+.5)*innerHeight) + 'px';
  fxLayer.appendChild(el);
  requestAnimationFrame(()=>{ el.style.transform = 'translate(-50%,-140%)'; el.style.opacity = '0'; });
  setTimeout(()=>el.remove(), 950);
}

const streakEl = document.getElementById('streak');
let streakSide = null, streakCount = 0, streakHide = null;
function bumpStreak(side){
  if (side === streakSide) streakCount++;
  else { streakSide = side; streakCount = 1; }
  if (streakCount >= 5 && streakCount % 5 === 0){
    const L = I18N[lang];
    const who = side==='buy' ? L.buyer : L.seller;
    // eskalasi visual: makin panjang beruntun, makin besar & menyala tampilannya (bukan cuma teks berulang)
    const tier = streakCount>=20 ? 3 : streakCount>=10 ? 2 : 1;
    const suffix = tier===3 ? L.streakSuffixT3 : tier===2 ? L.streakSuffixT2 : L.streakSuffix;
    streakEl.textContent = `${who} ${streakCount}${suffix}`;
    streakEl.className = `show t${tier} ` + side;
    addShake(.8 + Math.min(2, streakCount*.05));
    clearTimeout(streakHide);
    streakHide = setTimeout(()=>{ streakEl.className = ''; }, 2200);
    // dominasi ekstrem → sisi yang kalah pecah formasi & lari
    if (streakCount === 20 || (streakCount > 20 && streakCount % 15 === 0)){
      triggerRout(side==='buy' ? 'sell' : 'buy', Math.min(1, (streakCount-20)/40));
    }
  }
}

/* ═══════════ KABAR PERISTIWA — banner naratif singkat (rout, serangan udara, jeda) ═══════════ */
const eventTickerEl = document.getElementById('event-ticker'), etTxtEl = document.getElementById('et-txt');
let eventTickerHide = null, lastEventAt = -1e9;
function showEvent(text, tone, force){   // tone: 'buy' | 'sell' | 'neutral'
  const now = performance.now();
  if (!force && now - lastEventAt < 1500) return;   // jangan bertumpuk (kecuali peristiwa penting)
  lastEventAt = now;
  etTxtEl.textContent = text;
  eventTickerEl.className = 'show ' + (tone || 'neutral');
  clearTimeout(eventTickerHide);
  eventTickerHide = setTimeout(()=>{ eventTickerEl.className = ''; }, 2600);
}

/* ═══════════ KILAT LAYAR & GERAK LAMBAT — untuk peristiwa besar/petir ═══════════ */
const flashEl = document.getElementById('flash');
let flashV = 0, flashColor = '#ffffff', slowmo = 0;
function addFlash(v, color){ flashV = Math.max(flashV, v); if (color) flashColor = color; }
function addSlowmo(s){ slowmo = Math.max(slowmo, s); }

/* ═══════════ ROUT — pasukan yang kalah telak lari kocar-kacir ═══════════ */
function triggerRout(loserSide, intensity){
  const loser = loserSide==='buy' ? buyCrowd : sellCrowd;
  loser.routUntil = performance.now() + 2400 + intensity*1500;
  const L = I18N[lang];
  showEvent(loserSide==='buy' ? L.routBuyers : L.routSellers, loserSide==='buy' ? 'sell' : 'buy');
}

/* ═══════════ KAWAH & PUING — sisa ledakan yang bertahan lalu meredup ═══════════ */
function craterTexture(){
  const c = document.createElement('canvas'); c.width = c.height = 128;
  const g = c.getContext('2d');
  const r = g.createRadialGradient(64,64,0,64,64,64);
  r.addColorStop(0,  'rgba(8,6,4,.95)');
  r.addColorStop(.45,'rgba(12,10,6,.8)');
  r.addColorStop(.75,'rgba(20,16,10,.35)');
  r.addColorStop(1,  'rgba(20,16,10,0)');
  g.fillStyle = r; g.fillRect(0,0,128,128);
  for (let i=0;i<26;i++){   // bercak gosong tak beraturan di tepi supaya tidak bulat sempurna
    const a = Math.random()*Math.PI*2, d = 32 + Math.random()*24;
    g.fillStyle = `rgba(10,8,5,${.12+Math.random()*.2})`;
    g.beginPath(); g.arc(64+Math.cos(a)*d, 64+Math.sin(a)*d, 3+Math.random()*7, 0, 7); g.fill();
  }
  return new THREE.CanvasTexture(c);
}
const craters = [], CRATER_MAX = 12;
const CRATER_TEX = craterTexture();
const craterGeo = new THREE.PlaneGeometry(1,1);
let craterCycle = 0;
function spawnCrater(pos, r){
  if (craters.length >= CRATER_MAX){ const o = craters.shift(); scene.remove(o.m); o.m.material.dispose(); }
  const m = new THREE.Mesh(craterGeo, new THREE.MeshBasicMaterial({ map:CRATER_TEX, transparent:true, opacity:.9, depthWrite:false }));
  m.rotation.x = -Math.PI/2;
  m.rotation.z = Math.random()*Math.PI*2;
  // ketinggian sedikit diselang-seling supaya kawah yang bertumpuk tak saling z-fighting
  m.position.set(pos.x, .5 + (craterCycle++ % 8)*.013, pos.z);
  m.scale.set(r*2, r*2, 1);
  m.renderOrder = 1;   // selalu di atas plane wilayah buy/sell yang juga transparan
  scene.add(m);
  craters.push({ m, t:0, hold:6+Math.random()*3, fade:3.5 });
}
const debris = [], DEBRIS_MAX = 70;
const debrisGeo = new THREE.BoxGeometry(1,1,1);
const debrisMat = new THREE.MeshLambertMaterial({ color:0x3b4048 });   // besi gelap hangus
function spawnDebris(pos, n, power){
  for (let k=0;k<n;k++){
    if (debris.length >= DEBRIS_MAX){ const o = debris.shift(); scene.remove(o.m); }
    const m = new THREE.Mesh(debrisGeo, debrisMat);
    const s = .9 + Math.random()*1.8*Math.min(2, power);
    m.scale.setScalar(s);
    m.position.set(pos.x+(Math.random()-.5)*3, Math.max(2, pos.y)+2, pos.z+(Math.random()-.5)*3);
    m.rotation.set(Math.random()*3, Math.random()*3, Math.random()*3);
    scene.add(m);
    const a = Math.random()*Math.PI*2, sp = (16+Math.random()*40)*(.8+power*.3);
    // state 0 = terpental (fisika), 1 = tergeletak beberapa detik, 2 = mengecil & hilang
    debris.push({ m, s, state:0, t:0, bounce:0,
                  vx:Math.cos(a)*sp, vz:Math.sin(a)*sp, vy:45+Math.random()*70,
                  rx:(Math.random()-.5)*9, rz:(Math.random()-.5)*9 });
  }
}

/* ═══════════ LEDAKAN ═══════════ */
const booms = [], rings = [];
function explode(pos, color, mag, tier){
  const n = 22 + Math.floor(mag*(tier===2?90:36));
  const geo = new THREE.BufferGeometry();
  const px = new Float32Array(n*3), vel = [];
  for (let i=0;i<n;i++){
    px[i*3]=pos.x; px[i*3+1]=pos.y+2; px[i*3+2]=pos.z;
    const a = Math.random()*Math.PI*2, e = Math.random()*Math.PI*.5;
    const sp = 20 + Math.random()*(40 + mag*(tier===2?110:55));
    vel.push(new THREE.Vector3(Math.cos(a)*Math.cos(e)*sp, Math.sin(e)*sp*1.4, Math.sin(a)*Math.cos(e)*sp));
  }
  geo.setAttribute('position', new THREE.BufferAttribute(px,3));
  const pts = new THREE.Points(geo, new THREE.PointsMaterial({ color, size:2.5+mag*(tier===2?6:3), map:GLOW, transparent:true, blending:THREE.AdditiveBlending, depthWrite:false }));
  scene.add(pts);
  booms.push({ pts, vel, t:0, dur:.6 + mag*(tier===2?.8:.5) });

  const rm = new THREE.Mesh(ringGeo, new THREE.MeshBasicMaterial({ color, transparent:true, opacity:.8, side:THREE.DoubleSide, blending:THREE.AdditiveBlending, depthWrite:false }));
  rm.rotation.x = -Math.PI/2;
  rm.position.copy(pos); rm.position.y = 1.2;
  scene.add(rm);
  rings.push({ rm, t:0, dur: tier===2?.85:.5, max:(tier===2?32:10) + mag*20 });

  if (mag>.45 || tier===2){
    const l = new THREE.PointLight(color, 3+mag*(tier===2?10:5), 400+mag*700, 2);
    l.position.copy(pos); l.position.y = 30;
    scene.add(l);
    setTimeout(()=>scene.remove(l), tier===2?400:220);
  }
  // sisa ledakan di tanah: kawah hitam gosong + serpihan puing besi yang terpental
  spawnCrater(pos, (tier===2 ? 15 : 8) + mag*12);
  spawnDebris(pos, tier===2 ? 7 + Math.round(mag*5) : 4, .8 + mag);
  lastImpact.copy(pos);
  playBoom(mag, tier);
}

const killsEl = document.getElementById('kills');
/* jumlah koin: desimal menyesuaikan besaran agar order kecil (< 0,001) tetap terbaca,
   bukan membulat jadi 0,000. Nol di ekor dipangkas supaya tetap ringkas. */
function fmtQty(q){
  const a = Math.abs(q);
  const dec = a>=1 ? 3 : a>=0.001 ? 5 : 8;   // makin kecil → makin banyak desimal
  const s = q.toFixed(dec);
  return s.indexOf('.') < 0 ? s : s.replace(/0+$/,'').replace(/\.$/,'');
}
function fmtPrice(p){ return '$'+p.toLocaleString('en-US',{ maximumFractionDigits: p<10?4:2 }); }

let flow = [];   // {t, usd, buy}

function fmtUsd(n){
  if (n>=1e6) return '$'+(n/1e6).toFixed(1)+'M';
  if (n>=1e3) return '$'+Math.round(n/1e3)+'K';
  return '$'+Math.round(n);
}
function meterUpdate(){
  const now = performance.now();
  flow = flow.filter(f=>now-f.t < 60000);
  let bu=0, su=0, bc=0, sc=0;
  for (const f of flow){ if (f.buy){ bu+=f.usd; bc++; } else { su+=f.usd; sc++; } }

    sellCrowd.target = Math.max(8, Math.min(CROWD_MAX, Math.round((1-buyShare)*2*CROWD_START)));
  }
  document.getElementById('pp-long').style.width = lp+'%';

/* ═══════════ AUDIO — musik latar (dua lapis, berpindah sesuai keramaian pasar) & efek suara (generatif), masing-masing slider volume sendiri ═══════════ */
let AC=null, masterG, musicG, sfxG;
let musicOn = false, sfxOn = false;   // turunan dari volume > 0 — dipakai agar tak kerja sia-sia saat senyap
const musicVolEl = document.getElementById('music-vol');
const sfxVolEl = document.getElementById('sfx-vol');
const musicLabelEl = document.getElementById('music-label');
const sfxLabelEl = document.getElementById('sfx-label');
let musicLastVol = 100, sfxLastVol = 100;   // volume terakhir sebelum dibisukan, untuk tombol mute
const MUSIC_LEVEL = .55, SFX_LEVEL = .85;
let musicTargetGain = MUSIC_LEVEL;   // gain yang dituju musik (sebelum diredam sesaat oleh tembakan)
const MUSIC_SRC_BUSY = 'bgm.m4a';        // "Determined Pursuit" oleh Emma_MA (CC0, opengameart.org) — di-loop gapless, untuk pasar ramai
const MUSIC_SRC_CALM = 'bgm_calm.m4a';   // "Ambient Relaxing Loop" oleh isaiah658 (CC0, opengameart.org) — untuk pasar sepi/gencatan
const SFX_GUNSHOT_SRC = 'sfx_gunshot.mp3', SFX_CANNON_SRC = 'sfx_cannon.mp3';   // CC0, "Basic Sound Effects" oleh n4 (opengameart.org)
const SFX_THUNDER_SRC = 'sfx_thunder.m4a';   // rekaman asli guntur dari paket "100 CC0 SFX #2" oleh rubberduck (CC0, opengameart.org)
let sfxBufGunshot=null, sfxBufCannon=null, sfxBufThunder=null;
/* dua lapis musik diputar bersamaan terus-menerus; hanya gain-nya yang di-crossfade,
   supaya perpindahan mulus tanpa jeda decode/restart saat keramaian pasar berubah */
let musicBusyG=null, musicCalmG=null, musicLayer='busy';

function initAudio(){
  AC = new (window.AudioContext||window.webkitAudioContext)();
  masterG = AC.createGain(); masterG.connect(AC.destination);
  musicG = AC.createGain(); musicG.gain.value = MUSIC_LEVEL; musicG.connect(masterG);
  sfxG = AC.createGain(); sfxG.gain.value = SFX_LEVEL; sfxG.connect(masterG);
  startMusic();
  loadSfxBuffers();
}

/* efek tembakan & guntur: sampel rekaman asli (bukan noise sintetis) di-decode sekali lalu diputar berulang */
async function loadSfxBuffers(){
  try {
    const [gRes, cRes, tRes] = await Promise.all([fetch(SFX_GUNSHOT_SRC), fetch(SFX_CANNON_SRC), fetch(SFX_THUNDER_SRC)]);
    [sfxBufGunshot, sfxBufCannon, sfxBufThunder] = await Promise.all([
      AC.decodeAudioData(await gRes.arrayBuffer()),
      AC.decodeAudioData(await cRes.arrayBuffer()),
      AC.decodeAudioData(await tRes.arrayBuffer()),
    ]);
  } catch (e) { console.warn('sfx tembakan/guntur gagal dimuat:', e); }
}

/* musik latar: kedua file di-decode lalu diputar lewat AudioBufferSourceNode (loop=true) agar
   sambungan loop mulus, bukan <audio loop> yang bisa berjeda sekejap di titik ulang.
   Keduanya berjalan bersamaan sejak awal — hanya gain masing-masing yang di-crossfade. */
async function startMusic(){
  try {
    const [busyBuf, calmBuf] = await Promise.all([
      fetch(MUSIC_SRC_BUSY, { cache: 'force-cache' }).then(r=>r.arrayBuffer()).then(b=>AC.decodeAudioData(b)),
      fetch(MUSIC_SRC_CALM, { cache: 'force-cache' }).then(r=>r.arrayBuffer()).then(b=>AC.decodeAudioData(b)),
    ]);
    musicBusyG = AC.createGain(); musicBusyG.gain.value = 1; musicBusyG.connect(musicG);
    musicCalmG = AC.createGain(); musicCalmG.gain.value = 0; musicCalmG.connect(musicG);
    const busySrc = AC.createBufferSource(); busySrc.buffer = busyBuf; busySrc.loop = true; busySrc.connect(musicBusyG); busySrc.start();
    const calmSrc = AC.createBufferSource(); calmSrc.buffer = calmBuf; calmSrc.loop = true; calmSrc.connect(musicCalmG); calmSrc.start();
  } catch (e) { console.warn('musik latar gagal dimuat:', e); }
}
/* pindah lapis musik ('busy'/'calm') dengan crossfade mulus, dipicu oleh gencatan (lull) saat pasar sepi */
function setMusicLayer(layer){
  if (layer === musicLayer || !musicBusyG || !musicCalmG) return;
  musicLayer = layer;
  const t = AC.currentTime, dur = 3.2;
  const inG = layer==='calm' ? musicCalmG : musicBusyG;
  const outG = layer==='calm' ? musicBusyG : musicCalmG;
  inG.gain.cancelScheduledValues(t); inG.gain.setValueAtTime(inG.gain.value, t); inG.gain.linearRampToValueAtTime(1, t+dur);
  outG.gain.cancelScheduledValues(t); outG.gain.setValueAtTime(outG.gain.value, t); outG.gain.linearRampToValueAtTime(0, t+dur);
}
window.__testMusicLayer = setMusicLayer;   // bantuan uji manual dari console: __testMusicLayer('calm') / ('busy')
/* mengecat isian slider (hijau sampai posisi thumb) & tandai bisu lewat CSS class */
function paintVol(el, muted){
  const pct = +el.value, col = muted ? 'var(--muted)' : 'var(--long)';
  el.classList.toggle('muted', muted);
  el.style.background = `linear-gradient(to right, ${col} 0%, ${col} ${pct}%, rgba(255,255,255,.14) ${pct}%, rgba(255,255,255,.14) 100%)`;
}
function applyMusicVol(){
  const pct = +musicVolEl.value, muted = pct===0;
  musicOn = !muted;
  musicTargetGain = (pct/100)*MUSIC_LEVEL;
  if (musicG){ musicG.gain.cancelScheduledValues(AC.currentTime); musicG.gain.value = musicTargetGain; }
  musicLabelEl.classList.toggle('muted', muted);
  paintVol(musicVolEl, muted);
  syncAudioBtn();
}
/* "duck" musik sesaat tiap ada tembakan, supaya efek suara tetap terdengar tembus di atas musik latar */
function duckMusic(depth, atk, hold, rel){
  if (!musicG || !musicOn) return;
  const t = AC.currentTime, g = musicG.gain;
  g.cancelScheduledValues(t);
  g.setValueAtTime(g.value, t);
  g.linearRampToValueAtTime(musicTargetGain*(1-depth), t+atk);
  g.setValueAtTime(musicTargetGain*(1-depth), t+atk+hold);
  g.linearRampToValueAtTime(musicTargetGain, t+atk+hold+rel);
}
function applySfxVol(){
  const pct = +sfxVolEl.value, muted = pct===0;
  sfxOn = !muted;
  if (sfxG) sfxG.gain.value = (pct/100)*SFX_LEVEL;
  sfxLabelEl.classList.toggle('muted', muted);
  paintVol(sfxVolEl, muted);
  syncAudioBtn();
}
musicVolEl.oninput = ()=>{ if (!AC) initAudio(); if (+musicVolEl.value>0) musicLastVol = +musicVolEl.value; applyMusicVol(); };
sfxVolEl.oninput   = ()=>{ if (!AC) initAudio(); if (+sfxVolEl.value>0)   sfxLastVol   = +sfxVolEl.value;   applySfxVol(); };
musicLabelEl.onclick = ()=>{ if (!AC) initAudio(); musicVolEl.value = (+musicVolEl.value>0) ? 0 : musicLastVol; applyMusicVol(); };
sfxLabelEl.onclick   = ()=>{ if (!AC) initAudio(); sfxVolEl.value   = (+sfxVolEl.value>0)   ? 0 : sfxLastVol;   applySfxVol(); };

/* ═══════════ TOGGLE AUDIO MASTER — satu tombol untuk musik + efek sekaligus ═══════════
   Di ponsel, panel kontrol sering disembunyikan dan browser butuh gestur pengguna sebelum
   audio boleh bunyi — tombol ini selalu terlihat di kanan atas dan ketukannya sekaligus
   menjadi gestur yang membuka AudioContext. Ikon mute tampil hanya bila KEDUA volume 0. */
const audioBtn = document.getElementById('audio-btn');
const AUDIO_ON_ICON   = '<svg viewBox="0 0 24 24" width="18" height="18"><path d="M11 5L6 9H3v6h3l5 4V5z"/><path d="M15.5 8.7a4.4 4.4 0 010 6.6M18.3 6a8.4 8.4 0 010 12"/></svg>';
const AUDIO_MUTE_ICON = '<svg viewBox="0 0 24 24" width="18" height="18"><path d="M11 5L6 9H3v6h3l5 4V5z"/><path d="M16 9.5l5 5M21 9.5l-5 5"/></svg>';
function audioAllMuted(){ return +musicVolEl.value===0 && +sfxVolEl.value===0; }
function syncAudioBtn(){
  const muted = audioAllMuted();
  audioBtn.classList.toggle('muted', muted);
  audioBtn.innerHTML = muted ? AUDIO_MUTE_ICON : AUDIO_ON_ICON;
  try {   // pemanggilan pertama terjadi saat init, sebelum I18N dideklarasikan — title bawaan HTML dipakai dulu
    const L = I18N[lang];
    audioBtn.title = muted ? L.audioUnmute : L.audioMute;
    audioBtn.setAttribute('aria-label', audioBtn.title);
  } catch(e){}
}
audioBtn.onclick = ()=>{
  if (!AC) initAudio();
  if (audioAllMuted()){
    // nyalakan kembali kedua kanal ke volume terakhir sebelum dibisukan
    musicVolEl.value = musicLastVol;
    sfxVolEl.value   = sfxLastVol;
    if (AC && AC.state === 'suspended') AC.resume().catch(()=>{});   // ketukan ini adalah gestur pengguna
  } else {
    // simpan volume saat ini supaya unmute kembali ke posisi semula
    if (+musicVolEl.value>0) musicLastVol = +musicVolEl.value;
    if (+sfxVolEl.value>0)   sfxLastVol   = +sfxVolEl.value;
    musicVolEl.value = 0; sfxVolEl.value = 0;
  }
  applyMusicVol(); applySfxVol();
};

/* musik & efek aktif otomatis — browser mensyaratkan satu gestur pengguna
   sebelum AudioContext bisa benar-benar bersuara, jadi kita siapkan
   di awal lalu resume pada interaksi pertama apa pun */
initAudio();
if (AC && AC.state !== 'running'){
  // autoplay diblokir browser (a.l. Safari) — bisukan dulu supaya UI tak menampilkan "menyala"
  // padahal sebenarnya senyap; musicLastVol/sfxLastVol tetap tersimpan, tinggal klik label untuk menyalakan
  musicVolEl.value = 0; sfxVolEl.value = 0;
}
applyMusicVol(); applySfxVol();
/* Browser memblokir suara sampai ada satu interaksi pengguna. Kita coba
   resume sedini mungkin pada gerakan/gesture apa pun (bergerak mouse,
   scroll, sentuh, tekan tombol) supaya musik nyala secepatnya. */
const RESUME_EVENTS = ['pointerdown','pointerup','pointermove','keydown','touchstart','touchend','wheel','scroll','click'];
const resumeAudioOnce = ()=>{
  if (AC){
    if (AC.state === 'suspended') AC.resume();
    try { const s = AC.createBufferSource(); s.buffer = AC.createBuffer(1,1,AC.sampleRate); s.connect(AC.destination); s.start(0); } catch(e){} // buka audio di iOS/Safari
  }
  if (AC && AC.state === 'running') RESUME_EVENTS.forEach(ev=>removeEventListener(ev, resumeAudioOnce));
};
RESUME_EVENTS.forEach(ev=>addEventListener(ev, resumeAudioOnce, { passive:true }));
if (AC) AC.resume().catch(()=>{});   // sebagian browser mengizinkan langsung

function playBoom(mag, tier){
  if (!sfxOn || !AC) return;
  const t = AC.currentTime;
  // sub thump
  const o = AC.createOscillator(), g = AC.createGain();
  o.type='sine';
  o.frequency.setValueAtTime(tier===2 ? 60 : 90+mag*60, t);
  o.frequency.exponentialRampToValueAtTime(24, t+.5+mag*.4);
  g.gain.setValueAtTime(.001,t);
  g.gain.exponentialRampToValueAtTime(.14+mag*.25, t+.015);
  g.gain.exponentialRampToValueAtTime(.001, t+.6+mag*.5);
  o.connect(g).connect(sfxG); o.start(t); o.stop(t+1.3);
  // debris noise
  const dur = .3+mag*.5;
  const buf = AC.createBuffer(1, AC.sampleRate*dur, AC.sampleRate);
  const ch = buf.getChannelData(0);
  for (let i=0;i<ch.length;i++) ch[i] = (Math.random()*2-1)*Math.pow(1-i/ch.length,2);
  const src = AC.createBufferSource(); src.buffer=buf;
  const f = AC.createBiquadFilter(); f.type='lowpass'; f.frequency.value=1200+mag*2500;
  const ng = AC.createGain(); ng.gain.value=.1+mag*.2;
  src.connect(f).connect(ng).connect(sfxG); src.start(t);
}
function playChargeHorn(){
  if (!sfxOn || !AC) return;
  const t = AC.currentTime;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type='square';
  o.frequency.setValueAtTime(46, t);
  o.frequency.linearRampToValueAtTime(66, t+1.2);
  o.frequency.linearRampToValueAtTime(40, t+2.2);
  const f = AC.createBiquadFilter(); f.type='lowpass'; f.frequency.value=240;
  g.gain.setValueAtTime(.001,t);
  g.gain.exponentialRampToValueAtTime(.16, t+.3);
  g.gain.exponentialRampToValueAtTime(.001, t+2.4);
  o.connect(f).connect(g).connect(sfxG);
  o.start(t); o.stop(t+2.5);
}
function playCannon(){                      // tembakan unit paus (tank/heli/jet) — berat & dalam, beda dari rentetan prajurit biasa
  if (!sfxOn || !AC || !sfxBufCannon) return;
  const t = AC.currentTime;
  const src = AC.createBufferSource(); src.buffer = sfxBufCannon;
  src.playbackRate.value = .95 + Math.random()*.1;
  const g = AC.createGain(); g.gain.value = .9;
  src.connect(g).connect(sfxG); src.start(t);
  duckMusic(.7, .03, .1, .5);
}
function playThunder(z0){                   // guntur saat badai (dump keras) — z0 sambaran menentukan jarak & kesan redam
  if (!sfxOn || !AC || !sfxBufThunder) return;
  const dist = Math.min(1, Math.max(0, (-z0-260)/460));   // 0=dekat, 1=jauh
  const t = AC.currentTime + dist*0.35;                    // jeda mengikuti kecepatan suara (dibuat-buat, bukan fisik akurat)
  const src = AC.createBufferSource(); src.buffer = sfxBufThunder;
  src.playbackRate.value = .92 - dist*.12 + Math.random()*.1;
  const f = AC.createBiquadFilter(); f.type='lowpass'; f.frequency.value = 7200 - dist*5200;
  const g = AC.createGain(); g.gain.value = .8 - dist*.35;
  src.connect(f).connect(g).connect(sfxG); src.start(t);
  duckMusic(.35, .05, .3, 1.1);
}
function playVolley(tier){
  if (!sfxOn || !AC || !sfxBufGunshot) return;
  const t0 = AC.currentTime;
  const shots = tier===2 ? 5 : tier===1 ? 3 : 1;
  for (let i=0;i<shots;i++){
    const t = t0 + i*(.02+Math.random()*.03);
    const src = AC.createBufferSource(); src.buffer = sfxBufGunshot;
    src.playbackRate.value = .92 + Math.random()*.22;
    const g = AC.createGain(); g.gain.value = .85+Math.random()*.25;
    src.connect(g).connect(sfxG); src.start(t);
  }
  duckMusic(.45, .02, .06, .35);
}
function playCheer(){
  if (!sfxOn || !AC) return;
  const t = AC.currentTime;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type='triangle';
  o.frequency.setValueAtTime(520, t);
  o.frequency.exponentialRampToValueAtTime(880, t+.14);
  g.gain.setValueAtTime(.0001, t);
  g.gain.exponentialRampToValueAtTime(.12, t+.03);
  g.gain.exponentialRampToValueAtTime(.0001, t+.3);
  o.connect(g).connect(sfxG); o.start(t); o.stop(t+.32);
}

/* ═══════════ DATA FEED — REAL (Binance) atau DUMMY (simulasi lokal) ═══════════ */
const priceEl = document.getElementById('cp-value');
const cpPctEl = document.getElementById('cp-pct');
const badgeEl = document.getElementById('feed-badge');
const badgeTextEl = document.getElementById('feed-text');
const retryBtn = document.getElementById('retry');

let price = NaN, lastPrice = NaN, pct24 = 0;
let ws = null, wsLiq = null, wsTicker = null, live = false, retries = 0, connectGuard = null;

/* persentase perubahan 24 jam dari ticker Binance (bukan sejak halaman dibuka) */
function updatePct(){
  cpPctEl.textContent = (pct24>=0?'▲ ':'▼ ')+Math.abs(pct24).toFixed(2)+'%';
  cpPctEl.className = pct24>=0 ? 'up':'down';
}

function onTrade(p, qty, isBuy){
  lastPrice = price; price = p;
  const usd = p*qty;
  flow.push({ t:performance.now(), usd, buy:isBuy });
  // sampel harga (maks ~2×/detik) untuk mengukur volatilitas → sistem cuaca
  const nowT = performance.now();
  if (!priceHist.length || nowT - priceHist[priceHist.length-1].t > 400) priceHist.push({ t:nowT, p });
  priceEl.textContent = '$'+p.toLocaleString('en-US',{ maximumFractionDigits: p<10?4:2 });
  if (p > lastPrice) priceEl.className = 'up';        // harga naik → hijau
  else if (p < lastPrice) priceEl.className = 'down'; // harga turun → merah
  // harga sama → warna dipertahankan

  const side = isBuy ? 'buy' : 'sell';
  const defender = isBuy ? sellCrowd : buyCrowd;
  const tier = usd>=T_WHALE ? 2 : usd>=T_HEAVY ? 1 : 0;
  const killed = tier===2 ? 14 : tier===1 ? 6 : 2;
  bumpStreak(side);
  if (usd >= T_WHALE){
    spawnBigUnit(side, usd);
    fireVolley(side, 2, Math.min(killed, 16));
    addShake(2.2); addHitstop(.09);
    if (usd >= T_BOSS){ if (Math.random()<.5) spawnAirstrike(side, usd); else spawnBarrage(side, usd); }   // order raksasa → variasi peristiwa langka
    bigMoment('whale', side, usd, p);
  } else if (usd >= T_SHELL){
    fireVolley(side, tier, killed);        // peluru yang membunuh saat mendarat
    if (tier===1) addShake(.5);
  }
  // order debu (<T_SHELL): hanya menambah tekanan/jumlah, tidak membunuh tanpa peluru
  logKill(side, qty, p, tier===2?'whale':null);
  considerRecord(side, usd, qty, p);
}

let feedState = 'connecting';
function setBadge(state){
  feedState = state;
  const L = I18N[lang];
  badgeEl.className = 'hud' + (state==='connecting' ? '' : ' '+state);
  badgeTextEl.textContent = state==='live'?L.live:state==='dead'?L.dead:L.connecting;

/* ═══════════ SUMBER DATA — utama Binance Vision, otomatis pindah ke Gate.io ═══════════ */
/* Sebagian ISP (mis. Indonesia) memblokir stream.binance.com. data-stream.binance.vision
   adalah domain data-pasar resmi Binance (format identik) yang biasanya lolos; kalau pun
   itu gagal, kita jatuh ke Gate.io. */
const FEEDS = [
  { name:'Binance Vision', go:connectBinanceVision },
  { name:'Gate.io',        go:connectGate },
];
let feedIdx = 0;

function markLive(){
  if (live) return;
  live = true; retries = 0;
  if (connectGuard){ clearTimeout(connectGuard); connectGuard = null; }
  setBadge('live');
}

function connectBinanceVision(){
  ws = new WebSocket(`wss://data-stream.binance.vision/ws/${STREAM}@aggTrade`);
  ws.onmessage = (ev)=>{ markLive();
    try { const d = JSON.parse(ev.data); onTrade(parseFloat(d.p), parseFloat(d.q), d.m===false); } catch(e){} /* m=false → taker beli */
  };
  ws.onerror = ()=>{ if(!live) failover(); };
  ws.onclose = ()=>{ if(live){ live=false; setBadge('dead'); autoRetry(); } };

  wsTicker = new WebSocket(`wss://data-stream.binance.vision/ws/${STREAM}@ticker`);
  wsTicker.onmessage = (ev)=>{ try { const d = JSON.parse(ev.data); pct24 = parseFloat(d.P); updatePct(); } catch(e){} };

  /* likuidasi futures — fstream sering diblokir; dicoba saja, diabaikan bila gagal */
  try {
    wsLiq = new WebSocket(`wss://fstream.binance.com/ws/${STREAM}@forceOrder`);
    wsLiq.onmessage = (ev)=>{
      try {
        const o = JSON.parse(ev.data).o;
        const qty = parseFloat(o.q);
        const liqPrice = parseFloat(o.ap);
        const usd = liqPrice*qty;
        const isBuy = o.S === 'BUY'; /* BUY = short terlikuidasi */
        const side = isBuy ? 'buy' : 'sell';
        const n = usd>=T_WHALE ? 10 : 4;
        fireVolley(side, usd>=T_WHALE?2:1, n);
        const pos = new THREE.Vector3((side==='buy'?1:-1)*(20+Math.random()*80), 0, (Math.random()-.5)*200);
        explode(pos, isBuy?C_GOLD:C_GOLD2, Math.min(1, Math.log10(usd/1000+1)/2.5), usd>=T_WHALE?2:1);
        if (usd >= T_HEAVY) liqStorm = Math.min(1, liqStorm + (usd>=T_WHALE ? .5 : .22));   // likuidasi massal memanggil badai
        logKill(side, qty, liqPrice, 'liq');
        bigMoment('liq', side, usd, liqPrice);
      } catch(e){}
    };
  } catch(e){}
}

function connectGate(){
  ws = new WebSocket('wss://api.gateio.ws/ws/v4/');
  ws.onopen = ()=>{
    const t = Math.floor(Date.now()/1000);
    try {
      ws.send(JSON.stringify({ time:t, channel:'spot.trades',  event:'subscribe', payload:['BTC_USDT'] }));
      ws.send(JSON.stringify({ time:t, channel:'spot.tickers', event:'subscribe', payload:['BTC_USDT'] }));
    } catch(e){}
  };
  ws.onmessage = (ev)=>{
    try {
      const d = JSON.parse(ev.data);
      if (d.event !== 'update' || !d.result) return;          /* abaikan ack langganan */
      if (d.channel === 'spot.trades'){
        markLive();
        const r = d.result;
        onTrade(parseFloat(r.price), parseFloat(r.amount), r.side === 'buy'); /* side = sisi taker */
      } else if (d.channel === 'spot.tickers'){
        pct24 = parseFloat(d.result.change_percentage); updatePct();
      }
    } catch(e){}
  };
  ws.onerror = ()=>{ if(!live) failover(); };
  ws.onclose = ()=>{ if(live){ live=false; setBadge('dead'); autoRetry(); } };
}

function connect(){
  disconnect();
  setBadge('connecting');
  try { FEEDS[feedIdx].go(); }
  catch(e){ failover(); return; }
  connectGuard = setTimeout(()=>{ if(!live) failover(); }, 6000);   // tak ada data → coba sumber lain
}
function failover(){
  if (connectGuard){ clearTimeout(connectGuard); connectGuard = null; }
  disconnect();
  if (feedIdx < FEEDS.length - 1){ feedIdx++; connect(); }         // coba sumber berikutnya
  else { feedIdx = 0; setBadge('dead'); autoRetry(); }             // semua gagal → jeda lalu ulang
}
function disconnect(){
  live = false;
  if (connectGuard){ clearTimeout(connectGuard); connectGuard = null; }
  for (const s of [ws, wsLiq, wsTicker]){
    if (s){ s.onopen=null; s.onclose=null; s.onerror=null; s.onmessage=null; try{s.close();}catch(e){} }
  }
  ws = wsLiq = wsTicker = null;
}
function autoRetry(){
  if (retries >= 5) return;
  retries++;
  setTimeout(()=>{ if(!live){ feedIdx = 0; connect(); } }, 4000);  // ulang dari sumber utama
}
retryBtn.onclick = ()=>{ retries=0; feedIdx=0; connect(); };

function cineWide(lt,t,frontX,dur){

    radius:230, tx:frontX, ty:7, tz:sweep };

/* ── A2: kunci kamera ke satu unit (prajurit biasa atau unit paus) sampai gugur ── */

/* raycast ke kerumunan ber-instance → prajurit aktif terdekat yang di-klik */
function pickSoldier(e){
  setRay(e);
  let best = null, bestD = Infinity;
  for (const crowd of [buyCrowd, sellCrowd]){
    const hits = raycaster.intersectObject(crowd.mesh);
    for (const h of hits){
      const idx = h.instanceId;
      if (idx==null) continue;
      const s = crowd.slots[idx];
      if (s && s.active && !s.dying && h.distance < bestD){ best = { crowd, idx }; bestD = h.distance; break; }
    }
  }
  return best;
}

/* A1: dorong garis depan ke arah sisi yang di-sorak + bala bantuan & tembakan semangat */
function pushFront(pt){
  const side = pt.x < frontX ? 'buy' : 'sell';
  const dir  = side==='buy' ? 1 : -1;                      // beli (kiri) mendorong garis ke kanan
  cheerBias = Math.max(-CHEER_MAX, Math.min(CHEER_MAX, cheerBias + dir*CHEER_STEP));
  const crowd = side==='buy' ? buyCrowd : sellCrowd;
  // catatan: JANGAN menambah prajurit di sini — jumlah pasukan tiap sisi harus tetap
  // mencerminkan porsi beli/jual (crowd.target). rally hanya mendorong garis depan sesaat
  // (cheerBias, meluruh sendiri) + salvo semangat, tanpa mengubah jumlah army.
  const defender = side==='buy' ? sellCrowd : buyCrowd;
  for (let i=0;i<4;i++) fireBullet(side, crowdPoint(crowd,8,true), groundPoint(defender), false, defender);  // salvo semangat
  playVolley(1);
  spawnCheer(pt, side);

  addShake(.5);
}
