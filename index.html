<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>BTC Battlefield — Live</title>
<style>
  :root{
    --bg-1:#0a0c18;
    --bg-2:#1b2050;
    --ink:#eef1fb;
    --muted:#8891b8;
    --panel:rgba(19,22,42,.82);
    --line:rgba(255,255,255,.08);
    --long:#2dd6a5;
    --short:#ff6584;
    --gold:#ffc857;
    --mono:ui-monospace,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace;
    --rounded:'SF Pro Rounded','SFRounded',ui-rounded,system-ui,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:linear-gradient(180deg,#bfe3f7 0%,#9dc077 55%,#7fa85f 100%);font-family:var(--mono);color:var(--muted)}
  canvas{display:block}
  .hud{position:fixed;z-index:10;user-select:none;-webkit-user-select:none}
  button{font-family:var(--rounded)}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;backdrop-filter:blur(10px);box-shadow:0 14px 34px rgba(0,0,0,.4)}

  .btn{background:rgba(255,255,255,.03);border:1px solid var(--line);color:var(--muted);font-size:10px;padding:5px 11px;border-radius:9px;cursor:pointer;letter-spacing:.09em;transition:border-color .15s,color .15s,background .15s}
  .btn:hover{color:var(--ink);background:rgba(255,255,255,.07)}
  .btn.active{color:var(--long);border-color:rgba(45,214,165,.5);background:rgba(45,214,165,.1)}
  .btn.warn{color:var(--short);border-color:rgba(255,101,132,.5)}

  /* ── top-left: status live sederhana, tiru referensi ── */
  #feed-badge{top:max(16px,env(safe-area-inset-top) + 12px);left:max(16px,env(safe-area-inset-left) + 12px);display:inline-flex;align-items:center;gap:7px;background:rgba(10,16,10,.5);padding:6px 12px;border-radius:7px;font-size:11px;letter-spacing:.12em;font-weight:700;color:var(--muted);font-family:var(--rounded)}
  #feed-dot{width:7px;height:7px;border-radius:50%;background:var(--muted)}
  #feed-badge.live{color:var(--long)}
  #feed-badge.live #feed-dot{background:var(--long);box-shadow:0 0 8px var(--long);animation:pulse 1.6s ease-in-out infinite}
  #feed-badge.dead{color:var(--short)}
  #feed-badge.dead #feed-dot{background:var(--short)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  #retry{display:none;margin-left:6px;padding:3px 9px;font-size:9px}

  /* ── tengah atas: harga besar mengambang di atas lapangan, kontras tinggi ── */
  #center-price{top:14%;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;z-index:9}
  #cp-value{font-size:clamp(36px,6vw,72px);font-weight:800;color:#fff;letter-spacing:-.01em;font-variant-numeric:tabular-nums;text-shadow:0 3px 0 rgba(0,0,0,.18),0 2px 4px rgba(0,0,0,.5),0 12px 30px rgba(0,0,0,.55),0 0 44px rgba(0,0,0,.35);transition:color .15s}
  #cp-value.up{color:var(--long);text-shadow:0 3px 0 rgba(0,0,0,.2),0 2px 4px rgba(0,0,0,.5),0 0 34px rgba(45,214,165,.5),0 12px 30px rgba(0,0,0,.5)}
  #cp-value.down{color:var(--short);text-shadow:0 3px 0 rgba(0,0,0,.2),0 2px 4px rgba(0,0,0,.5),0 0 34px rgba(255,101,132,.5),0 12px 30px rgba(0,0,0,.5)}
  #cp-sub{font-size:14px;font-weight:700;letter-spacing:.14em;margin-top:2px;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.55)}
  #cp-pct.up{color:var(--long)} #cp-pct.down{color:var(--short)}
  /* ── bawah tengah: tekanan pasar (panjang vs pendek), widget sendiri ── */
  #pressure{bottom:max(16px,env(safe-area-inset-bottom) + 12px);left:50%;transform:translateX(-50%);width:320px;max-width:calc(100vw - 32px);padding:11px 15px;text-align:center}
  #pp-head{font-size:9px;letter-spacing:.14em;color:var(--muted);font-weight:700;margin-bottom:8px;font-family:var(--rounded);white-space:nowrap}
  #pp-head .l{color:var(--long);font-weight:800} #pp-head .s{color:var(--short);font-weight:800}
  #pp-bar{height:7px;display:flex;overflow:hidden;border-radius:999px;background:rgba(0,0,0,.28);box-shadow:0 2px 8px rgba(0,0,0,.3)}
  #pp-long{background:var(--long);transition:width .4s}
  #pp-short{background:var(--short);transition:width .4s;flex:1}
  #pp-stats{display:flex;justify-content:space-between;margin-top:8px;font-size:10.5px;font-variant-numeric:tabular-nums}
  .pp-col.pp-s{text-align:right}
  .pp-main{font-weight:800}
  .pp-l .pp-main{color:var(--long)}
  .pp-s .pp-main{color:var(--short)}
  .pp-sub{font-size:9px;color:var(--muted);margin-top:2px;letter-spacing:.03em}

  /* ── bawah kanan: killfeed ringkas ── */
  #killfeed{bottom:max(16px,env(safe-area-inset-bottom) + 12px);right:max(16px,env(safe-area-inset-right) + 12px);width:300px;max-width:calc(100vw - 32px);padding:9px 11px;text-align:left}
  #killfeed h4{font-size:9px;letter-spacing:.24em;color:var(--muted);margin-bottom:7px;font-weight:600;font-family:var(--rounded)}
  #kills{overflow:hidden;max-height:112px}
  .kill{font-size:10px;padding:4px 8px;margin-bottom:3px;background:rgba(255,255,255,.04);border-radius:7px;border-left:2px solid;animation:slidein .25s ease-out;font-variant-numeric:tabular-nums;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .kill .kt{opacity:.55;margin-right:4px}
  .kill.buy{border-color:var(--long);color:var(--long)}
  .kill.sell{border-color:var(--short);color:var(--short)}
  .kill.liq{border-color:var(--gold);color:var(--gold)}
  .kill .tag{color:var(--gold);font-weight:700}
  @keyframes slidein{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}

  /* ── bawah kiri: controls, ringkas ── */
  #controls{bottom:max(16px,env(safe-area-inset-bottom) + 12px);left:max(16px,env(safe-area-inset-left) + 12px);font-size:9.5px;line-height:1.7;letter-spacing:.04em;padding:10px 13px;max-width:290px}
  #controls b{color:var(--ink);font-weight:600}
  #cam-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px}
  #cam-row .btn{padding:4px 8px;font-size:9px;white-space:nowrap}
  #audio-row{display:flex;flex-direction:column;gap:6px;margin-top:8px}
  .vol-row{display:flex;align-items:center;gap:8px}
  .vol-label{flex:none;width:32px;font-size:9px;letter-spacing:.08em;font-weight:700;color:var(--long);cursor:pointer;user-select:none;-webkit-user-select:none;font-family:var(--rounded);transition:color .15s}
  .vol-label.muted{color:var(--muted);text-decoration:line-through}
  .vol-slider{flex:1;-webkit-appearance:none;appearance:none;height:4px;border-radius:999px;background:rgba(255,255,255,.14);outline:none;cursor:pointer}
  .vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:var(--long);box-shadow:0 0 6px rgba(45,214,165,.55);cursor:pointer;margin-top:-3.5px}
  .vol-slider::-moz-range-thumb{width:11px;height:11px;border:none;border-radius:50%;background:var(--long);box-shadow:0 0 6px rgba(45,214,165,.55);cursor:pointer}
  .vol-slider::-moz-range-track{height:4px;border-radius:999px;background:rgba(255,255,255,.14)}
  .vol-slider::-moz-range-progress{height:4px;border-radius:999px;background:var(--long)}
  .vol-slider.muted::-webkit-slider-thumb{background:var(--muted);box-shadow:none}
  .vol-slider.muted::-moz-range-thumb{background:var(--muted);box-shadow:none}
  .vol-slider.muted::-moz-range-progress{background:var(--muted)}

  /* ── kanan atas: tombol bahasa & layar penuh ── */
  #lang-btn{top:max(16px,env(safe-area-inset-top) + 12px);right:calc(max(16px,env(safe-area-inset-right) + 12px) + 46px);display:flex;align-items:center;justify-content:center;width:38px;height:38px;padding:0;background:rgba(10,16,12,.6);border:1px solid var(--line);border-radius:10px;color:var(--ink);cursor:pointer;backdrop-filter:blur(6px);font-family:var(--rounded);font-size:11px;font-weight:800;letter-spacing:.04em}
  #lang-btn:hover{color:var(--long);border-color:rgba(45,214,165,.5)}
  #fs-btn{top:max(16px,env(safe-area-inset-top) + 12px);right:max(16px,env(safe-area-inset-right) + 12px);display:flex;align-items:center;justify-content:center;width:38px;height:38px;padding:0;background:rgba(10,16,12,.6);border:1px solid var(--line);border-radius:10px;color:var(--ink);cursor:pointer;backdrop-filter:blur(6px)}
  #fs-btn svg{stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  #fs-btn:hover{color:var(--long);border-color:rgba(45,214,165,.5)}

  #flash{position:fixed;inset:0;pointer-events:none;z-index:8;background:#fff;opacity:0}

  /* ── lapisan efek: angka damage melayang & streak ── */
  #fx-layer{position:fixed;inset:0;pointer-events:none;z-index:11;overflow:hidden}
  .fnum{position:absolute;transform:translate(-50%,-50%);font-family:var(--rounded);font-weight:800;font-size:15px;opacity:1;transition:transform .9s ease-out,opacity .9s ease-out;text-shadow:0 2px 8px rgba(0,0,0,.65);will-change:transform,opacity}
  .fnum.up{color:var(--long)} .fnum.dn{color:var(--short)}
  #unit-tip{position:fixed;z-index:12;pointer-events:none;background:rgba(10,16,12,.82);border:1px solid var(--line);border-radius:10px;padding:7px 10px;font-family:var(--rounded);font-size:11px;line-height:1.5;display:none;flex-direction:column;gap:1px;backdrop-filter:blur(6px);box-shadow:0 8px 22px rgba(0,0,0,.42)}
  #unit-tip.show{display:flex}
  #unit-tip b{font-size:11px;letter-spacing:.05em}
  #unit-tip b.buy{color:var(--long)} #unit-tip b.sell{color:var(--short)}
  #unit-tip span{color:var(--ink);opacity:.92;font-variant-numeric:tabular-nums}
  #unit-tip .tt{opacity:.5;font-size:10px}
  #streak{position:fixed;top:calc(14% + 118px);left:50%;transform:translateX(-50%) scale(.7);z-index:11;pointer-events:none;font-family:var(--rounded);font-weight:800;font-size:clamp(16px,2.4vw,22px);letter-spacing:.05em;opacity:0;transition:opacity .18s,transform .18s;text-shadow:0 2px 12px rgba(0,0,0,.6);white-space:nowrap}
  #streak.show{opacity:1;transform:translateX(-50%) scale(1);animation:streakPulse .5s ease-out}
  #streak.buy{color:var(--long)} #streak.sell{color:var(--short)}
  @keyframes streakPulse{0%{transform:translateX(-50%) scale(1.45)}100%{transform:translateX(-50%) scale(1)}}
  @media (prefers-reduced-motion: reduce){ .kill{animation:none} }

  @media (max-width:760px){
    #killfeed{width:168px;padding:8px 9px}
    #killfeed h4{font-size:8px}
    .kill{font-size:9px;padding:3px 6px}
    #controls .keys{display:none}
    #controls{max-width:190px;padding:9px 10px}
    #cam-row{flex-wrap:wrap;gap:4px}
    #cam-row .btn{padding:4px 7px;font-size:8.5px}
    .vol-label{width:28px;font-size:8.5px}
    #center-price{top:13%}
    #pressure{bottom:calc(max(16px,env(safe-area-inset-bottom) + 12px) + 112px);width:min(320px,90vw);padding:9px 12px}
    #pp-head{font-size:8px}
    #pp-stats{font-size:9.5px}
  }
</style>
</head>
<body>
<div id="flash"></div>
<div id="fx-layer"></div>
<div id="streak"></div>
<div id="unit-tip"></div>

<div class="hud" id="feed-badge">
  <span id="feed-dot"></span><span id="feed-text">MENYAMBUNG…</span>
  <button class="btn warn" id="retry">SAMBUNG ULANG</button>
</div>

<button class="hud" id="lang-btn" title="Switch language" aria-label="Switch language">EN</button>

<button class="hud" id="fs-btn" title="Layar penuh" aria-label="Layar penuh">
  <svg viewBox="0 0 24 24" width="17" height="17"><path d="M4 9V4h5M15 4h5v5M20 15v5h-5M9 20H4v-5"/></svg>
</button>

<div class="hud" id="center-price">
  <div id="cp-value">—</div>
  <div id="cp-sub">BTC / USDT <span id="cp-pct">0.00%</span></div>
</div>

<div class="hud panel" id="pressure">
  <div id="pp-head"><span id="pp-head-label"></span> <span class="l" id="pp-long-word"></span> <span class="vs">vs</span> <span class="s" id="pp-short-word"></span></div>
  <div id="pp-bar"><div id="pp-long" style="width:50%"></div><div id="pp-short"></div></div>
  <div id="pp-stats">
    <div class="pp-col pp-l">
      <div class="pp-main"><span id="pp-long-usd">$0</span> · <span id="pp-long-pct">50%</span></div>
      <div class="pp-sub"><span id="pp-long-cnt">0</span> <span id="pp-long-orders"></span></div>
    </div>
    <div class="pp-col pp-s">
      <div class="pp-main"><span id="pp-short-pct">50%</span> · <span id="pp-short-usd">$0</span></div>
      <div class="pp-sub"><span id="pp-short-cnt">0</span> <span id="pp-short-orders"></span></div>
    </div>
  </div>
</div>

<div class="hud panel" id="killfeed">
  <h4>KILLFEED</h4>
  <div id="kills"></div>
</div>

<div class="hud panel" id="controls">
  <div id="cam-row">
    <button class="btn active" data-m="0">SINEMATIK</button>
    <button class="btn" data-m="1">IKUTI</button>
    <button class="btn" data-m="2">BEBAS</button>
    <button class="btn" data-m="3">AKSI</button>
  </div>
  <div class="keys" id="keys-hint"></div>
  <div id="audio-row">
    <div class="vol-row">
      <span class="vol-label" id="music-label" title="Klik untuk bisukan">MUSIK</span>
      <input type="range" class="vol-slider" id="music-vol" min="0" max="100" value="100" step="1">
    </div>
    <div class="vol-row">
      <span class="vol-label" id="sfx-label" title="Klik untuk bisukan">EFEK</span>
      <input type="range" class="vol-slider" id="sfx-vol" min="0" max="100" value="100" step="1">
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(() => {
'use strict';

/* ═══════════ CONFIG ═══════════ */
const STREAM = 'btcusdt';
const T_SHELL = 40;        // ≥ $40   → tembakan kecil (sangat sering, sangat intens)
const T_HEAVY = 25000;     // ≥ $25K  → tembakan berat + sorotan
const T_WHALE = 100000;    // ≥ $100K → serangan tank
const MAX_UNITS = 30;
const CROWD_MAX = 96;      // jumlah maksimum prajurit per sisi (headroom untuk pertempuran padat)
const CROWD_START = 48;    // jumlah awal prajurit per sisi
const C_LONG = 0x2dd6a5, C_SHORT = 0xff2d4d, C_GOLD = 0xffc857, C_GOLD2 = 0xff9f5a;

/* ═══════════ THREE SETUP — lapangan hijau cerah di bawah langit ═══════════ */
const SKY = 0x8fc6ec;
const scene = new THREE.Scene();
scene.background = new THREE.Color(SKY);
scene.fog = new THREE.Fog(SKY, 500, 2400);

const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 1, 6000);
const renderer = new THREE.WebGLRenderer({ antialias:true, powerPreference:'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

scene.add(new THREE.HemisphereLight(0xcfe9ff, 0x38471f, .85));
const sun = new THREE.DirectionalLight(0xfff3d6, .7);
sun.position.set(-260, 420, -180);
scene.add(sun);
const fill = new THREE.DirectionalLight(0xffffff, .18);
fill.position.set(300, 200, 260);
scene.add(fill);

/* ═══════════ LAPANGAN — foto rumput asli (land.png), ubin diulang di seluruh lapangan ═══════════ */
/* peta normal dari kecerahan kanvas — memberi rumput kesan bergelombang di bawah cahaya matahari */
function normalFromCanvas(src, strength){
  const w = src.width, h = src.height, d = src.getContext('2d').getImageData(0,0,w,h).data;
  const out = document.createElement('canvas'); out.width=w; out.height=h;
  const octx = out.getContext('2d'), img = octx.createImageData(w,h);
  const lum = (x,y)=>{ x=(x+w)%w; y=(y+h)%h; const i=(y*w+x)*4; return (d[i]*.299+d[i+1]*.587+d[i+2]*.114)/255; };
  for (let y=0;y<h;y++) for (let x=0;x<w;x++){
    const nx=(lum(x-1,y)-lum(x+1,y))*strength, ny=(lum(x,y-1)-lum(x,y+1))*strength, nz=1;
    const len=Math.hypot(nx,ny,nz), i=(y*w+x)*4;
    img.data[i]=(nx/len*.5+.5)*255; img.data[i+1]=(ny/len*.5+.5)*255; img.data[i+2]=(nz/len*.5+.5)*255; img.data[i+3]=255;
  }
  octx.putImageData(img,0,0);
  return out;
}
const GROUND_REPEAT = 22;
const groundMat = new THREE.MeshStandardMaterial({ color:0x4a5c30, roughness:1, metalness:0 });
const ground = new THREE.Mesh(new THREE.PlaneGeometry(4000,4000), groundMat);
ground.rotation.x = -Math.PI/2;
scene.add(ground);
new THREE.TextureLoader().load('land.png', (tex)=>{
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(GROUND_REPEAT, GROUND_REPEAT);
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
  groundMat.color.set(0xffffff);   // biarkan warna asli foto, jangan ditimpa tint hijau
  groundMat.map = tex;
  groundMat.needsUpdate = true;
  try {
    // dibuka lewat file:// (bukan server lokal) membuat kanvas "tainted" — baca piksel gagal,
    // tapi foto tanahnya sendiri (di atas) sudah tampil, jadi peta normal ini cukup dilewati saja
    const nCanvas = document.createElement('canvas'); nCanvas.width = nCanvas.height = 512;
    nCanvas.getContext('2d').drawImage(tex.image, 0, 0, 512, 512);
    const normalMap = new THREE.CanvasTexture(normalFromCanvas(nCanvas, 1.8));
    normalMap.wrapS = normalMap.wrapT = THREE.RepeatWrapping;
    normalMap.repeat.copy(tex.repeat);
    groundMat.normalMap = normalMap;
    groundMat.needsUpdate = true;
  } catch(e){}
});

function patchTexture(){
  const c = document.createElement('canvas'); c.width=c.height=256;
  const g = c.getContext('2d');
  const r = g.createRadialGradient(128,128,0,128,128,128);
  r.addColorStop(0,'rgba(70,58,32,.4)');
  r.addColorStop(.6,'rgba(58,50,30,.2)');
  r.addColorStop(1,'rgba(58,50,30,0)');
  g.fillStyle=r; g.fillRect(0,0,256,256);
  return new THREE.CanvasTexture(c);
}
const field = new THREE.Mesh(
  new THREE.PlaneGeometry(560,440),
  new THREE.MeshBasicMaterial({ map:patchTexture(), transparent:true, depthWrite:false })
);
field.rotation.x = -Math.PI/2;
field.position.y = .4;
scene.add(field);

/* ═══════════ GARIS DEPAN & WILAYAH — bergerak mengikuti tekanan ═══════════ */
let buyShare = 0.5, frontX = 0;
const TERR_HALF = 300;
function terrPlane(color){
  const m = new THREE.Mesh(new THREE.PlaneGeometry(1,1),
    new THREE.MeshBasicMaterial({ color, transparent:true, opacity:.14, depthWrite:false }));
  m.rotation.x = -Math.PI/2; m.position.y = .45; scene.add(m); return m;
}
const buyTerr = terrPlane(C_LONG), sellTerr = terrPlane(C_SHORT);
const clashLine = new THREE.Mesh(
  new THREE.BoxGeometry(4, 3, 480),
  new THREE.MeshBasicMaterial({ color:0xffffff, transparent:true, opacity:.4, blending:THREE.AdditiveBlending, depthWrite:false })
);
clashLine.position.y = 1.4; scene.add(clashLine);

/* ═══════════ LANGIT & CUACA DINAMIS — ikut mood pasar ═══════════ */
let mood = 0, moodTarget = 0;
const SKY_STORM = new THREE.Color(0x2b3542), SKY_CALM = new THREE.Color(SKY), SKY_PUMP = new THREE.Color(0xffd9a3);
const _sky = new THREE.Color();
function weatherPoints(n, color, size, additive){
  const g = new THREE.BufferGeometry();
  const p = new Float32Array(n*3), v = new Float32Array(n);
  for (let i=0;i<n;i++){
    p[i*3]=(Math.random()-.5)*900; p[i*3+1]=Math.random()*320; p[i*3+2]=(Math.random()-.5)*700;
    v[i]=.5+Math.random();
  }
  g.setAttribute('position', new THREE.BufferAttribute(p,3));
  const mat = new THREE.PointsMaterial({ color, size, transparent:true, opacity:0, depthWrite:false });
  if (additive) mat.blending = THREE.AdditiveBlending;
  const m = new THREE.Points(g, mat); scene.add(m);
  return { m, v, n, attr:g.attributes.position };
}
const rain = weatherPoints(520, 0xcfe0ff, 2.2, false);
const embers = weatherPoints(280, 0xffc46b, 3.4, true);

/* ═══════════ TEXTURES / GEOMETRY BERSAMA ═══════════ */
function glowTexture(){
  const c = document.createElement('canvas'); c.width=c.height=64;
  const g = c.getContext('2d');
  const r = g.createRadialGradient(32,32,0,32,32,32);
  r.addColorStop(0,'rgba(255,255,255,1)');
  r.addColorStop(.35,'rgba(255,255,255,.55)');
  r.addColorStop(1,'rgba(255,255,255,0)');
  g.fillStyle=r; g.fillRect(0,0,64,64);
  return new THREE.CanvasTexture(c);
}

/* gabung beberapa BufferGeometry (posisi+normal) jadi satu — tanpa lib eksternal */
function mergeGeoms(geoms){
  const nn = geoms.map(g => g.index ? g.toNonIndexed() : g);
  let count = 0;
  for (const g of nn) count += g.attributes.position.count;
  const pos = new Float32Array(count*3), nor = new Float32Array(count*3);
  let o = 0;
  for (const g of nn){
    pos.set(g.attributes.position.array, o);
    nor.set(g.attributes.normal.array, o);
    o += g.attributes.position.count*3;
  }
  const out = new THREE.BufferGeometry();
  out.setAttribute('position', new THREE.BufferAttribute(pos,3));
  out.setAttribute('normal', new THREE.BufferAttribute(nor,3));
  return out;
}
function boxPart(w,h,d, x,y,z){ const g = new THREE.BoxGeometry(w,h,d); g.translate(x,y,z); return g; }
/* prajurit kartun memegang senapan, kaki di y=0, menghadap +x */
function buildSoldier(){
  const parts = [
    boxPart(0.7,3.0,0.7,  0,1.5,-0.6),   // kaki kiri
    boxPart(0.7,3.0,0.7,  0,1.5, 0.6),   // kaki kanan
    boxPart(1.5,3.4,2.1,  0,4.6, 0),     // badan
    boxPart(0.7,1.3,0.7,  0,6.7, 0),     // leher
    boxPart(1.3,1.3,1.3,  0.05,7.5,0),   // kepala
    boxPart(1.8,0.5,2.0,  0,8.2, 0),     // helm
    boxPart(0.8,0.28,2.0, 0.95,8.0,0),   // pinggir helm depan
    boxPart(1.9,0.55,0.6, 0.9,4.9,-0.85),// lengan belakang
    boxPart(1.9,0.55,0.6, 0.9,4.9, 0.85),// lengan depan

    boxPart(0.9,0.8,0.4,  0.9,4.3,0.55), // magasin
  ];
  const geo = mergeGeoms(parts);
  parts.forEach(p=>p.dispose());
  return geo;
}

function makeCrowd(color, sign){ // sign: -1 = beli (kiri), 1 = jual (kanan)
  // sisi jual (merah) diberi emissive lebih kuat — warna merah/pink cenderung tenggelam
  // di lapangan hijau & langit yang hangat saat kamera di-zoom out, beda dengan hijau-teal beli
  const emissiveIntensity = sign>0 ? .58 : .42;
  const mat = new THREE.MeshLambertMaterial({ color, emissive:color, emissiveIntensity, fog:false });
  const mesh = new THREE.InstancedMesh(soldierGeo, mat, CROWD_MAX);
  mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
  scene.add(mesh);
  const q = new THREE.Quaternion();
  if (sign>0) q.setFromAxisAngle(new THREE.Vector3(0,1,0), Math.PI); // sisi kanan menghadap kiri
  const slots = [];
  for (let i=0;i<CROWD_MAX;i++){
    const x = sign*(40 + Math.random()*120);
    const z = (Math.random()-.5)*230;
    slots.push({
      base: new THREE.Vector3(x,0,z),
      spawnFrom: new THREE.Vector3(x+sign*170, 0, z+(Math.random()-.5)*50),
      active: i<CROWD_START,
      dying:false, dieT:0,
      walking:i<CROWD_START, walkT:0,
      phase: Math.random()*Math.PI*2,
    });
  }
  return { mesh, slots, count:CROWD_START, target:CROWD_START, q, sign };
}

/* mati HANYA karena tertembak (dipanggil saat peluru mendarat) */
function killSoldier(crowd, n){
  for (let k=0;k<n;k++){
    let idx=-1;
    for (let i=0;i<crowd.slots.length;i++){ if (crowd.slots[i].active && !crowd.slots[i].dying){ idx=i; if (Math.random()<.4) break; } }
    if (idx<0) break;
    const s = crowd.slots[idx];
    s.dying = true; s.dieT = 0;
    crowd.count = Math.max(0, crowd.count-1);
    spawnSkull(s.base);
  }
}
/* bala bantuan masuk (order baru di sisi ini) */
function reviveSoldier(crowd){
  if (crowd.count >= CROWD_MAX) return;
  let idx=-1;
  for (let i=0;i<crowd.slots.length;i++){ const c=crowd.slots[i]; if (!c.active && !c.dying){ idx=i; if (Math.random()<.4) break; } }
  if (idx<0) return;
  const s = crowd.slots[idx];
  s.active = true; s.walking = true; s.walkT = 0;
  crowd.count++;
}
function resetCrowd(crowd){
  crowd.count = CROWD_START;
  crowd.slots.forEach((s,i)=>{
    s.active = i<CROWD_START;
    s.dying = false; s.dieT = 0;
    s.walking = i<CROWD_START; s.walkT = 0;
  });
}
function updateCrowd(crowd, dt, t){
  const bias = crowd.pressBias || 0;
  for (let i=0;i<crowd.slots.length;i++){
    const s = crowd.slots[i];
    let x = s.base.x + bias, z = s.base.z, sc = 0, bob = 0, topple = 0;

    if (s.dying){
      s.dieT = Math.min(1, s.dieT + dt*2.6);
      topple = Math.min(1, s.dieT*1.5) * 1.5 * crowd.sign;   // tumbang ke belakang
      sc = s.dieT < .55 ? 1 : Math.max(0, 1-(s.dieT-.55)/.45);
      bob = -s.dieT*1.2;
      if (s.dieT>=1){ s.dying=false; s.active=false; }
    } else if (s.walking){
      s.walkT = Math.min(1, s.walkT + dt*.75);
      const e = 1-(1-s.walkT)*(1-s.walkT);
      x = s.spawnFrom.x + (s.base.x+bias-s.spawnFrom.x)*e;
      z = s.spawnFrom.z + (s.base.z-s.spawnFrom.z)*e;
      bob = Math.abs(Math.sin(t*9+s.phase))*.9;
      sc = 1;
      if (s.walkT>=1) s.walking=false;
    } else if (s.active){
      bob = Math.abs(Math.sin(t*2.4+s.phase))*.45;   // ayun ringan berdiri
      sc = 1;
    }

    // jangan biarkan prajurit melewati garis depan ke wilayah lawan
    if (crowd.sign < 0) x = Math.min(x, frontX - 16);
    else                x = Math.max(x, frontX + 16);

    if (sc <= .002 && !s.active && !s.dying) sscl.set(.0001,.0001,.0001);
    else sscl.set(sc, sc, sc);
    sq.copy(crowd.q);
    if (topple){ toppleQ.setFromAxisAngle(AXIS_Z, topple); sq.premultiply(toppleQ); }
    spos.set(x, bob, z);
    smx.compose(spos, sq, sscl);
    crowd.mesh.setMatrixAt(i, smx);
  }
  crowd.mesh.instanceMatrix.needsUpdate = true;
}

function fireBullet(side, from, to, kills, defender, big){

/* titik di posisi pasukan saat ini — ikut garis depan yang bergerak */
function crowdPoint(crowd, jitter){
  const bias = crowd.pressBias || 0;
  const N = crowd.slots.length, start = Math.floor(Math.random()*N);
  let s = null;
  for (let k=0;k<N;k++){ const c = crowd.slots[(start+k)%N]; if (c.active && !c.dying){ s = c; break; } }
  let x, z;
  if (s){ x = s.base.x + bias; z = s.base.z; }
  else { x = crowd.sign*(40+Math.random()*80) + bias; z = (Math.random()-.5)*230; }
  // tetap di sisi pasukannya sendiri terhadap garis depan (sama seperti clamp prajurit)
  if (crowd.sign < 0) x = Math.min(x, frontX - 16); else x = Math.max(x, frontX + 16);
  return new THREE.Vector3(x + (Math.random()-.5)*jitter, 5+Math.random()*3, z + (Math.random()-.5)*jitter);
}
/* titik tanah kosong di sisi lawan — target peluru yang TIDAK membunuh (meleset ke tanah) */
function groundPoint(defender){
  const bias = defender.pressBias || 0;
  let x = defender.sign*(50+Math.random()*150) + bias;
  if (defender.sign < 0) x = Math.min(x, frontX - 22); else x = Math.max(x, frontX + 22);
  return new THREE.Vector3(x, 1.4, (Math.random()-.5)*260);
}
function fireVolley(side, tier, killed){
  const attacker = side==='buy' ? buyCrowd : sellCrowd;
  const defender = side==='buy' ? sellCrowd : buyCrowd;
  const n = killed + (tier===2 ? 3 : 1);   // sebagian besar peluru mengenai prajurit; hanya sedikit yang meleset
  for (let i=0;i<n;i++){
    const kills = i < killed;
    const from = crowdPoint(attacker, 8);                              // dari prajurit penyerang
    const to   = kills ? crowdPoint(defender, 10) : groundPoint(defender); // yang membunuh → prajurit, meleset → tanah
    fireBullet(side, from, to, kills, defender);
  }
  playVolley(tier);
}
/* tembakan latar saat pasar sepi — mengisi jeda supaya baku tembak tak pernah kosong.
   hanya visual (tidak membunuh) agar jumlah pasukan tetap mewakili persentase buy/sell. */
function ambientFire(){
  for (const side of ['buy','sell']){
    const attacker = side==='buy' ? buyCrowd : sellCrowd;
    const defender = side==='buy' ? sellCrowd : buyCrowd;
    if (attacker.count <= 0) continue;
    const n = 1 + (Math.random()<.4 ? 1 : 0);   // sedikit saja — cukup agar tak sepi, tidak boros peluru
    for (let i=0;i<n;i++) fireBullet(side, crowdPoint(attacker,8), groundPoint(defender), false, defender);  // ke tanah, tidak kena prajurit
  }
  playVolley(0);
}

const booms = [], rings = [];
function explode(pos, color, mag, tier){
  const n = 22 + Math.floor(mag*(tier===2?90:36));
  const geo = new THREE.BufferGeometry();
  const px = new Float32Array(n*3), vel = [];
  for (let i=0;i<n;i++){
    px[i*3]=pos.x; px[i*3+1]=pos.y+2; px[i*3+2]=pos.z;
    const a = Math.random()*Math.PI*2, e = Math.random()*Math.PI*.5;
    const sp = 20 + Math.random()*(40 + mag*(tier===2?110:55));
    vel.push(new THREE.Vector3(Math.cos(a)*Math.cos(e)*sp, Math.sin(e)*sp*1.4, Math.sin(a)*Math.cos(e)*sp));
  }
  geo.setAttribute('position', new THREE.BufferAttribute(px,3));
  const pts = new THREE.Points(geo, new THREE.PointsMaterial({ color, size:2.5+mag*(tier===2?6:3), map:GLOW, transparent:true, blending:THREE.AdditiveBlending, depthWrite:false }));
  scene.add(pts);
  booms.push({ pts, vel, t:0, dur:.6 + mag*(tier===2?.8:.5) });

  const rm = new THREE.Mesh(ringGeo, new THREE.MeshBasicMaterial({ color, transparent:true, opacity:.8, side:THREE.DoubleSide, blending:THREE.AdditiveBlending, depthWrite:false }));
  rm.rotation.x = -Math.PI/2;
  rm.position.copy(pos); rm.position.y = 1.2;
  scene.add(rm);
  rings.push({ rm, t:0, dur: tier===2?.85:.5, max:(tier===2?32:10) + mag*20 });

  if (mag>.45 || tier===2){
    const l = new THREE.PointLight(color, 3+mag*(tier===2?10:5), 400+mag*700, 2);
    l.position.copy(pos); l.position.y = 30;
    scene.add(l);
    setTimeout(()=>scene.remove(l), tier===2?400:220);
  }
  lastImpact.copy(pos);

/* ═══════════ TEKANAN PASAR (panjang vs pendek, 60s) ═══════════ */
let flow = [];   // {t, usd, buy}
function fmtUsd(n){
  if (n>=1e6) return '$'+(n/1e6).toFixed(1)+'M';
  if (n>=1e3) return '$'+Math.round(n/1e3)+'K';
  return '$'+Math.round(n);
}
function meterUpdate(){
  const now = performance.now();
  flow = flow.filter(f=>now-f.t < 60000);
  let bu=0, su=0, bc=0, sc=0;
  for (const f of flow){ if (f.buy){ bu+=f.usd; bc++; } else { su+=f.usd; sc++; } }
  const tot = bu+su || 1;
  const lp = Math.round(bu/tot*100);
  if (tot > 1){
    buyShare = bu/tot;
    moodTarget = Math.max(-1, Math.min(1, (buyShare-0.5)*3));
    // jumlah prajurit tiap sisi mencerminkan persentase buy/sell
    buyCrowd.target  = Math.max(8, Math.min(CROWD_MAX, Math.round(buyShare*2*CROWD_START)));
    sellCrowd.target = Math.max(8, Math.min(CROWD_MAX, Math.round((1-buyShare)*2*CROWD_START)));
  }
  document.getElementById('pp-long').style.width = lp+'%';
  document.getElementById('pp-long-pct').textContent = lp+'%';
  document.getElementById('pp-short-pct').textContent = (100-lp)+'%';
  document.getElementById('pp-long-usd').textContent = fmtUsd(bu);
  document.getElementById('pp-short-usd').textContent = fmtUsd(su);
  document.getElementById('pp-long-cnt').textContent = bc;
  document.getElementById('pp-short-cnt').textContent = sc;
}

/* ═══════════ AUDIO — musik latar & efek suara, masing-masing slider volume sendiri ═══════════ */
let AC=null, masterG, musicG, sfxG, musicNodes=[];
let musicOn = false, sfxOn = false;   // turunan dari volume > 0 — dipakai agar tak kerja sia-sia saat senyap
const musicVolEl = document.getElementById('music-vol');
const sfxVolEl = document.getElementById('sfx-vol');
const musicLabelEl = document.getElementById('music-label');
const sfxLabelEl = document.getElementById('sfx-label');
let musicLastVol = 100, sfxLastVol = 100;   // volume terakhir sebelum dibisukan, untuk tombol mute
const MUSIC_LEVEL = .3, SFX_LEVEL = .34;

function initAudio(){
  AC = new (window.AudioContext||window.webkitAudioContext)();
  masterG = AC.createGain(); masterG.connect(AC.destination);
  musicG = AC.createGain(); musicG.gain.value = MUSIC_LEVEL; musicG.connect(masterG);
  sfxG = AC.createGain(); sfxG.gain.value = SFX_LEVEL; sfxG.connect(masterG);
  startMusic();
}

/* ── musik latar generatif bertema "battlefield": genderang perang + bas menghentak +
   motif kuningan (brass) epik dalam progresi minor Am – F – C – G ── */
const BARS = [
  { root:55.00, padA:110.00, padB:164.81, mel:[220.00, 261.63, 329.63] }, // Am
  { root:43.65, padA: 87.31, padB:130.81, mel:[174.61, 220.00, 261.63] }, // F
  { root:65.41, padA:130.81, padB:196.00, mel:[261.63, 329.63, 392.00] }, // C
  { root:49.00, padA: 98.00, padB:146.83, mel:[196.00, 246.94, 293.66] }, // G
];
const STEP = 0.2;   // detik per langkah (16 langkah = 1 bar)
let seqTimer = null, step16 = 0, bar = 0, nextStepTime = 0;

function playKick(t, lvl){
  const o = AC.createOscillator(), g = AC.createGain();
  o.type='sine'; o.frequency.setValueAtTime(150, t); o.frequency.exponentialRampToValueAtTime(45, t+.12);
  g.gain.setValueAtTime(.0001, t); g.gain.exponentialRampToValueAtTime(.5*lvl, t+.008); g.gain.exponentialRampToValueAtTime(.0001, t+.3);
  o.connect(g).connect(musicG); o.start(t); o.stop(t+.32);
}
function playSnare(t, lvl){
  const dur=.2, buf=AC.createBuffer(1, AC.sampleRate*dur, AC.sampleRate), ch=buf.getChannelData(0);
  for (let i=0;i<ch.length;i++) ch[i]=(Math.random()*2-1)*Math.pow(1-i/ch.length, 1.4);
  const src=AC.createBufferSource(); src.buffer=buf;
  const hp=AC.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=1500;
  const g=AC.createGain(); g.gain.value=.17*lvl;
  src.connect(hp).connect(g).connect(musicG); src.start(t);
  const o=AC.createOscillator(), og=AC.createGain();      // "crack" nada
  o.type='triangle'; o.frequency.setValueAtTime(340, t); o.frequency.exponentialRampToValueAtTime(170, t+.1);
  og.gain.setValueAtTime(.11*lvl, t); og.gain.exponentialRampToValueAtTime(.0001, t+.12);
  o.connect(og).connect(musicG); o.start(t); o.stop(t+.14);
}
function playBass(freq, t, dur, lvl){
  const o=AC.createOscillator(), g=AC.createGain(), f=AC.createBiquadFilter();
  o.type='sawtooth'; o.frequency.value=freq;
  f.type='lowpass'; f.frequency.value=300; f.Q.value=3;
  g.gain.setValueAtTime(.0001, t); g.gain.exponentialRampToValueAtTime(lvl, t+.01); g.gain.exponentialRampToValueAtTime(.0001, t+dur);
  o.connect(f).connect(g).connect(musicG); o.start(t); o.stop(t+dur+.05);
}
function playBrass(freq, t, dur, lvl){
  const o=AC.createOscillator(), o2=AC.createOscillator(), g=AC.createGain(), f=AC.createBiquadFilter();
  o.type='sawtooth'; o2.type='sawtooth'; o.frequency.value=freq; o2.frequency.value=freq; o2.detune.value=9;
  f.type='lowpass'; f.frequency.setValueAtTime(500, t); f.frequency.linearRampToValueAtTime(2200, t+.09); f.Q.value=1;
  g.gain.setValueAtTime(.0001, t); g.gain.linearRampToValueAtTime(lvl, t+.06);
  g.gain.setValueAtTime(lvl, t+dur*.55); g.gain.exponentialRampToValueAtTime(.0001, t+dur);
  o.connect(f); o2.connect(f); f.connect(g).connect(musicG);
  o.start(t); o2.start(t); o.stop(t+dur+.05); o2.stop(t+dur+.05);
}
function retunePad(b, t){
  if (!musicNodes.length) return;
  musicNodes[0].o.frequency.linearRampToValueAtTime(b.padA, t+.9);
  musicNodes[1].o.frequency.linearRampToValueAtTime(b.padB, t+.9);
}
function scheduleStep(t){
  const b = BARS[bar];
  if (step16===0 || step16===4 || step16===8 || step16===12 || step16===14) playKick(t, step16%4===0?1:.6); // genderang
  if (step16===4 || step16===12) playSnare(t, .9);                    // backbeat
  if (bar===3 && step16>=13) playSnare(t, .55);                       // roll penutup bar
  if (step16===0||step16===3||step16===6||step16===8||step16===11||step16===14) playBass(b.root, t, .17, .5); // bas menghentak
  if (step16===0)  playBrass(b.mel[0], t, .5, .26);                   // motif kuningan
  if (step16===6)  playBrass(b.mel[1], t, .45, .22);
  if (step16===10) playBrass(b.mel[2], t, .5, .24);
  if (step16===0)  retunePad(b, t);
  if (++step16 >= 16){ step16 = 0; bar = (bar+1)%BARS.length; }
}
function startMusic(){
  // pad drone minor (atmosfer), 2 osilator lewat lowpass ber-LFO lambat
  const lp = AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=520; lp.Q.value=.6; lp.connect(musicG);
  const lfo = AC.createOscillator(), lfoG = AC.createGain(); lfo.frequency.value=.05; lfoG.gain.value=180;
  lfo.connect(lfoG).connect(lp.frequency); lfo.start();
  musicNodes = [BARS[0].padA, BARS[0].padB].map((f,i)=>{
    const o = AC.createOscillator(), g = AC.createGain();
    o.type='sawtooth'; o.frequency.value=f; o.detune.value=(Math.random()-.5)*6;
    g.gain.value = i===0 ? .05 : .038;
    o.connect(g).connect(lp); o.start();
    return { o, g };
  });
  step16 = 0; bar = 0; nextStepTime = AC.currentTime + .1;
  seqTimer = setInterval(() => {              // penjadwal look-ahead agar ketukan rapat
    if (!musicOn || !AC) return;
    if (nextStepTime < AC.currentTime) nextStepTime = AC.currentTime + .05;
    while (nextStepTime < AC.currentTime + .12){
      scheduleStep(nextStepTime);
      nextStepTime += STEP;
    }
  }, 40);
}
/* mengecat isian slider (hijau sampai posisi thumb) & tandai bisu lewat CSS class */
function paintVol(el, muted){
  const pct = +el.value, col = muted ? 'var(--muted)' : 'var(--long)';
  el.classList.toggle('muted', muted);
  el.style.background = `linear-gradient(to right, ${col} 0%, ${col} ${pct}%, rgba(255,255,255,.14) ${pct}%, rgba(255,255,255,.14) 100%)`;
}
function applyMusicVol(){
  const pct = +musicVolEl.value, muted = pct===0;
  musicOn = !muted;
  if (musicG) musicG.gain.value = (pct/100)*MUSIC_LEVEL;
  musicLabelEl.classList.toggle('muted', muted);
  paintVol(musicVolEl, muted);
}
function applySfxVol(){
  const pct = +sfxVolEl.value, muted = pct===0;
  sfxOn = !muted;
  if (sfxG) sfxG.gain.value = (pct/100)*SFX_LEVEL;
  sfxLabelEl.classList.toggle('muted', muted);
  paintVol(sfxVolEl, muted);
}
musicVolEl.oninput = ()=>{ if (!AC) initAudio(); if (+musicVolEl.value>0) musicLastVol = +musicVolEl.value; applyMusicVol(); };
sfxVolEl.oninput   = ()=>{ if (!AC) initAudio(); if (+sfxVolEl.value>0)   sfxLastVol   = +sfxVolEl.value;   applySfxVol(); };
musicLabelEl.onclick = ()=>{ if (!AC) initAudio(); musicVolEl.value = (+musicVolEl.value>0) ? 0 : musicLastVol; applyMusicVol(); };
sfxLabelEl.onclick   = ()=>{ if (!AC) initAudio(); sfxVolEl.value   = (+sfxVolEl.value>0)   ? 0 : sfxLastVol;   applySfxVol(); };

/* musik & efek aktif otomatis — browser mensyaratkan satu gestur pengguna
   sebelum AudioContext bisa benar-benar bersuara, jadi kita siapkan
   di awal lalu resume pada interaksi pertama apa pun */
initAudio();
applyMusicVol(); applySfxVol();
/* Browser memblokir suara sampai ada satu interaksi pengguna. Kita coba
   resume sedini mungkin pada gerakan/gesture apa pun (bergerak mouse,
   scroll, sentuh, tekan tombol) supaya musik nyala secepatnya. */
const RESUME_EVENTS = ['pointerdown','pointerup','pointermove','keydown','touchstart','touchend','wheel','scroll','click'];
const resumeAudioOnce = ()=>{
  if (AC){
    if (AC.state === 'suspended') AC.resume();
    try { const s = AC.createBufferSource(); s.buffer = AC.createBuffer(1,1,AC.sampleRate); s.connect(AC.destination); s.start(0); } catch(e){} // buka audio di iOS/Safari
  }
  if (AC && AC.state === 'running') RESUME_EVENTS.forEach(ev=>removeEventListener(ev, resumeAudioOnce));
};
RESUME_EVENTS.forEach(ev=>addEventListener(ev, resumeAudioOnce, { passive:true }));
if (AC) AC.resume().catch(()=>{});   // sebagian browser mengizinkan langsung

function playBoom(mag, tier){
  if (!sfxOn || !AC) return;
  const t = AC.currentTime;
  // sub thump
  const o = AC.createOscillator(), g = AC.createGain();
  o.type='sine';
  o.frequency.setValueAtTime(tier===2 ? 60 : 90+mag*60, t);
  o.frequency.exponentialRampToValueAtTime(24, t+.5+mag*.4);
  g.gain.setValueAtTime(.001,t);
  g.gain.exponentialRampToValueAtTime(.14+mag*.25, t+.015);
  g.gain.exponentialRampToValueAtTime(.001, t+.6+mag*.5);
  o.connect(g).connect(sfxG); o.start(t); o.stop(t+1.3);
  // debris noise
  const dur = .3+mag*.5;
  const buf = AC.createBuffer(1, AC.sampleRate*dur, AC.sampleRate);
  const ch = buf.getChannelData(0);
  for (let i=0;i<ch.length;i++) ch[i] = (Math.random()*2-1)*Math.pow(1-i/ch.length,2);
  const src = AC.createBufferSource(); src.buffer=buf;
  const f = AC.createBiquadFilter(); f.type='lowpass'; f.frequency.value=1200+mag*2500;
  const ng = AC.createGain(); ng.gain.value=.1+mag*.2;
  src.connect(f).connect(ng).connect(sfxG); src.start(t);
}
function playChargeHorn(){
  if (!sfxOn || !AC) return;
  const t = AC.currentTime;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type='square';
  o.frequency.setValueAtTime(46, t);
  o.frequency.linearRampToValueAtTime(66, t+1.2);
  o.frequency.linearRampToValueAtTime(40, t+2.2);
  const f = AC.createBiquadFilter(); f.type='lowpass'; f.frequency.value=240;
  g.gain.setValueAtTime(.001,t);
  g.gain.exponentialRampToValueAtTime(.16, t+.3);
  g.gain.exponentialRampToValueAtTime(.001, t+2.4);
  o.connect(f).connect(g).connect(sfxG);
  o.start(t); o.stop(t+2.5);
}
function playCannon(){                      // tembakan unit paus (tank/heli/jet) — berat & dalam, beda dari rentetan prajurit biasa
  if (!sfxOn || !AC) return;
  const t = AC.currentTime;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type='sine';
  o.frequency.setValueAtTime(180, t); o.frequency.exponentialRampToValueAtTime(50, t+.09);
  g.gain.setValueAtTime(.001,t); g.gain.exponentialRampToValueAtTime(.22, t+.006); g.gain.exponentialRampToValueAtTime(.001, t+.15);
  o.connect(g).connect(sfxG); o.start(t); o.stop(t+.17);
  const dur=.08, buf=AC.createBuffer(1, AC.sampleRate*dur, AC.sampleRate), ch=buf.getChannelData(0);
  for (let i=0;i<ch.length;i++) ch[i]=(Math.random()*2-1)*Math.pow(1-i/ch.length,2);
  const src=AC.createBufferSource(); src.buffer=buf;
  const f=AC.createBiquadFilter(); f.type='bandpass'; f.frequency.value=1300; f.Q.value=1.1;
  const ng=AC.createGain(); ng.gain.value=.18;
  src.connect(f).connect(ng).connect(sfxG); src.start(t);
}
function playVolley(tier){
  if (!sfxOn || !AC) return;
  const t0 = AC.currentTime;
  const shots = tier===2 ? 5 : tier===1 ? 3 : 1;
  for (let i=0;i<shots;i++){
    const t = t0 + i*(.02+Math.random()*.03);
    const dur = .06;
    const buf = AC.createBuffer(1, AC.sampleRate*dur, AC.sampleRate);
    const ch = buf.getChannelData(0);
    for (let j=0;j<ch.length;j++) ch[j] = (Math.random()*2-1)*Math.pow(1-j/ch.length,3);
    const src = AC.createBufferSource(); src.buffer = buf;
    const f = AC.createBiquadFilter(); f.type='highpass'; f.frequency.value=900;
    const g = AC.createGain(); g.gain.value = .045+Math.random()*.03;
    src.connect(f).connect(g).connect(sfxG); src.start(t);
  }
}
function playCheer(){
  if (!sfxOn || !AC) return;
  const t = AC.currentTime;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type='triangle';
  o.frequency.setValueAtTime(520, t);
  o.frequency.exponentialRampToValueAtTime(880, t+.14);
  g.gain.setValueAtTime(.0001, t);
  g.gain.exponentialRampToValueAtTime(.12, t+.03);
  g.gain.exponentialRampToValueAtTime(.0001, t+.3);
  o.connect(g).connect(sfxG); o.start(t); o.stop(t+.32);
}

/* ═══════════ DATA FEED — REAL (Binance) atau DUMMY (simulasi lokal) ═══════════ */
const priceEl = document.getElementById('cp-value');
const cpPctEl = document.getElementById('cp-pct');
const badgeEl = document.getElementById('feed-badge');
const badgeTextEl = document.getElementById('feed-text');
const retryBtn = document.getElementById('retry');

let price = NaN, lastPrice = NaN, pct24 = 0;
let ws = null, wsLiq = null, wsTicker = null, live = false, retries = 0, connectGuard = null;

/* persentase perubahan 24 jam dari ticker Binance (bukan sejak halaman dibuka) */
function updatePct(){
  cpPctEl.textContent = (pct24>=0?'▲ ':'▼ ')+Math.abs(pct24).toFixed(2)+'%';
  cpPctEl.className = pct24>=0 ? 'up':'down';
}

function onTrade(p, qty, isBuy){
  lastPrice = price; price = p;
  const usd = p*qty;
  flow.push({ t:performance.now(), usd, buy:isBuy });
  priceEl.textContent = '$'+p.toLocaleString('en-US',{ maximumFractionDigits: p<10?4:2 });
  if (p > lastPrice) priceEl.className = 'up';        // harga naik → hijau
  else if (p < lastPrice) priceEl.className = 'down'; // harga turun → merah
  // harga sama → warna dipertahankan

  const side = isBuy ? 'buy' : 'sell';
  const defender = isBuy ? sellCrowd : buyCrowd;
  const tier = usd>=T_WHALE ? 2 : usd>=T_HEAVY ? 1 : 0;
  const killed = tier===2 ? 14 : tier===1 ? 6 : 2;
  bumpStreak(side);
  if (usd >= T_WHALE){
    spawnBigUnit(side, usd);
    fireVolley(side, 2, Math.min(killed, 16));
    addShake(2.2); addHitstop(.09);
  } else if (usd >= T_SHELL){
    fireVolley(side, tier, killed);        // peluru yang membunuh saat mendarat
    if (tier===1) addShake(.5);
  }
  // order debu (<T_SHELL): hanya menambah tekanan/jumlah, tidak membunuh tanpa peluru
  logKill(side, qty, p, tier===2?'whale':null);
}

let feedState = 'connecting';
function setBadge(state){
  feedState = state;
  const L = I18N[lang];
  badgeEl.className = 'hud' + (state==='connecting' ? '' : ' '+state);
  badgeTextEl.textContent = state==='live'?L.live:state==='dead'?L.dead:L.connecting;
  retryBtn.style.display = state==='dead' ? 'inline-block' : 'none';
}

/* ═══════════ SUMBER DATA — utama Binance Vision, otomatis pindah ke Gate.io ═══════════ */
/* Sebagian ISP (mis. Indonesia) memblokir stream.binance.com. data-stream.binance.vision
   adalah domain data-pasar resmi Binance (format identik) yang biasanya lolos; kalau pun
   itu gagal, kita jatuh ke Gate.io. */
const FEEDS = [
  { name:'Binance Vision', go:connectBinanceVision },
  { name:'Gate.io',        go:connectGate },
];
let feedIdx = 0;

function markLive(){
  if (live) return;
  live = true; retries = 0;
  if (connectGuard){ clearTimeout(connectGuard); connectGuard = null; }
  setBadge('live');
}

function connectBinanceVision(){
  ws = new WebSocket(`wss://data-stream.binance.vision/ws/${STREAM}@aggTrade`);
  ws.onmessage = (ev)=>{ markLive();
    try { const d = JSON.parse(ev.data); onTrade(parseFloat(d.p), parseFloat(d.q), d.m===false); } catch(e){} /* m=false → taker beli */
  };
  ws.onerror = ()=>{ if(!live) failover(); };
  ws.onclose = ()=>{ if(live){ live=false; setBadge('dead'); autoRetry(); } };

  wsTicker = new WebSocket(`wss://data-stream.binance.vision/ws/${STREAM}@ticker`);
  wsTicker.onmessage = (ev)=>{ try { const d = JSON.parse(ev.data); pct24 = parseFloat(d.P); updatePct(); } catch(e){} };

  /* likuidasi futures — fstream sering diblokir; dicoba saja, diabaikan bila gagal */
  try {
    wsLiq = new WebSocket(`wss://fstream.binance.com/ws/${STREAM}@forceOrder`);
    wsLiq.onmessage = (ev)=>{
      try {
        const o = JSON.parse(ev.data).o;
        const qty = parseFloat(o.q);
        const liqPrice = parseFloat(o.ap);
        const usd = liqPrice*qty;
        const isBuy = o.S === 'BUY'; /* BUY = short terlikuidasi */
        const side = isBuy ? 'buy' : 'sell';
        const n = usd>=T_WHALE ? 10 : 4;
        fireVolley(side, usd>=T_WHALE?2:1, n);
        const pos = new THREE.Vector3((side==='buy'?1:-1)*(20+Math.random()*80), 0, (Math.random()-.5)*200);
        explode(pos, isBuy?C_GOLD:C_GOLD2, Math.min(1, Math.log10(usd/1000+1)/2.5), usd>=T_WHALE?2:1);
        logKill(side, qty, liqPrice, 'liq');
      } catch(e){}
    };
  } catch(e){}
}

function connectGate(){
  ws = new WebSocket('wss://api.gateio.ws/ws/v4/');
  ws.onopen = ()=>{
    const t = Math.floor(Date.now()/1000);
    try {
      ws.send(JSON.stringify({ time:t, channel:'spot.trades',  event:'subscribe', payload:['BTC_USDT'] }));
      ws.send(JSON.stringify({ time:t, channel:'spot.tickers', event:'subscribe', payload:['BTC_USDT'] }));
    } catch(e){}
  };
  ws.onmessage = (ev)=>{
    try {
      const d = JSON.parse(ev.data);
      if (d.event !== 'update' || !d.result) return;          /* abaikan ack langganan */
      if (d.channel === 'spot.trades'){
        markLive();
        const r = d.result;
        onTrade(parseFloat(r.price), parseFloat(r.amount), r.side === 'buy'); /* side = sisi taker */
      } else if (d.channel === 'spot.tickers'){
        pct24 = parseFloat(d.result.change_percentage); updatePct();
      }
    } catch(e){}
  };
  ws.onerror = ()=>{ if(!live) failover(); };
  ws.onclose = ()=>{ if(live){ live=false; setBadge('dead'); autoRetry(); } };
}

function connect(){
  disconnect();
  setBadge('connecting');
  try { FEEDS[feedIdx].go(); }
  catch(e){ failover(); return; }
  connectGuard = setTimeout(()=>{ if(!live) failover(); }, 6000);   // tak ada data → coba sumber lain
}
function failover(){
  if (connectGuard){ clearTimeout(connectGuard); connectGuard = null; }
  disconnect();
  if (feedIdx < FEEDS.length - 1){ feedIdx++; connect(); }         // coba sumber berikutnya
  else { feedIdx = 0; setBadge('dead'); autoRetry(); }             // semua gagal → jeda lalu ulang
}
function disconnect(){
  live = false;
  if (connectGuard){ clearTimeout(connectGuard); connectGuard = null; }
  for (const s of [ws, wsLiq, wsTicker]){
    if (s){ s.onopen=null; s.onclose=null; s.onerror=null; s.onmessage=null; try{s.close();}catch(e){} }
  }
  ws = wsLiq = wsTicker = null;
}
function autoRetry(){
  if (retries >= 5) return;
  retries++;
  setTimeout(()=>{ if(!live){ feedIdx = 0; connect(); } }, 4000);  // ulang dari sumber utama
}
retryBtn.onclick = ()=>{ retries=0; feedIdx=0; connect(); };

/* mode SINEMATIK: beberapa preset shot yang bergantian tiap belasan detik, menyatu lewat lerp
   supaya terasa seperti editor memotong-motong sudut kamera, bukan satu kamera yang goyang terus */
function cineWide(lt,t,frontX,dur){
  const portrait = innerHeight > innerWidth;
  return { theta:.22+Math.sin(t*.05)*.12, phi:.4+Math.sin(t*.08)*.03,
    radius:560+Math.abs(frontX)*(portrait?1.7:1.1), tx:frontX*.6, ty:10, tz:0 };
}
function cineClash(lt,t,frontX,dur){                          // dolly rendah menyusuri garis bentrok
  const sweep = Math.sin(lt/dur*Math.PI*2)*90;
  return { theta:Math.PI/2+Math.sin(lt*.15)*.2, phi:.17+Math.sin(lt*.2)*.02,
    radius:230, tx:frontX, ty:7, tz:sweep };
}
function cineTrack(lt,t,frontX,dur){                          // dari belakang pasukan yang sedang menang
  const side = buyShare>=0.5 ? -1 : 1;
  const baseTheta = side<0 ? -1.3 : 1.3;
  return { theta:baseTheta+Math.sin(lt*.25)*.2, phi:.2+Math.sin(lt*.3)*.025,
    radius:300, tx:frontX-side*25, ty:12, tz:Math.sin(lt*.2)*55 };
}
function cineAerial(lt,t,frontX,dur){                         // sapuan tinggi ala drone
  return { theta:-.6+(lt/dur)*1.8, phi:.56+Math.sin(lt*.1)*.03,
    radius:760+Math.abs(frontX)*.6, tx:frontX*.4, ty:10, tz:0 };
}
const CINE_SHOTS = [
  { run:cineWide,   dur:18 },
  { run:cineClash,  dur:12 },
  { run:cineTrack,  dur:14 },
  { run:cineAerial, dur:16 },
];

async function requestWakeLock(){
  if (!('wakeLock' in navigator)) return;   // browser lama / konteks tak aman (bukan https) — biarkan layar tidur seperti biasa
  try {

let dragging=false, lx=0, ly=0, pinchD=0, downX=0, downY=0, downT=0, moved=false;
const cv = renderer.domElement;
cv.addEventListener('pointerdown', e=>{
  dragging=true; lx=e.clientX; ly=e.clientY;
  downX=e.clientX; downY=e.clientY; downT=performance.now(); moved=false;
});
addEventListener('pointerup', e=>{
  dragging=false;
  if (!moved && performance.now()-downT < 400) onTap(e);   // ketukan (bukan geser)
});
addEventListener('pointermove', e=>{
  if (!dragging){ hoverUnit(e); return; }
  const dx=e.clientX-lx, dy=e.clientY-ly;
  if (!moved && Math.abs(e.clientX-downX)+Math.abs(e.clientY-downY) > 6){ moved=true; if(camMode!==2) setCamMode(2); }
  if (moved){
    orbit.theta -= dx*.005;
    orbit.phi = Math.min(1.35, Math.max(.2, orbit.phi + dy*.004));
  }
  lx=e.clientX; ly=e.clientY;
});
cv.addEventListener('wheel', e=>{
  e.preventDefault();
  orbit.radius = Math.min(1400, Math.max(140, orbit.radius*(1+Math.sign(e.deltaY)*.08)));
  if(camMode!==2) setCamMode(2);
}, { passive:false });
cv.addEventListener('touchmove', e=>{
  if (e.touches.length===2){
    const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    if (pinchD) orbit.radius = Math.min(1400, Math.max(140, orbit.radius*pinchD/d));
    pinchD = d;
    if(camMode!==2) setCamMode(2);
  }
}, { passive:true });
cv.addEventListener('touchend', ()=>pinchD=0);

const raycaster = new THREE.Raycaster();
const ndc = new THREE.Vector2();
const groundPlane = new THREE.Plane(new THREE.Vector3(0,1,0), 0);
const _hitPt = new THREE.Vector3();
const tip = document.getElementById('unit-tip');
let pinnedT = 0;

function setRay(e){ ndc.x=(e.clientX/innerWidth)*2-1; ndc.y=-(e.clientY/innerHeight)*2+1; raycaster.setFromCamera(ndc, camera); }
function pickUnit(e){
  if (!bigUnitObjs.length) return null;
  setRay(e);
  const hits = raycaster.intersectObjects(bigUnitObjs, true);
  if (!hits.length) return null;
  let o = hits[0].object;
  while (o && !(o.userData && o.userData.pick)) o = o.parent;
  return o;
}
function showTip(u, x, y){
  const d = u.userData, L = I18N[lang];
  tip.innerHTML =
    `<b class="${d.side}">${d.side==='buy'?L.bigBuy:L.bigSell}</b>` +
    `<span>${fmtUsd(d.usd)}</span>` +
    `<span>@ $${d.price.toLocaleString('en-US',{ maximumFractionDigits:2 })}</span>` +
    `<span class="tt">${new Date(d.ts).toLocaleTimeString('en-GB')}</span>`;
  tip.style.left = Math.min(innerWidth-150, x+14) + 'px';
  tip.style.top  = Math.max(8, y-8) + 'px';
  tip.classList.add('show');
}
function hideTip(){ tip.classList.remove('show'); }
function hoverUnit(e){
  const u = pickUnit(e);
  if (u){ showTip(u, e.clientX, e.clientY); cv.style.cursor='pointer'; }
  else { cv.style.cursor=''; if (performance.now() > pinnedT) hideTip(); }
}
function spawnCheer(pos){
  const rm = new THREE.Mesh(ringGeo, new THREE.MeshBasicMaterial({ color:C_GOLD, transparent:true, opacity:.7, side:THREE.DoubleSide, blending:THREE.AdditiveBlending, depthWrite:false }));
  rm.rotation.x = -Math.PI/2; rm.position.copy(pos); rm.position.y = 1.5;
  scene.add(rm);
  rings.push({ rm, t:0, dur:.7, max:16 });

}
function onTap(e){
  const u = pickUnit(e);
  if (u){ showTip(u, e.clientX, e.clientY); pinnedT = performance.now()+1800; return; }
  setRay(e);
  if (raycaster.ray.intersectPlane(groundPlane, _hitPt)) spawnCheer(_hitPt);
}

/* ═══════════ MAIN LOOP ═══════════ */
const clock = new THREE.Clock();
let regenTimer = 1;
function tick(){
  requestAnimationFrame(tick);
  const dt = Math.min(clock.getDelta(), .05);
  const t = clock.elapsedTime;
  if (hitstop > 0) hitstop -= dt;
  const sdt = hitstop > 0 ? dt*0.12 : dt;   // jeda hantam melambatkan simulasi sesaat

  // garis depan bergerak mengikuti tekanan; pasukan maju/mundur
  const targetFront = (buyShare-0.5)*2*180;
  frontX += (targetFront - frontX)*Math.min(1, dt*0.8);
  buyCrowd.pressBias = frontX*0.55;
  sellCrowd.pressBias = frontX*0.55;
  const bw = Math.max(2, frontX + TERR_HALF);
  buyTerr.scale.set(bw, 480, 1);  buyTerr.position.x = -TERR_HALF + bw/2;
  const sw = Math.max(2, TERR_HALF - frontX);
  sellTerr.scale.set(sw, 480, 1); sellTerr.position.x = frontX + sw/2;
  clashLine.position.x = frontX;
  clashLine.material.color.setHex(buyShare>=0.5 ? C_LONG : C_SHORT);
  clashLine.material.opacity = .3 + Math.abs(buyShare-0.5)*1.1 + Math.sin(t*4)*.05;

  // langit & cuaca ikut mood
  mood += (moodTarget - mood)*Math.min(1, dt*0.5);
  _sky.copy(SKY_CALM);
  if (mood < 0) _sky.lerp(SKY_STORM, -mood); else _sky.lerp(SKY_PUMP, mood);
  scene.background.copy(_sky); scene.fog.color.copy(_sky);
  sun.intensity = .7 + mood*.22;
  sun.color.setHex(mood < 0 ? 0xa7bcd6 : 0xfff0cf);
  const rainOp = Math.max(0, -mood), embOp = Math.max(0, mood);
  rain.m.material.opacity = rainOp*.55;
  if (rainOp > .02){
    const a = rain.attr.array;
    for (let i=0;i<rain.n;i++){
      a[i*3+1] -= (320+rain.v[i]*520)*dt;
      if (a[i*3+1] < 0){ a[i*3+1]=320; a[i*3]=(Math.random()-.5)*900; a[i*3+2]=(Math.random()-.5)*700; }
    }
    rain.attr.needsUpdate = true;
  }
  embers.m.material.opacity = embOp*.75;
  if (embOp > .02){
    const a = embers.attr.array;
    for (let i=0;i<embers.n;i++){
      a[i*3+1] += (28+embers.v[i]*58)*dt;
      a[i*3]   += Math.sin(t*1.3+i)*7*dt;
      if (a[i*3+1] > 320){ a[i*3+1]=0; a[i*3]=(Math.random()-.5)*900; a[i*3+2]=(Math.random()-.5)*700; }
    }
    embers.attr.needsUpdate = true;
  }

  updateCrowd(buyCrowd, sdt, t);
  updateCrowd(sellCrowd, sdt, t);
  // bala bantuan HANYA masuk saat jumlah di bawah target (persentase buy/sell).
  // pengurangan jumlah terjadi lewat peluru lawan — prajurit mati karena tertembak, bukan kabur.
  // isi cepat beberapa sekaligus supaya seimbang dengan laju kematian → banyak pergerakan masuk/mati.
  regenTimer -= dt;
  if (regenTimer <= 0){
    regenTimer = .05;
    for (const c of [buyCrowd, sellCrowd]){
      let n = Math.min(14, c.target - c.count);   // isi cepat agar seimbang dengan laju kematian
      while (n-- > 0) reviveSoldier(c);
    }
  }
  // jangan pernah ada jeda tembakan lebih dari ~0.25 detik
  if (performance.now() - lastFireT > 250) ambientFire();

  for (let i=skulls.length-1;i>=0;i--){
    const s = skulls[i];
    s.t += sdt/s.dur;
    if (s.t>=1){ scene.remove(s.spr); s.spr.material.dispose(); skulls.splice(i,1); continue; }
    const e = s.t<.3 ? s.t/.3 : 1;
    const g = 3 + e*3.5;
    s.spr.scale.set(g, g, 1);
    s.spr.position.y = 4 + s.t*6;
    s.spr.material.opacity = (s.t<.4 ? .5 : .5*(1-(s.t-.4)/.6));
  }

  for (let i=units.length-1;i>=0;i--){
    const u = units[i];
    u.t += sdt/u.dur;
    if (u.t>=1){
      scene.remove(u.obj);
      if (u.tier!==2 && u.obj.material) u.obj.material.dispose();
      else { const bi = bigUnitObjs.indexOf(u.obj); if (bi>=0) bigUnitObjs.splice(bi,1); }
      explode(u.end, u.color, u.mag, u.tier);
      units.splice(i,1); continue;
    }
    const k = u.t;
    if (u.tier===2){
      u.obj.position.lerpVectors(u.start, u.end, k);
      u.obj.position.y = u.fly + (u.fly>0 ? Math.sin(t*4 + u.start.z)*1.3 : 0);
      if (u.rotor) u.rotor.rotation.y += sdt*40;                 // baling-baling berputar
      u.fireT -= sdt;                                            // datang sambil menyerang
      if (u.fireT <= 0){
        u.fireT = .13;
        const from = u.obj.position.clone(); from.y += 2;
        fireBullet(u.side, from, crowdPoint(u.defender, 14), true, u.defender, true); // peluru besar, jangkauan jauh
        playCannon();
      }
    } else {
      u.obj.position.lerpVectors(u.start, u.end, k);
      u.obj.position.y = u.start.y + Math.sin(k*Math.PI)*u.apex;
    }
  }

  // peluru pelacak
  for (let i=bullets.length-1;i>=0;i--){
    const b = bullets[i];
    const step = b.speed*sdt;
    b.traveled += step;
    b.pos.addScaledVector(b.vel, step);
    _bdir.copy(b.vel);
    _bq.setFromUnitVectors(AXIS_X, _bdir);
    b.m.quaternion.copy(_bq);
    b.m.position.copy(b.pos);
    b.m.scale.set(b.len, b.w, b.w);
    if (b.traveled >= b.dist){
      const killN = b.big ? 3 : 1;                               // peluru besar = ledakan area
      if (b.kills || b.big || Math.random() < .22) makeSpark(b.target, b.color, b.big?28:12, b.big?.32:.18);
      if (b.kills){
        killSoldier(b.defender, killN);
        spawnSkull(b.target);
        floatNum(b.target, '-'+killN, b.side==='buy'?'up':'dn');
        if (b.big) addShake(.6);
      }
      scene.remove(b.m);
      bullets.splice(i,1);
    }
  }

  // percikan / kilatan moncong
  for (let i=sparks.length-1;i>=0;i--){
    const s = sparks[i];
    s.t += sdt/s.dur;
    if (s.t>=1){ scene.remove(s.spr); s.spr.material.dispose(); sparks.splice(i,1); continue; }
    const g = s.size*(1 + s.t*1.3);
    s.spr.scale.set(g,g,1);
    s.spr.material.opacity = 1-s.t;
  }

  for (let i=booms.length-1;i>=0;i--){
    const b = booms[i];
    b.t += dt/b.dur;
    if (b.t>=1){ scene.remove(b.pts); b.pts.geometry.dispose(); b.pts.material.dispose(); booms.splice(i,1); continue; }
    const pos = b.pts.geometry.attributes.position;
    for (let j=0;j<b.vel.length;j++){
      b.vel[j].y -= 160*dt;
      pos.array[j*3]   += b.vel[j].x*dt;
      pos.array[j*3+1] = Math.max(1, pos.array[j*3+1]+b.vel[j].y*dt);
      pos.array[j*3+2] += b.vel[j].z*dt;
    }
    pos.needsUpdate = true;
    b.pts.material.opacity = 1-b.t;
  }

  for (let i=rings.length-1;i>=0;i--){
    const r = rings[i];
    r.t += dt/r.dur;
    if (r.t>=1){ scene.remove(r.rm); r.rm.material.dispose(); rings.splice(i,1); continue; }
    const s = 1 + r.t*r.max;
    r.rm.scale.set(s,s,1);
    r.rm.material.opacity = .8*(1-r.t);
  }

  if (camMode===0){
    const shotDef = CINE_SHOTS[cineIdx];
    if (t - cineShotStart > shotDef.dur){
      let ni; do { ni = (Math.random()*CINE_SHOTS.length)|0; } while (ni===cineIdx && CINE_SHOTS.length>1);
      cineIdx = ni; cineShotStart = t;
    }
    const shot = shotDef.run(t-cineShotStart, t, frontX, shotDef.dur);
    orbit.theta  += (shot.theta  - orbit.theta )*dt*.8;
    orbit.phi    += (shot.phi    - orbit.phi   )*dt*.8;
    orbit.radius += (shot.radius - orbit.radius)*dt*.7;
    _camTgt.set(shot.tx, shot.ty, shot.tz);
    orbit.target.lerp(_camTgt, dt*.8);
  } else if (camMode===1){
    followPos.lerp(lastImpact, dt*2.2);
    orbit.target.lerp(new THREE.Vector3(followPos.x,15,followPos.z), dt*2.2);
    orbit.radius += (340-orbit.radius)*dt*.8;
  } else if (camMode===3){
    // AKSI: buntuti koloni yang menang dari sudut rendah & dinamis
    if (buyShare > 0.55) aksiWin = -1;          // beli menang (kiri) — histeresis
    else if (buyShare < 0.45) aksiWin = 1;      // jual menang (kanan)
    if (heroUnit && heroUnit.parent && performance.now() < heroUntil){
      // hero-cut: kelilingi unit paus dari dekat sejenak
      _camTgt.copy(heroUnit.position); _camTgt.y += 8;
      orbit.target.lerp(_camTgt, dt*3);
      orbit.theta += dt*0.5 * (heroUnit.userData.side==='buy' ? 1 : -1);
      orbit.phi    += (0.22 - orbit.phi)*dt*2.5;
      orbit.radius += (95  - orbit.radius)*dt*2.5;
    } else {
      heroUnit = null;
      _camTgt.set(frontX - aksiWin*20, 14, Math.sin(t*0.18)*70);        // fokus depan pasukan menang, menyapu pelan
      orbit.target.lerp(_camTgt, dt*1.4);
      const baseTheta = aksiWin < 0 ? -1.35 : 1.35;                     // kamera di belakang pasukan menang, menghadap musuh
      orbit.theta  += (baseTheta + Math.sin(t*0.2)*0.3 - orbit.theta)*dt*1.5;
      orbit.phi    += (0.17 + Math.sin(t*0.35)*0.035 - orbit.phi)*dt*1.5;  // rendah + goyang halus
      orbit.radius += (175 - orbit.radius)*dt*1.5;                      // dekat
    }
  } else {
    const sp = 300*dt;
    const fwd = new THREE.Vector3(Math.sin(orbit.theta),0,Math.cos(orbit.theta));
    const rgt = new THREE.Vector3(fwd.z,0,-fwd.x);
    if (keys['w']) orbit.target.addScaledVector(fwd,-sp);
    if (keys['s']) orbit.target.addScaledVector(fwd, sp);
    if (keys['a']) orbit.target.addScaledVector(rgt,-sp);
    if (keys['d']) orbit.target.addScaledVector(rgt, sp);
    if (keys['q']) orbit.target.y = Math.max(5, orbit.target.y-sp);
    if (keys['e']) orbit.target.y += sp;
  }
  camera.position.set(
    orbit.target.x + orbit.radius*Math.cos(orbit.phi)*Math.sin(orbit.theta),
    orbit.target.y + orbit.radius*Math.sin(orbit.phi),
    orbit.target.z + orbit.radius*Math.cos(orbit.phi)*Math.cos(orbit.theta)
  );
  camera.lookAt(orbit.target);
  if (shake > .01){
    const k = shake * (orbit.radius/540);
    camera.position.x += (Math.random()-.5)*k*2.2;
    camera.position.y += (Math.random()-.5)*k*2.2;
    camera.position.z += (Math.random()-.5)*k*2.2;
    shake = Math.max(0, shake - dt*14);
  }

  renderer.render(scene, camera);
}

    musicLabel:'MUSIK', sfxLabel:'EFEK', muteTitle:'Klik untuk bisukan',
    bigBuy:'ORDER BELI BESAR', bigSell:'ORDER JUAL BESAR',
    buyer:'PEMBELI', seller:'PENJUAL', streakSuffix:'× BERUNTUN',
    whaleTag:'PAUS', liqTag:'LIKUIDASI',
    langBtnTitle:'Ganti bahasa',
  },
};
let lang = 'en';
try { const saved = localStorage.getItem('bf-lang'); if (saved==='en' || saved==='id') lang = saved; } catch(e){}
const langBtn = document.getElementById('lang-btn');
function applyLanguage(){
  const L = I18N[lang];
  document.documentElement.lang = lang;
  langBtn.textContent = lang.toUpperCase();
  langBtn.title = L.langBtnTitle;
  retryBtn.textContent = L.retry;
  setBadge(feedState);
  fsBtn.title = fsElement() ? L.fsExit : L.fsEnter;
  document.getElementById('pp-head-label').textContent = L.pressureLabel;
  document.getElementById('pp-long-word').textContent = L.long;
  document.getElementById('pp-short-word').textContent = L.short;
  document.getElementById('pp-long-orders').textContent = L.ordersLong;
  document.getElementById('pp-short-orders').textContent = L.ordersShort;
  const camLabels = [L.camCinematic, L.camFollow, L.camFree, L.camAction];
  document.querySelectorAll('.btn[data-m]').forEach(b=>{ b.textContent = camLabels[+b.dataset.m]; });
  document.getElementById('keys-hint').innerHTML = L.keysLine1 + '<br>' + L.keysLine2;
  musicLabelEl.textContent = L.musicLabel; musicLabelEl.title = L.muteTitle;
  sfxLabelEl.textContent = L.sfxLabel; sfxLabelEl.title = L.muteTitle;
}
langBtn.onclick = ()=>{
  lang = lang==='en' ? 'id' : 'en';
  try { localStorage.setItem('bf-lang', lang); } catch(e){}
  applyLanguage();
};
applyLanguage();

connect();
tick();
})();
</script>
</body>
</html>
